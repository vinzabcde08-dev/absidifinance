  <script>
  (function(){
    var sz=180,c=document.createElement('canvas');
    c.width=c.height=sz;
    var ctx=c.getContext('2d');
    /* Purple gradient rounded-rect background */
    var g=ctx.createLinearGradient(0,0,sz,sz);
    g.addColorStop(0,'#4f46e5');g.addColorStop(1,'#7c3aed');
    ctx.fillStyle=g;
    var r=sz*0.22;
    ctx.beginPath();
    ctx.moveTo(r,0);ctx.lineTo(sz-r,0);ctx.quadraticCurveTo(sz,0,sz,r);
    ctx.lineTo(sz,sz-r);ctx.quadraticCurveTo(sz,sz,sz-r,sz);
    ctx.lineTo(r,sz);ctx.quadraticCurveTo(0,sz,0,sz-r);
    ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);
    ctx.closePath();ctx.fill();
    /* Gem icon — same paths as the SVG in the header, scaled from 24×24 to sz */
    var sc=sz/24;
    ctx.strokeStyle='rgba(255,255,255,0.95)';
    ctx.lineWidth=1.75*sc;ctx.lineCap='round';ctx.lineJoin='round';
    /* Outer gem: M6 3h12l4 6-10 13L2 9z */
    ctx.beginPath();
    ctx.moveTo(6*sc,3*sc);ctx.lineTo(18*sc,3*sc);ctx.lineTo(22*sc,9*sc);
    ctx.lineTo(12*sc,22*sc);ctx.lineTo(2*sc,9*sc);ctx.closePath();ctx.stroke();
    /* Horizontal belt line */
    ctx.beginPath();ctx.moveTo(2*sc,9*sc);ctx.lineTo(22*sc,9*sc);ctx.stroke();
    /* Left facet */
    ctx.beginPath();ctx.moveTo(6*sc,3*sc);ctx.lineTo(12*sc,16*sc);ctx.stroke();
    /* Right facet */
    ctx.beginPath();ctx.moveTo(18*sc,3*sc);ctx.lineTo(12*sc,16*sc);ctx.stroke();
    var url=c.toDataURL('image/png');
    /* Apple touch icon */
    var atl=document.createElement('link');atl.rel='apple-touch-icon';atl.sizes='180x180';atl.href=url;document.head.appendChild(atl);
    /* Browser favicon */
    var fav=document.createElement('link');fav.rel='icon';fav.type='image/png';fav.sizes='32x32';fav.href=url;document.head.appendChild(fav);
  })();

function AvatarCircle({name,size=44}){
  const colors=['#4f46e5','#7c3aed','#0891b2','#059669','#d97706','#dc2626','#db2777'];
  const idx=name.charCodeAt(0)%colors.length;
  return(
    <div style={{width:size,height:size,borderRadius:'50%',background:colors[idx],display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontWeight:'800',color:'#fff',fontSize:Math.round(size*0.38)}}>
      {name.charAt(0).toUpperCase()}
    </div>
  );
}

function LoginScreen({onLogin}){
  const[localUsers,setLocalUsers]=useState(()=>auth?getLocalUsers():ls.get('af_accounts',[]));
  const[mode,setMode]=useState(()=>(auth?getLocalUsers():ls.get('af_accounts',[])).length===0?'auth':'pick');
  const[authTab,setAuthTab]=useState('signin'); /* 'signin' | 'create' */
  const[selectedAcc,setSelectedAcc]=useState(null);
  const[newUser,setNewUser]=useState('');
  const[pass,setPass]=useState('');
  const[err,setErr]=useState('');
  const[busy,setBusy]=useState(false);
  const[showReset,setShowReset]=useState(false);

  const signInWithGoogle=async()=>{
    if(!auth){setErr('Firebase not ready. Check your config.');return;}
    if(window.location.protocol==='file:'){
      setErr('Google sign-in requires a hosted URL. Open via localhost or your deployed link, not a local file.');
      return;
    }
    setBusy(true);setErr('');
    try{
      const provider=new firebase.auth.GoogleAuthProvider();
      /* Try popup first; if blocked fall back to redirect */
      try{
        await auth.signInWithPopup(provider);
      }catch(popupErr){
        if(popupErr.code==='auth/popup-blocked'||popupErr.code==='auth/popup-cancelled'||popupErr.code==='auth/cancelled-popup-request'){
          /* Redirect flow — page will reload and App will pick up the result */
          await auth.signInWithRedirect(provider);
          return;
        }
        throw popupErr;
      }
    }catch(e){
      setBusy(false);
      if(e.code==='auth/popup-closed-by-user'||e.code==='auth/cancelled-popup-request')return;
      if(e.code==='auth/unauthorized-domain'){
        setErr('This domain is not authorised in Firebase. Add it under Authentication → Settings → Authorised domains in your Firebase Console.');
      }else{
        setErr(`Sign-in failed: ${e.message||e.code||'unknown error'}`);
      }
    }
  };

  const GoogleBtn=()=>(
    <button onClick={signInWithGoogle} disabled={busy} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:'10px',padding:'11px',border:'1.5px solid #e2e8f0',borderRadius:'10px',background:'#fff',cursor:'pointer',fontSize:'14px',fontWeight:'600',color:'#1e293b',transition:'all .15s',opacity:busy?.6:1}}
      onMouseEnter={e=>{e.currentTarget.style.background='#f8fafc';e.currentTarget.style.borderColor='#94a3b8';}}
      onMouseLeave={e=>{e.currentTarget.style.background='#fff';e.currentTarget.style.borderColor='#e2e8f0';}}
    >
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      Continue with Google
    </button>
  );

  const Divider=()=>(
    <div style={{display:'flex',alignItems:'center',gap:'10px',margin:'4px 0'}}>
      <div style={{flex:1,height:'1px',background:'#e2e8f0'}}/>
      <span style={{fontSize:'12px',color:'#94a3b8',fontWeight:'600'}}>or</span>
      <div style={{flex:1,height:'1px',background:'#e2e8f0'}}/>
    </div>
  );

  const fbErr=(code)=>{
    if(code==='auth/email-already-in-use')return'That username is already taken.';
    if(code==='auth/wrong-password'||code==='auth/invalid-credential')return'Incorrect password.';
    if(code==='auth/too-many-requests')return'Too many attempts. Try again later.';
    if(code==='auth/weak-password')return'Password must be at least 6 characters.';
    return'Something went wrong. Try again.';
  };

  const pickAccount=(acc)=>{setSelectedAcc(acc);setPass('');setErr('');setMode('enter');};

  /* ── LOGIN (from picker) ── */
  const login=async()=>{
    if(!pass.trim()){setErr('Enter your password.');return;}
    setBusy(true);setErr('');
    if(auth){
      try{
        await auth.signInWithEmailAndPassword(toEmail(selectedAcc.username),pass);
      }catch(e){setBusy(false);setErr(fbErr(e.code));}
    }else{
      const accs=ls.get('af_accounts',[]);
      const found=accs.find(a=>a.id===selectedAcc.id);
      if(found&&pass===found.password){ls.set('af_current_id',found.id);ls.set('af_loggedIn',true);onLogin();}
      else{setBusy(false);setErr('Incorrect password.');}
    }
  };

  /* ── SIGN IN (from auth screen, new device) ── */
  const signIn=async()=>{
    if(!newUser.trim()||!pass.trim()){setErr('Enter your username and password.');return;}
    setBusy(true);setErr('');
    if(auth){
      try{
        const cred=await auth.signInWithEmailAndPassword(toEmail(newUser.trim()),pass);
        saveLocalUser(cred.user.displayName||newUser.trim(),cred.user.uid);
      }catch(e){setBusy(false);setErr(fbErr(e.code));}
    }else{
      const accs=ls.get('af_accounts',[]);
      const found=accs.find(a=>a.username.toLowerCase()===newUser.trim().toLowerCase());
      if(found&&pass===found.password){ls.set('af_current_id',found.id);ls.set('af_loggedIn',true);onLogin();}
      else{setBusy(false);setErr('Incorrect username or password.');}
    }
  };

  /* ── CREATE ACCOUNT ── */
  const createAccount=async()=>{
    if(!newUser.trim()){setErr('Enter a username.');return;}
    if(pass.length<6){setErr('Password must be at least 6 characters.');return;}
    setBusy(true);setErr('');
    if(auth){
      try{
        const cred=await auth.createUserWithEmailAndPassword(toEmail(newUser.trim()),pass);
        await cred.user.updateProfile({displayName:newUser.trim()});
        saveLocalUser(newUser.trim(),cred.user.uid);
        /* onAuthStateChanged fires → onLogin */
      }catch(e){setBusy(false);setErr(fbErr(e.code));}
    }else{
      const existing=ls.get('af_accounts',[]);
      if(existing.find(a=>a.username.toLowerCase()===newUser.trim().toLowerCase())){setBusy(false);setErr('That username is already taken.');return;}
      const newId=uid();
      ls.set('af_accounts',[...existing,{id:newId,username:newUser.trim(),password:pass}]);
      ls.set('af_current_id',newId);ls.set('af_loggedIn',true);
      onLogin();
    }
  };

  /* ── REMOVE ACCOUNT ── */
  const resetAccount=async()=>{
    setBusy(true);
    ls.clearUser(selectedAcc.id);
    if(auth){
      /* We can only delete the currently signed-in user */
      try{
        await auth.signInWithEmailAndPassword(toEmail(selectedAcc.username),pass);
        await auth.currentUser.delete();
      }catch(e){}
      removeLocalUser(selectedAcc.id);
    }else{
      const updated=ls.get('af_accounts',[]).filter(a=>a.id!==selectedAcc.id);
      ls.set('af_accounts',updated);
    }
    const fresh=auth?getLocalUsers():ls.get('af_accounts',[]);
    setLocalUsers(fresh);
    setShowReset(false);setSelectedAcc(null);setPass('');setErr('');setBusy(false);
    setMode(fresh.length===0?'auth':'pick');
  };

  const firebaseReady=!!auth;
  const BG={minHeight:'100vh',background:'linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%)',display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'};
  const CARD={width:'100%',maxWidth:'420px',padding:'36px'};
  const Logo=()=>(
    <div style={{textAlign:'center',marginBottom:'28px'}}>
      <div style={{width:'52px',height:'52px',background:'linear-gradient(135deg,#4f46e5,#7c3aed)',borderRadius:'14px',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px'}}>
        <Ico n="gem" s={26} c="#fff" sw={1.5}/>
      </div>
      <h1 style={{fontSize:'22px',fontWeight:'800',color:'#1e293b',margin:'0 0 3px'}}>AbsidiFinance</h1>
      {firebaseReady&&<span style={{fontSize:'11px',color:'#10b981',fontWeight:'700',display:'inline-flex',alignItems:'center',gap:'4px',marginTop:'4px'}}><Ico n="fire" s={12} c="#10b981"/>Firebase connected</span>}
    </div>
  );

  /* RESET CONFIRM */
  if(showReset)return(
    <div style={BG}>
      <div className="card fade" style={CARD}>
        <div style={{textAlign:'center',marginBottom:'20px'}}>
          <AvatarCircle name={selectedAcc.username} size={52}/>
          <h2 style={{fontSize:'17px',fontWeight:'800',color:'#1e293b',margin:'14px 0 6px'}}>Remove "{selectedAcc.username}"?</h2>
          <p style={{color:'#64748b',fontSize:'13px',margin:0,lineHeight:'1.5'}}>This removes this account and its financial data permanently.</p>
          {firebaseReady&&<div style={{marginTop:'14px'}}><span className="fl">Enter password to confirm</span><input autoFocus className="fi" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Your password"/></div>}
        </div>
        {err&&<div style={{background:'#fef2f2',border:'1px solid #fecaca',color:'#dc2626',padding:'10px 14px',borderRadius:'9px',fontSize:'13px',marginBottom:'12px'}}>{err}</div>}
        <div style={{display:'flex',gap:'10px'}}>
          <button className="btn bs" style={{flex:1,justifyContent:'center'}} onClick={()=>{setShowReset(false);setErr('');}}>Cancel</button>
          <button className="btn" style={{flex:1,justifyContent:'center',background:'#ef4444',color:'#fff',opacity:busy?.6:1}} onClick={resetAccount} disabled={busy}>Remove Account</button>
        </div>
      </div>
    </div>
  );

  /* ENTER PASSWORD */
  if(mode==='enter')return(
    <div style={BG}>
      <div className="card fade" style={CARD}>
        <Logo/>
        <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'20px',padding:'14px',background:'#f8fafc',borderRadius:'12px'}}>
          <AvatarCircle name={selectedAcc.username}/>
          <div>
            <p style={{fontWeight:'800',color:'#1e293b',margin:'0 0 1px',fontSize:'15px'}}>{selectedAcc.username}</p>
            <p style={{fontSize:'11px',color:'#94a3b8',margin:0}}>Enter your password to continue</p>
          </div>
        </div>
        <div className="col">
          <GoogleBtn/><Divider/>
          <div><span className="fl">Password</span><input autoFocus className="fi" type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyPress={e=>e.key==='Enter'&&login()} placeholder="Enter password"/></div>
          {err&&<div style={{background:'#fef2f2',border:'1px solid #fecaca',color:'#dc2626',padding:'10px 14px',borderRadius:'9px',fontSize:'13px'}}>{err}</div>}
          <button className="btn bp" style={{width:'100%',justifyContent:'center',padding:'12px',opacity:busy?.6:1}} onClick={login} disabled={busy}>{busy?'Signing in…':'Login'}</button>
          <div style={{display:'flex',justifyContent:'space-between'}}>
            <button onClick={()=>{setMode('pick');setErr('');}} style={{background:'none',border:'none',color:'#94a3b8',fontSize:'12px',cursor:'pointer',textDecoration:'underline',padding:0}}>← Back</button>
            <button onClick={()=>setShowReset(true)} style={{background:'none',border:'none',color:'#ef4444',fontSize:'12px',cursor:'pointer',textDecoration:'underline',padding:0}}>Forgot password?</button>
          </div>
        </div>
      </div>
    </div>
  );

  /* AUTH SCREEN — Sign In or Create Account */
  if(mode==='auth')return(
    <div style={BG}>
      <div className="card fade" style={CARD}>
        <Logo/>
        {/* TAB TOGGLE */}
        <div style={{display:'flex',background:'#f1f5f9',borderRadius:'10px',padding:'4px',marginBottom:'22px',gap:'4px'}}>
          {['signin','create'].map(t=>(
            <button key={t} onClick={()=>{setAuthTab(t);setErr('');setNewUser('');setPass('');}}
              style={{flex:1,padding:'8px',borderRadius:'7px',border:'none',cursor:'pointer',fontWeight:'700',fontSize:'13px',transition:'all .15s',
                background:authTab===t?'#fff':'transparent',
                color:authTab===t?'#4f46e5':'#64748b',
                boxShadow:authTab===t?'0 1px 4px rgba(0,0,0,.08)':'none'
              }}
            >{t==='signin'?'Sign In':'Create Account'}</button>
          ))}
        </div>
        <div className="col">
          <GoogleBtn/><Divider/>
          <div><span className="fl">Username</span><input autoFocus className="fi" value={newUser} onChange={e=>setNewUser(e.target.value)} onKeyPress={e=>e.key==='Enter'&&(authTab==='signin'?signIn():createAccount())} placeholder={authTab==='signin'?'Your username':'Choose a username'}/></div>
          <div><span className="fl">Password</span><input className="fi" type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyPress={e=>e.key==='Enter'&&(authTab==='signin'?signIn():createAccount())} placeholder={authTab==='signin'?'Your password':'Min 6 characters'}/></div>
          {err&&<div style={{background:'#fef2f2',border:'1px solid #fecaca',color:'#dc2626',padding:'10px 14px',borderRadius:'9px',fontSize:'13px'}}>{err}</div>}
          <button className="btn bp" style={{width:'100%',justifyContent:'center',padding:'12px',opacity:busy?.6:1}}
            onClick={authTab==='signin'?signIn:createAccount} disabled={busy}>
            {busy?(authTab==='signin'?'Signing in…':'Creating…'):(authTab==='signin'?'Sign In':'Create Account')}
          </button>
          {localUsers.length>0&&<button onClick={()=>{setMode('pick');setErr('');setNewUser('');setPass('');}} style={{background:'none',border:'none',color:'#94a3b8',fontSize:'12px',cursor:'pointer',textDecoration:'underline',textAlign:'center',padding:'2px 0'}}>← Back to saved accounts</button>}
          <p style={{fontSize:'11px',color:firebaseReady?'#10b981':'#94a3b8',textAlign:'center',margin:'2px 0 0',fontWeight:firebaseReady?'700':'400'}}>{firebaseReady?'✓ Credentials stored securely in Firebase':'Credentials saved locally in this browser.'}</p>
        </div>
      </div>
    </div>
  );

  /* PICK ACCOUNT */
  return(
    <div style={BG}>
      <div className="card fade" style={CARD}>
        <Logo/>
        <div className="col" style={{marginBottom:'16px'}}><GoogleBtn/></div>
        <p style={{color:'#64748b',fontSize:'13px',textAlign:'center',margin:'0 0 12px'}}>— or choose a saved account —</p>
        <div className="col" style={{gap:'8px',marginBottom:'16px'}}>
          {localUsers.map(acc=>(
            <button key={acc.id||acc.username} onClick={()=>pickAccount(acc)} style={{display:'flex',alignItems:'center',gap:'14px',padding:'13px 16px',border:'1.5px solid #e2e8f0',borderRadius:'12px',background:'#fff',cursor:'pointer',width:'100%',textAlign:'left',transition:'border-color .15s,box-shadow .15s'}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor='#6366f1';e.currentTarget.style.boxShadow='0 0 0 3px rgba(99,102,241,.1)';}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor='#e2e8f0';e.currentTarget.style.boxShadow='none';}}
            >
              <AvatarCircle name={acc.username}/>
              <div>
                <p style={{fontWeight:'700',color:'#1e293b',margin:'0 0 1px',fontSize:'14px'}}>{acc.username}</p>
                <p style={{fontSize:'11px',color:'#94a3b8',margin:0}}>Click to sign in</p>
              </div>
              <svg style={{marginLeft:'auto',flexShrink:0}} viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#cbd5e1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9,18 15,12 9,6"/></svg>
            </button>
          ))}
        </div>
        <Divider/>
        <button
          onClick={()=>{setMode('auth');setAuthTab('create');setErr('');setNewUser('');setPass('');}}
          style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',padding:'13px',border:'2px dashed #c7d2fe',borderRadius:'12px',background:'#f5f3ff',color:'#4f46e5',fontWeight:'700',fontSize:'14px',cursor:'pointer',transition:'all .15s'}}
          onMouseEnter={e=>{e.currentTarget.style.background='#ede9fe';e.currentTarget.style.borderColor='#818cf8';}}
          onMouseLeave={e=>{e.currentTarget.style.background='#f5f3ff';e.currentTarget.style.borderColor='#c7d2fe';}}
        >
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="#4f46e5" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Create New Account
        </button>
      </div>
    </div>
  );
}

/* pulls all user data FROM Firestore into localStorage so new devices get existing data */
const syncFromFirebase=async(userId)=>{
  if(!db)return;
  const keys=['ph_subs','ph_income','ph_exp','ph_clients','ph_accts','ph_cards','ph_emps','ph_payroll','ph_settings','ph_debts'];
  await Promise.all(keys.map(async k=>{
    const docKey=k+'_'+userId;
    try{
      const doc=await db.collection('absidifinance').doc(docKey).get();
      if(doc.exists){const d=doc.data();if(d&&d.v!==undefined)localStorage.setItem(docKey,d.v);}
    }catch(e){}
  }));
};

/* ════════════════
   APP ROOT
════════════════ */
function App(){
  const[loggedIn,setLoggedIn]=useState(false);
  const[loading,setLoading]=useState(true);
  const[syncMsg,setSyncMsg]=useState('');

  useEffect(()=>{
    if(!auth){
      setLoggedIn(checkSession());
      setLoading(false);
      return;
    }
    /* Handle redirect result first (for mobile Google sign-in) */
    auth.getRedirectResult().catch(()=>{});
    const unsub=auth.onAuthStateChanged(async user=>{
      if(user){
        ls.set('af_current_id',user.uid);
        ls.set('af_loggedIn',true);
        saveLocalUser(user.displayName||user.email.split('@')[0],user.uid);
        setSyncMsg('Syncing your data…');
        await syncFromFirebase(user.uid);
        setSyncMsg('');
        setLoggedIn(true);
      }else{
        ls.del('af_current_id');
        ls.set('af_loggedIn',false);
        setLoggedIn(false);
      }
      setLoading(false);
    });
    return unsub;
  },[]);

  const handleLogout=async()=>{
    if(auth){await auth.signOut();}
    else{ls.set('af_loggedIn',false);ls.del('af_current_id');setLoggedIn(false);}
  };

  if(loading)return(
    <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%)',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center',color:'#fff'}}>
        <div style={{width:'40px',height:'40px',border:'3px solid rgba(255,255,255,.3)',borderTop:'3px solid #fff',borderRadius:'50%',margin:'0 auto 16px',animation:'spin 0.8s linear infinite'}}/>
        <p style={{fontWeight:'700',fontSize:'14px',opacity:.8}}>{syncMsg||'Loading…'}</p>
      </div>
    </div>
  );

  if(!loggedIn)return<LoginScreen onLogin={()=>setLoggedIn(true)}/>;
  return<MainApp onLogout={handleLogout}/>;
}

/* ════════════════
   MAIN APP
════════════════ */
function MainApp({onLogout}){
  const[subs,setSubs]=useState(()=>ls.get(uk('ph_subs'),[]));
  const[income,setIncome]=useState(()=>ls.get(uk('ph_income'),[]));
  const[expenses,setExpenses]=useState(()=>ls.get(uk('ph_exp'),[]));
  const[clients,setClients]=useState(()=>ls.get(uk('ph_clients'),[]));
  const[accounts,setAccounts]=useState(()=>ls.get(uk('ph_accts'),[]));
  const[cards,setCards]=useState(()=>ls.get(uk('ph_cards'),[]));
  const[employees,setEmployees]=useState(()=>ls.get(uk('ph_emps'),[]));
  const[payroll,setPayroll]=useState(()=>ls.get(uk('ph_payroll'),[]));
  const[settings,setSettings]=useState(()=>ls.get(uk('ph_settings'),DEFAULT_SETTINGS));
  const[debts,setDebts]=useState(()=>ls.get(uk('ph_debts'),[]));
  const[year,setYear]=useState(String(CUR_YEAR));
  const[month,setMonth]=useState(CUR_MONTH);
  const[tab,setTab]=useState('home');
  const[showReset,setShowReset]=useState(false);
  const[resetVal,setResetVal]=useState('');
  const[showSettings,setShowSettings]=useState(false);
  const settingsRef=useRef(null);

  useEffect(()=>{
    const h=e=>{if(settingsRef.current&&!settingsRef.current.contains(e.target))setShowSettings(false);};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[]);

  useEffect(()=>{ls.set(uk('ph_subs'),subs);},[subs]);
  useEffect(()=>{ls.set(uk('ph_income'),income);},[income]);
  useEffect(()=>{ls.set(uk('ph_exp'),expenses);},[expenses]);
  useEffect(()=>{ls.set(uk('ph_clients'),clients);},[clients]);
  useEffect(()=>{ls.set(uk('ph_accts'),accounts);},[accounts]);
  useEffect(()=>{ls.set(uk('ph_cards'),cards);},[cards]);
  useEffect(()=>{ls.set(uk('ph_emps'),employees);},[employees]);
  useEffect(()=>{ls.set(uk('ph_payroll'),payroll);},[payroll]);
  useEffect(()=>{ls.set(uk('ph_settings'),settings);},[settings]);
  useEffect(()=>{ls.set(uk('ph_debts'),debts);},[debts]);

  /* ── Real-time cross-device sync via Firestore onSnapshot ── */
  useEffect(()=>{
    if(!db)return;
    const userId=getUid();
    if(!userId)return;
    const watches=[
      {k:'ph_subs',set:setSubs,def:[]},
      {k:'ph_income',set:setIncome,def:[]},
      {k:'ph_exp',set:setExpenses,def:[]},
      {k:'ph_clients',set:setClients,def:[]},
      {k:'ph_accts',set:setAccounts,def:[]},
      {k:'ph_cards',set:setCards,def:[]},
      {k:'ph_emps',set:setEmployees,def:[]},
      {k:'ph_payroll',set:setPayroll,def:[]},
      {k:'ph_settings',set:setSettings,def:DEFAULT_SETTINGS},
      {k:'ph_debts',set:setDebts,def:[]},
    ];
    const unsubs=watches.map(({k,set})=>{
      const docKey=k+'_'+userId;
      return db.collection('absidifinance').doc(docKey).onSnapshot(doc=>{
        /* skip writes that originated from THIS device to avoid loops */
        if(doc.metadata.hasPendingWrites)return;
        if(doc.exists){const d=doc.data();if(d&&d.v!==undefined){try{const v=JSON.parse(d.v);localStorage.setItem(docKey,d.v);set(v);}catch(e){}}}
      });
    });
    return()=>unsubs.forEach(u=>u());
  },[]);

  const yr=parseInt(year)||CUR_YEAR;
  const selMonth=parseInt(month);
  const daysInMonth=new Date(yr,selMonth+1,0).getDate();
  const isCurrentMonth=yr===CUR_YEAR&&selMonth===CUR_MONTH;
  const daysLeft=isCurrentMonth?daysInMonth-CUR_DAY:daysInMonth;
  const curMonthKey=`${yr}-${String(selMonth+1).padStart(2,'0')}`;

  const byYear=arr=>arr.filter(x=>x.date&&yK(x.date)===yr);
  const byMonth=arr=>arr.filter(x=>x.date&&mK(x.date)===curMonthKey);

  const mInc=byMonth(income).reduce((s,x)=>s+(x.amount||0),0);
  const mExp=byMonth(expenses).reduce((s,x)=>s+(x.amount||0),0);
  const mSub=byMonth(subs).reduce((s,x)=>s+(x.amount||0),0);
  const mPay=byMonth(payroll).reduce((s,x)=>s+(x.amount||0),0);

  const last3=[0,1,2].map(i=>{
    const d=new Date(yr,selMonth-i,1);
    return income.filter(x=>{const xd=new Date(x.date);return xd.getFullYear()===d.getFullYear()&&xd.getMonth()===d.getMonth();}).reduce((s,x)=>s+(x.amount||0),0);
  });
  const avg3=last3.reduce((a,b)=>a+b,0)/3;
  const base=settings.budgetMode==='avg'?avg3:mInc;
  const tithe=(base*settings.tithePct)/100;
  const invest=(base*settings.investPct)/100;
  const desires=(base*settings.desiresPct)/100;
  const savings=(base*settings.savingsPct)/100;
  const spendBudget=base-tithe-invest-desires-savings-mSub-mPay;
  const dailyCap=daysLeft>0?Math.max(0,(spendBudget-mExp)/daysLeft):0;
  const totalFixed=settings.tithePct+settings.investPct+settings.desiresPct+settings.savingsPct;

  const accBal=id=>{
    const a=accounts.find(x=>x.id===id);if(!a)return 0;
    const i=income.filter(x=>x.accountId===id&&yK(x.date)===yr).reduce((s,x)=>s+x.amount,0);
    const e=expenses.filter(x=>x.accountId===id&&yK(x.date)===yr).reduce((s,x)=>s+x.amount,0);
    const p=payroll.filter(x=>x.accountId===id&&yK(x.date)===yr).reduce((s,x)=>s+x.amount,0);
    return a.openingBalance+i-e-p;
  };

  const exportCSV=()=>{
    let csv=`AbsidiFinance Export — Year ${yr}\n\n`;
    csv+=`INCOME\nDate,Type,Client,Account,Amount,Status\n`;
    byYear(income).forEach(x=>{const cl=clients.find(c=>c.id===x.clientId);const ac=accounts.find(a=>a.id===x.accountId);csv+=`${x.date},${x.type},${cl?.name||''},${ac?.name||''},${x.amount},${x.status||''}\n`;});
    csv+=`\nEXPENSES\nDate,Category,Account,Card,Amount\n`;
    byYear(expenses).forEach(x=>{const ac=accounts.find(a=>a.id===x.accountId);const cd=cards.find(c=>c.id===x.cardId);csv+=`${x.date},${x.category},${ac?.name||''},${cd?.name||''},${x.amount}\n`;});
    csv+=`\nSUBSCRIPTIONS\nName,Amount,Date,Account,Card\n`;
    byYear(subs).forEach(x=>{const ac=accounts.find(a=>a.id===x.accountId);const cd=cards.find(c=>c.id===x.cardId);csv+=`${x.name},${x.amount},${x.date},${ac?.name||''},${cd?.name||''}\n`;});
    csv+=`\nPAYROLL\nDate,Employee,Account,Amount\n`;
    byYear(payroll).forEach(x=>{const em=employees.find(e=>e.id===x.employeeId);const ac=accounts.find(a=>a.id===x.accountId);csv+=`${x.date},${em?.name||''},${ac?.name||''},${x.amount}\n`;});
    const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
    const link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download=`AbsidiFinance_${yr}.csv`;link.style.display='none';
    document.body.appendChild(link);setTimeout(()=>{link.click();setTimeout(()=>{document.body.removeChild(link);URL.revokeObjectURL(link.href);},200);},100);
    setShowSettings(false);
  };

  const TABS=[
    {id:'home',icon:'home',label:'Home'},
    {id:'accounts',icon:'bank',label:'Accounts'},
    {id:'cards',icon:'card',label:'Cards'},
    {id:'clients',icon:'user',label:'Clients'},
    {id:'income',icon:'expenses',label:'Income'},
    {id:'expenses',icon:'income',label:'Expenses'},
    {id:'subs',icon:'calendar',label:'Subs'},
    {id:'payroll',icon:'users',label:'Payroll'},
    {id:'budget',icon:'chart',label:'Budget'},
    {id:'debt',icon:'warning',label:'Debt'},
  ];

  return(
    <div style={{minHeight:'100vh'}}>
      {/* HEADER */}
      <div style={{background:'linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%)',boxShadow:'0 2px 12px rgba(79,70,229,.3)'}}>
        <div style={{maxWidth:'1100px',margin:'0 auto',padding:'0 20px'}}>
          <div className="row __hdr-inner" style={{padding:'14px 0'}}>
            {/* LOGO */}
            <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
              <div style={{width:'34px',height:'34px',background:'rgba(255,255,255,.15)',borderRadius:'9px',display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid rgba(255,255,255,.2)'}}>
                <Ico n="gem" s={18} c="#fff" sw={1.5}/>
              </div>
              <div>
                <span style={{fontSize:'17px',fontWeight:'800',color:'#fff',letterSpacing:'-0.3px'}}>AbsidiFinance</span>
                <span style={{fontSize:'10px',fontWeight:'700',color:'rgba(255,255,255,.55)',marginLeft:'6px',letterSpacing:'1px'}}>PH</span>
              </div>
            </div>
            {/* RIGHT CONTROLS */}
            <div className="__hdr-right" style={{display:'flex',alignItems:'center',gap:'10px'}}>
              <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                <select value={month} onChange={e=>setMonth(parseInt(e.target.value))} style={{padding:'5px 8px',border:'1.5px solid rgba(255,255,255,.3)',borderRadius:'8px',fontSize:'13px',fontWeight:'700',color:'#fff',background:'rgba(255,255,255,.15)',outline:'none',cursor:'pointer'}}>
                  {MONTH_NAMES.map((m,i)=><option key={i} value={i} style={{color:'#1e293b',background:'#fff'}}>{m}</option>)}
                </select>
                <input type="number" className="yr-input" value={year} onChange={e=>setYear(e.target.value)} min="2020" max="2035" title="Type a year"/>
              </div>
              <div style={{position:'relative'}} ref={settingsRef}>
                <button
                  onClick={()=>setShowSettings(v=>!v)}
                  style={{background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.2)',borderRadius:'8px',padding:'7px',cursor:'pointer',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',transition:'background .15s'}}
                  onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.22)'}
                  onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,.12)'}
                >
                  <Ico n="settings" s={16} c="#fff"/>
                </button>
                {showSettings&&(
                  <div className="settings-dropdown fade">
                    <div style={{padding:'12px 16px',borderBottom:'1px solid #f1f5f9'}}>
                      <p style={{fontSize:'10px',fontWeight:'700',color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.06em',margin:'0 0 4px'}}>Signed in as</p>
                      <p style={{fontWeight:'700',color:'#1e293b',fontSize:'14px',margin:0}}>{getCurrentUsername()}</p>
                    </div>
                    <button className="dmi-btn" onClick={exportCSV} style={{color:'#4f46e5'}}
                      onMouseEnter={e=>e.currentTarget.style.background='#f5f3ff'}
                      onMouseLeave={e=>e.currentTarget.style.background='none'}
                    ><Ico n="download" s={15} c="#4f46e5"/>Export CSV ({yr})</button>
                    <button className="dmi-btn" onClick={()=>{setShowSettings(false);setShowReset(true);}} style={{color:'#ef4444',borderTop:'1px solid #f1f5f9'}}
                      onMouseEnter={e=>e.currentTarget.style.background='#fff5f5'}
                      onMouseLeave={e=>e.currentTarget.style.background='none'}
                    ><Ico n="warning" s={15} c="#ef4444"/>Reset All Data</button>
                    <button className="dmi-btn" onClick={onLogout} style={{color:'#64748b',borderTop:'1px solid #f1f5f9'}}
                      onMouseEnter={e=>e.currentTarget.style.background='#f8fafc'}
                      onMouseLeave={e=>e.currentTarget.style.background='none'}
                    ><Ico n="logout" s={15} c="#64748b"/>Logout</button>
                  </div>
                )}
              </div>
            </div>
          </div>
          {/* TABS */}
          <div style={{display:'flex',gap:'2px',paddingBottom:'10px',overflowX:'auto'}}>
            {TABS.map(t=>(
              <button key={t.id} className={`tab-btn${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>
                <Ico n={t.icon} s={14} c="currentColor"/>
                {t.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* SUBTITLE */}
      <div style={{background:'#fff',borderBottom:'1px solid #e2e8f0',padding:'8px 0'}}>
        <div style={{maxWidth:'1100px',margin:'0 auto',padding:'0 20px',display:'flex',alignItems:'center',gap:'6px'}}>
          <span style={{fontSize:'12px',color:'#64748b'}}>All in ₱</span>
          <span style={{color:'#cbd5e1'}}>·</span>
          <span style={{fontSize:'12px',color:'#64748b'}}>Editable allocations</span>
          <span style={{color:'#cbd5e1'}}>·</span>
          <span style={{fontSize:'12px',color:'#64748b'}}>{MONTH_NAMES[selMonth]} {yr}</span>
          {db&&<><span style={{color:'#cbd5e1'}}>·</span><span style={{fontSize:'12px',color:'#10b981',fontWeight:'600',display:'flex',alignItems:'center',gap:'4px'}}><Ico n="fire" s={12} c="#10b981"/>Firebase synced</span></>}
        </div>
      </div>

      {/* CONTENT */}
      <div className="__content" style={{maxWidth:'1100px',margin:'0 auto',padding:'24px 20px'}}>
        {tab==='home'&&<HomeTab mInc={mInc} mExp={mExp} mSub={mSub} mPay={mPay} base={base} tithe={tithe} invest={invest} desires={desires} savings={savings} spendBudget={spendBudget} dailyCap={dailyCap} daysLeft={daysLeft} accounts={accounts} accBal={accBal} settings={settings} totalFixed={totalFixed} debts={debts} monthName={MONTH_NAMES[selMonth]} income={byMonth(income)} unlinkedIncome={income.filter(i=>!i.accountId).length} unlinkedExpenses={expenses.filter(e=>!e.accountId&&!e.cardId).length}/>}
        {tab==='accounts'&&<AccountsTab accounts={accounts} setAccounts={setAccounts} accBal={accBal}/>}
        {tab==='cards'&&<CardsTab cards={cards} setCards={setCards} expenses={byMonth(expenses)}/>}
        {tab==='clients'&&<ClientsTab clients={clients} setClients={setClients} income={byMonth(income)} expenses={byMonth(expenses)} mExp={mExp+mSub+mPay} monthName={MONTH_NAMES[selMonth]}/>}
        {tab==='income'&&<IncomeTab income={byMonth(income)} allIncome={income} setIncome={setIncome} clients={clients} accounts={accounts}/>}
        {tab==='expenses'&&<ExpensesTab expenses={byMonth(expenses)} allExpenses={expenses} setExpenses={setExpenses} accounts={accounts} cards={cards}/>}
        {tab==='subs'&&<SubsTab subs={byMonth(subs)} allSubs={subs} setSubs={setSubs} accounts={accounts} cards={cards}/>}
        {tab==='payroll'&&<PayrollTab payroll={byMonth(payroll)} allPayroll={payroll} setPayroll={setPayroll} employees={employees} setEmployees={setEmployees} accounts={accounts}/>}
        {tab==='budget'&&<BudgetTab base={base} avg3={avg3} mInc={mInc} settings={settings} setSettings={setSettings} mExp={mExp} mSub={mSub} mPay={mPay} spendBudget={spendBudget} dailyCap={dailyCap} daysLeft={daysLeft} tithe={tithe} invest={invest} desires={desires} savings={savings} totalFixed={totalFixed} exportCSV={exportCSV}/>}
        {tab==='debt'&&<DebtTab debts={debts} setDebts={setDebts}/>}
      </div>

      {/* RESET MODAL */}
      {showReset&&(
        <div className="modal-overlay">
          <div className="card fade" style={{width:'100%',maxWidth:'380px',padding:'28px'}}>
            <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'12px'}}>
              <div style={{background:'#fef2f2',borderRadius:'10px',padding:'8px',display:'flex'}}><Ico n="warning" s={20} c="#ef4444"/></div>
              <h2 style={{color:'#ef4444',fontWeight:'800',margin:0,fontSize:'18px'}}>Reset All Data</h2>
            </div>
            <p style={{color:'#64748b',fontSize:'13px',margin:'0 0 20px'}}>This will permanently delete all financial records. Your login remains. This cannot be undone.</p>
            <div style={{marginBottom:'16px'}}>
              <span className="fl">Type RESET to confirm</span>
              <input className="fi" value={resetVal} onChange={e=>setResetVal(e.target.value)} placeholder="RESET"/>
            </div>
            <div style={{display:'flex',gap:'10px'}}>
              <button className="btn bs" style={{flex:1,justifyContent:'center'}} onClick={()=>{setShowReset(false);setResetVal('');}}>Cancel</button>
              <button className="btn br" style={{flex:1,justifyContent:'center'}} onClick={()=>{if(resetVal==='RESET'){ls.clearUser(getUid());window.location.reload();}}}>Confirm Reset</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ════════  HOME  ════════ */
function HomeTab({mInc,mExp,mSub,mPay,base,tithe,invest,desires,savings,spendBudget,dailyCap,daysLeft,accounts,accBal,settings,totalFixed,debts,monthName,income,unlinkedIncome,unlinkedExpenses}){
  const net=mInc-mExp-mSub-mPay;
  const totalDebt=(debts||[]).reduce((s,d)=>s+(d.balance||0),0);
  const totalOnHand=accounts.reduce((s,a)=>s+accBal(a.id),0);
  /* graph */
  const inc=income||[];
  const gPaid=inc.filter(i=>i.status==='Paid'||!i.status).reduce((s,i)=>s+(i.amount||0),0);
  const gPending=inc.filter(i=>i.status==='Pending').reduce((s,i)=>s+(i.amount||0),0);
  const gExpected=gPaid+gPending;
  const gExp=mExp+mSub+mPay;
  const gMax=Math.max(gExpected,gExp,1);
  const gPct=(v)=>Math.min(100,Math.round((v/gMax)*100));
  const gNet=gPaid-gExp;
  const STATS=[
    {label:'Monthly Income',value:P(mInc),color:'#10b981',bg:'#f0fdf4',icon:'income'},
    {label:'Total On Hand',value:P(totalOnHand),color:'#0891b2',bg:'#f0f9ff',icon:'bank'},
    {label:'Monthly Expenses',value:P(mExp),color:'#ef4444',bg:'#fff5f5',icon:'expenses'},
    {label:'Net This Month',value:P(net),color:net>=0?'#4f46e5':'#ef4444',bg:'#f5f3ff',icon:'trend-up'},
    {label:'Daily Spend Cap',value:P(dailyCap),color:'#f59e0b',bg:'#fffbeb',icon:'calendar'},
    {label:'Total Debt',value:P(totalDebt),color:totalDebt>0?'#ef4444':'#10b981',bg:totalDebt>0?'#fff5f5':'#f0fdf4',icon:'warning'},
  ];
  const totalUnlinked=(unlinkedIncome||0)+(unlinkedExpenses||0);
  return(
    <div className="col fade" style={{gap:'16px'}}>
      {totalUnlinked>0&&(
        <div style={{background:'#fffbeb',border:'1.5px solid #f59e0b',borderRadius:'12px',padding:'14px 18px',display:'flex',alignItems:'center',gap:'12px'}}>
          <Ico n="warning" s={20} c="#f59e0b" sw={2}/>
          <div style={{flex:1}}>
            <p style={{fontWeight:'700',color:'#92400e',fontSize:'13px',margin:'0 0 2px'}}>Some entries are not linked to an account</p>
            <p style={{fontSize:'12px',color:'#b45309',margin:0}}>
              {unlinkedIncome>0&&`${unlinkedIncome} income entr${unlinkedIncome===1?'y':'ies'}`}
              {unlinkedIncome>0&&unlinkedExpenses>0&&' and '}
              {unlinkedExpenses>0&&`${unlinkedExpenses} expense entr${unlinkedExpenses===1?'y':'ies'}`}
              {' '}not linked — go to the Income or Expenses tab and update them so your account balances are accurate.
            </p>
          </div>
        </div>
      )}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:'12px'}}>
        {STATS.map(s=>(
          <div key={s.label} className="card" style={{padding:'18px 20px',background:s.bg}}>
            <div style={{width:'34px',height:'34px',background:'rgba(255,255,255,.7)',borderRadius:'9px',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:'10px'}}>
              <Ico n={s.icon} s={16} c={s.color} sw={2}/>
            </div>
            <p style={{fontSize:'11px',color:'#64748b',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.04em',margin:'0 0 4px'}}>{s.label}</p>
            <p style={{fontSize:'22px',fontWeight:'800',color:s.color,margin:0}}>{s.value}</p>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:'16px'}}>
        <div className="card" style={{padding:'20px'}}>
          <p className="sect">Budget Snapshot — {monthName||new Date().toLocaleString('en-US',{month:'long'})}</p>
          {[
            {label:`Tithes (${settings.tithePct}%)`,val:tithe,color:'#f59e0b',icon:'cross'},
            {label:`Investments (${settings.investPct}%)`,val:invest,color:'#4f46e5',icon:'trend-up'},
            {label:`Desires (${settings.desiresPct}%)`,val:desires,color:'#ec4899',icon:'star'},
            {label:`Savings (${settings.savingsPct}%)`,val:savings,color:'#10b981',icon:'piggy'},
          ].map(r=>(
            <div key={r.label} style={{marginBottom:'12px'}}>
              <div className="row" style={{marginBottom:'4px'}}>
                <span style={{fontSize:'12px',color:'#64748b',fontWeight:'600',display:'flex',alignItems:'center',gap:'5px'}}><Ico n={r.icon} s={13} c={r.color} sw={2}/>{r.label}</span>
                <span style={{fontSize:'13px',fontWeight:'700',color:'#1e293b'}}>{P(r.val)}</span>
              </div>
              <div className="pbar"><div className="pfill" style={{width:`${Math.min(100,r.val/Math.max(base,1)*100)}%`,background:r.color}}/></div>
            </div>
          ))}
          <div style={{borderTop:'1px solid #f1f5f9',marginTop:'8px',paddingTop:'10px'}}>
            {[
              {label:'Spendable Budget',val:spendBudget,color:'#4f46e5'},
              {label:'Already Spent',val:mExp,color:'#ef4444'},
              {label:`Remaining (${daysLeft}d left)`,val:Math.max(0,spendBudget-mExp),color:'#10b981'},
            ].map(r=>(
              <div key={r.label} className="row" style={{marginTop:'6px'}}>
                <span style={{fontSize:'12px',color:'#64748b',fontWeight:'600'}}>{r.label}</span>
                <span style={{fontSize:'14px',fontWeight:'800',color:r.color}}>{P(r.val)}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="card" style={{padding:'20px'}}>
          <p className="sect">Account Balances</p>
          {accounts.length===0&&<p style={{color:'#94a3b8',fontSize:'13px',textAlign:'center',padding:'20px 0'}}>No accounts yet.</p>}
          {accounts.map(a=>{
            const bal=accBal(a.id);
            return(
              <div key={a.id} className="row hr" style={{padding:'10px 6px',borderBottom:'1px solid #f8fafc',borderRadius:'6px'}}>
                <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                  <div style={{width:'32px',height:'32px',background:'#f5f3ff',borderRadius:'8px',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <Ico n={a.type==='Bank'?'bank':a.type==='E-Wallet'?'dollar':'dollar'} s={14} c="#4f46e5" sw={2}/>
                  </div>
                  <div>
                    <p style={{fontWeight:'700',color:'#1e293b',fontSize:'13px',margin:0}}>{a.name}</p>
                    <p style={{fontSize:'11px',color:'#94a3b8',margin:0}}>{a.type}</p>
                  </div>
                </div>
                <span style={{fontWeight:'800',fontSize:'14px',color:bal>=0?'#1e293b':'#ef4444'}}>{P(bal)}</span>
              </div>
            );
          })}
        </div>
      </div>

      {/* INCOME VS EXPENSES GRAPH */}
      <div className="card" style={{padding:'24px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:'10px',marginBottom:'20px'}}>
          <div>
            <p className="sect" style={{margin:0}}>Income vs Expenses — {monthName||'This Month'}</p>
            <p style={{fontSize:'12px',color:'#94a3b8',margin:'4px 0 0'}}>Did your income cover your expenses this month?</p>
          </div>
          <div style={{display:'flex',gap:'10px',flexWrap:'wrap'}}>
            {[{c:'#6366f1',l:'Expected'},{c:'#10b981',l:'Received'},{c:'#ef4444',l:'Expenses'}].map(x=>(
              <span key={x.l} style={{display:'flex',alignItems:'center',gap:'5px',fontSize:'11px',fontWeight:'700',color:'#64748b'}}>
                <span style={{width:'10px',height:'10px',borderRadius:'3px',background:x.c,display:'inline-block'}}/>
                {x.l}
              </span>
            ))}
          </div>
        </div>
        {gExpected===0&&gExp===0?(
          <p style={{textAlign:'center',color:'#94a3b8',fontSize:'13px',padding:'16px 0'}}>No income or expenses recorded this month yet.</p>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
            {[
              {label:'Expected Income',sub:'Paid + Pending',value:gExpected,color:'#6366f1',mixed:true,paid:gPaid,pending:gPending},
              {label:'Actual Received',sub:'Paid only',value:gPaid,color:'#10b981',mixed:false},
              {label:'Total Expenses',sub:'Expenses + Subs + Payroll',value:gExp,color:'#ef4444',mixed:false},
            ].map(b=>(
              <div key={b.label}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:'6px'}}>
                  <div>
                    <span style={{fontSize:'13px',fontWeight:'700',color:'#1e293b'}}>{b.label}</span>
                    <span style={{fontSize:'11px',color:'#94a3b8',marginLeft:'6px'}}>{b.sub}</span>
                  </div>
                  <span style={{fontSize:'15px',fontWeight:'800',color:b.color}}>{P(b.value)}</span>
                </div>
                <div style={{height:'26px',background:'#f1f5f9',borderRadius:'8px',overflow:'hidden',position:'relative'}}>
                  {b.mixed?(
                    <>
                      <div style={{position:'absolute',left:0,top:0,height:'100%',width:`${gPct(b.value)}%`,background:'#c7d2fe',borderRadius:'8px',transition:'width .5s'}}/>
                      <div style={{position:'absolute',left:0,top:0,height:'100%',width:`${gPct(b.paid)}%`,background:'#6366f1',borderRadius:'8px',transition:'width .5s'}}/>
                    </>
                  ):(
                    <div style={{position:'absolute',left:0,top:0,height:'100%',width:`${gPct(b.value)}%`,background:b.color,borderRadius:'8px',transition:'width .5s'}}/>
                  )}
                </div>
                {b.mixed&&b.pending>0&&(
                  <div style={{display:'flex',gap:'12px',marginTop:'4px'}}>
                    <span style={{fontSize:'11px',color:'#6366f1',fontWeight:'600'}}>● Paid: {P(b.paid)}</span>
                    <span style={{fontSize:'11px',color:'#a5b4fc',fontWeight:'600'}}>● Pending: {P(b.pending)}</span>
                  </div>
                )}
              </div>
            ))}
            <div style={{padding:'14px 18px',borderRadius:'10px',background:gNet>=0?'#f0fdf4':'#fff5f5',display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:'4px'}}>
              <div>
                <p style={{fontWeight:'700',fontSize:'13px',color:'#64748b',margin:'0 0 2px'}}>{gNet>=0?'✓ Surplus this month':'⚠ Shortfall this month'}</p>
                <p style={{fontSize:'11px',color:'#94a3b8',margin:0}}>Received income minus all expenses</p>
              </div>
              <span style={{fontSize:'20px',fontWeight:'900',color:gNet>=0?'#10b981':'#ef4444'}}>{gNet>=0?'+':''}{P(gNet)}</span>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ════════  ACCOUNTS  ════════ */
function AccountsTab({accounts,setAccounts,accBal}){
  const[name,setName]=useState('');const[type,setType]=useState('Bank');const[bank,setBank]=useState('BDO');const[opening,setOpening]=useState('');
  const BANKS=['BDO','BPI','Metrobank','UnionBank','Landbank','PNB','RCBC','Security Bank','Eastwest'];
  const EW=['GCash','Maya','ShopeePay','GrabPay'];

/* ════════  CARDS  ════════ */
function CardsTab({cards,setCards,expenses}){
  const[name,setName]=useState('');const[limit,setLimit]=useState('');const[billingDay,setBillingDay]=useState('');const[dueDay,setDueDay]=useState('');
  const add=()=>{if(!name.trim())return;setCards([...cards,{id:uid(),name:name.trim(),limit:parseFloat(limit)||0,billingDay:parseInt(billingDay)||1,dueDay:parseInt(dueDay)||20}]);setName('');setLimit('');setBillingDay('');setDueDay('');};
  return(
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:'16px',alignItems:'start'}} className="fade __form-grid">
      <div className="card" style={{padding:'22px'}}>
        <p className="sect">Add Credit Card</p>
        <div className="col">
          <div><span className="fl">Card Name</span><input className="fi" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. BPI Visa Platinum"/></div>
          <div><span className="fl">Credit Limit (₱)</span><input className="fi" type="number" value={limit} onChange={e=>setLimit(e.target.value)} placeholder="0.00"/></div>
          <div><span className="fl">Billing Statement Day</span><input className="fi" type="number" value={billingDay} onChange={e=>setBillingDay(e.target.value)} placeholder="e.g. 5"/></div>
          <div><span className="fl">Payment Due Day</span><input className="fi" type="number" value={dueDay} onChange={e=>setDueDay(e.target.value)} placeholder="e.g. 25"/></div>
          <button className="btn bp" onClick={add}><Ico n="card" s={14} c="#fff"/>Add Card</button>
        </div>
      </div>
      <div className="col" style={{gap:'10px'}}>
        {cards.length===0&&<div className="card" style={{padding:'40px',textAlign:'center',color:'#94a3b8',fontSize:'13px'}}>No cards yet.</div>}
        {cards.map(c=>{
          const spent=expenses.filter(e=>e.cardId===c.id).reduce((s,e)=>s+e.amount,0);
          const util=c.limit?Math.min(100,(spent/c.limit)*100):0;
          const today=new Date().getDate();
          const dtd=c.dueDay>=today?c.dueDay-today:30-(today-c.dueDay);
          return(
            <div key={c.id} className="card" style={{padding:'18px 20px'}}>
              <div className="row" style={{marginBottom:'12px'}}>
                <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
                  <div style={{width:'40px',height:'40px',background:'#faf5ff',borderRadius:'10px',display:'flex',alignItems:'center',justifyContent:'center'}}><Ico n="card" s={18} c="#7c3aed" sw={1.75}/></div>
                  <div>
                    <p style={{fontWeight:'800',color:'#1e293b',margin:'0 0 4px'}}>{c.name}</p>
                    <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
                      <span className="badge" style={{background:'#f1f5f9',color:'#64748b'}}>Limit: {P(c.limit)}</span>
                      {dtd<=5&&<span className="badge" style={{background:'#fef2f2',color:'#ef4444'}}><Ico n="warning" s={10} c="#ef4444"/>Due in {dtd}d</span>}
                    </div>
                  </div>
                </div>
                <button className="ib" onClick={()=>setCards(cards.filter(x=>x.id!==c.id))}><Ico n="trash" s={15}/></button>
              </div>
              <div style={{marginBottom:'6px'}}>
                <div className="row" style={{marginBottom:'4px'}}>
                  <span style={{fontSize:'12px',color:'#64748b'}}>Used this month</span>
                  <span style={{fontSize:'13px',fontWeight:'700',color:util>80?'#ef4444':'#1e293b'}}>{P(spent)} ({util.toFixed(0)}%)</span>
                </div>
                <div className="pbar"><div className="pfill" style={{width:`${util}%`,background:util>80?'#ef4444':util>50?'#f59e0b':'#4f46e5'}}/></div>
              </div>
              <p style={{fontSize:'12px',color:'#94a3b8',margin:0}}>Billing day: {c.billingDay} · Due day: {c.dueDay}</p>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ════════  CLIENTS  ════════ */
function ClientsTab({clients,setClients,income,expenses,mExp,monthName}){
  const[name,setName]=useState('');const[rate,setRate]=useState('');const[currency,setCurrency]=useState('USD');
  const add=()=>{if(!name.trim())return;setClients([...clients,{id:uid(),name:name.trim(),rate:parseFloat(rate)||0,currency}]);setName('');setRate('');};

  /* graph data */
  const totalPaid=income.filter(i=>i.status==='Paid'||!i.status).reduce((s,i)=>s+i.amount,0);
  const totalPending=income.filter(i=>i.status==='Pending').reduce((s,i)=>s+i.amount,0);
  const totalExpected=totalPaid+totalPending;
  const totalExpenses=mExp||0;
  const graphMax=Math.max(totalExpected,totalExpenses,1);
  const pct=(v)=>Math.min(100,Math.round((v/graphMax)*100));

  /* simple bar chart */
  const bars=[
    {label:'Expected Income',sublabel:'(Paid + Pending)',value:totalExpected,paidPart:totalPaid,pendingPart:totalPending,color:'#6366f1',bg:'#eef2ff',mixed:true},
    {label:'Actual Received',sublabel:'(Paid only)',value:totalPaid,color:'#10b981',bg:'#f0fdf4',mixed:false},
    {label:'Total Expenses',sublabel:'(Expenses + Subs + Payroll)',value:totalExpenses,color:'#ef4444',bg:'#fff5f5',mixed:false},
  ];
  const net=totalPaid-totalExpenses;

  return(
    <div className="fade col" style={{gap:'16px'}}>

      {/* GRAPH CARD */}
      <div className="card" style={{padding:'24px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:'12px',marginBottom:'20px'}}>
          <div>
            <p className="sect" style={{margin:0}}>Income vs Expenses — {monthName||'This Month'}</p>
            <p style={{fontSize:'12px',color:'#94a3b8',margin:'4px 0 0'}}>How your billed income compares to what you actually received and what you spent.</p>
          </div>
          <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
            {[{c:'#6366f1',l:'Expected'},{c:'#10b981',l:'Received'},{c:'#ef4444',l:'Expenses'}].map(x=>(
              <span key={x.l} style={{display:'flex',alignItems:'center',gap:'5px',fontSize:'11px',fontWeight:'700',color:'#64748b'}}>
                <span style={{width:'10px',height:'10px',borderRadius:'3px',background:x.c,display:'inline-block'}}/>
                {x.l}
              </span>
            ))}
          </div>
        </div>

        {income.length===0&&totalExpenses===0?(
          <p style={{textAlign:'center',color:'#94a3b8',fontSize:'13px',padding:'24px 0'}}>No income or expenses recorded this month yet.</p>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:'18px'}}>
            {bars.map(b=>(
              <div key={b.label}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:'6px'}}>
                  <div>
                    <span style={{fontSize:'13px',fontWeight:'700',color:'#1e293b'}}>{b.label}</span>
                    <span style={{fontSize:'11px',color:'#94a3b8',marginLeft:'6px'}}>{b.sublabel}</span>
                  </div>
                  <span style={{fontSize:'15px',fontWeight:'800',color:b.color}}>{P(b.value)}</span>
                </div>
                <div style={{height:'28px',background:'#f1f5f9',borderRadius:'8px',overflow:'hidden',position:'relative'}}>
                  {b.mixed?(
                    <>
                      <div style={{position:'absolute',left:0,top:0,height:'100%',width:`${pct(b.value)}%`,background:'#c7d2fe',borderRadius:'8px',transition:'width .5s'}}/>
                      <div style={{position:'absolute',left:0,top:0,height:'100%',width:`${pct(b.paidPart)}%`,background:'#6366f1',borderRadius:'8px',transition:'width .5s'}}/>
                    </>
                  ):(
                    <div style={{position:'absolute',left:0,top:0,height:'100%',width:`${pct(b.value)}%`,background:b.color,borderRadius:'8px',transition:'width .5s'}}/>
                  )}
                </div>
                {b.mixed&&b.pendingPart>0&&(
                  <div style={{display:'flex',gap:'12px',marginTop:'5px'}}>
                    <span style={{fontSize:'11px',color:'#6366f1',fontWeight:'600'}}>● Paid: {P(b.paidPart)}</span>
                    <span style={{fontSize:'11px',color:'#a5b4fc',fontWeight:'600'}}>● Pending: {P(b.pendingPart)}</span>
                  </div>
                )}
              </div>
            ))}

            {/* Net result */}
            <div style={{marginTop:'4px',padding:'14px 18px',borderRadius:'10px',background:net>=0?'#f0fdf4':'#fff5f5',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <p style={{fontWeight:'700',fontSize:'13px',color:'#64748b',margin:'0 0 2px'}}>{net>=0?'✓ Surplus this month':'⚠ Shortfall this month'}</p>
                <p style={{fontSize:'11px',color:'#94a3b8',margin:0}}>Received income minus all expenses</p>
              </div>
              <span style={{fontSize:'20px',fontWeight:'900',color:net>=0?'#10b981':'#ef4444'}}>{net>=0?'+':''}{P(net)}</span>
            </div>
          </div>
        )}
      </div>

      {/* CLIENT LIST + ADD FORM */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:'16px',alignItems:'start'}} className="__form-grid">
        <div className="card" style={{padding:'22px'}}>
          <p className="sect">Add Client</p>
          <div className="col">
            <div><span className="fl">Client Name</span><input className="fi" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. John Smith"/></div>
            <div><span className="fl">Rate (foreign currency)</span><input className="fi" type="number" value={rate} onChange={e=>setRate(e.target.value)} placeholder="0.00"/></div>
            <div><span className="fl">Currency</span><select className="fi" value={currency} onChange={e=>setCurrency(e.target.value)}><option>USD</option><option>AUD</option><option>GBP</option><option>EUR</option><option>CAD</option><option>SGD</option><option>PHP</option></select></div>
            <button className="btn bp" onClick={add}><Ico n="user" s={14} c="#fff"/>Add Client</button>
          </div>
        </div>
        <div className="col" style={{gap:'10px'}}>
          {clients.length===0&&<div className="card" style={{padding:'40px',textAlign:'center',color:'#94a3b8',fontSize:'13px'}}>No clients yet. Add one to start tracking income per client.</div>}
          {clients.map(c=>{
            const paid=income.filter(i=>i.clientId===c.id&&i.status==='Paid').reduce((s,i)=>s+i.amount,0);
            const pending=income.filter(i=>i.clientId===c.id&&i.status==='Pending').reduce((s,i)=>s+i.amount,0);
            return(
              <div key={c.id} className="card row" style={{padding:'16px 20px'}}>
                <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
                  <div style={{width:'40px',height:'40px',background:'#f0fdf4',borderRadius:'10px',display:'flex',alignItems:'center',justifyContent:'center'}}><Ico n="user" s={18} c="#10b981" sw={1.75}/></div>
                  <div>
                    <p style={{fontWeight:'800',color:'#1e293b',margin:'0 0 4px'}}>{c.name}</p>
                    <span className="badge" style={{background:'#f5f3ff',color:'#7c3aed'}}>{c.currency} {c.rate}/rate</span>
                    <div style={{display:'flex',gap:'8px',marginTop:'6px'}}>
                      <span className="badge" style={{background:'#f0fdf4',color:'#10b981'}}><Ico n="check" s={10} c="#10b981"/>Paid {P(paid)}</span>
                      {pending>0&&<span className="badge" style={{background:'#fff7ed',color:'#f59e0b'}}>Pending {P(pending)}</span>}
                    </div>
                  </div>
                </div>
                <button className="ib" onClick={()=>setClients(clients.filter(x=>x.id!==c.id))}><Ico n="trash" s={15}/></button>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ════════  INCOME  ════════ */
function IncomeTab({income,allIncome,setIncome,clients,accounts}){
  const[date,setDate]=useState(TODAY);
  const[amount,setAmount]=useState('');
  const[type,setType]=useState('VA Salary');
  const[clientId,setClientId]=useState('');
  const[accountId,setAccountId]=useState('');
  const[status,setStatus]=useState('Paid');
  const[editId,setEditId]=useState(null);

  const reset=()=>{setEditId(null);setDate(TODAY);setAmount('');setType('VA Salary');setClientId('');setAccountId('');setStatus('Paid');};
  const startEdit=(i)=>{setEditId(i.id);setDate(i.date);setAmount(String(i.amount));setType(i.type);setClientId(i.clientId||'');setAccountId(i.accountId||'');setStatus(i.status||'Paid');};
  const save=()=>{
    if(!amount)return;
    if(editId){
      setIncome(allIncome.map(x=>x.id===editId?{...x,date,amount:parseFloat(amount),type,clientId,accountId,status}:x));
    }else{
      setIncome([...allIncome,{id:uid(),date,amount:parseFloat(amount),type,clientId,accountId,status}]);
    }
    reset();
  };

  return(
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:'16px',alignItems:'start'}} className="fade __form-grid">
      <div className="card" style={{padding:'22px',border:editId?'2px solid #6366f1':'2px solid transparent',transition:'border-color .2s'}}>
        <p className="sect">{editId?'Edit Income Entry':'Log Income'}</p>
        <div className="col">
          <div><span className="fl">Date</span><input className="fi" type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
          <div><span className="fl">Type</span><select className="fi" value={type} onChange={e=>setType(e.target.value)}><option>VA Salary</option><option>Commission</option><option>Business Income</option><option>Bonus</option><option>Refund</option><option>Other</option></select></div>
          <div><span className="fl">Client (optional)</span><select className="fi" value={clientId} onChange={e=>setClientId(e.target.value)}><option value="">— Select client —</option>{clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
          <div><span className="fl">Deposited To</span><select className="fi" value={accountId} onChange={e=>setAccountId(e.target.value)}><option value="">— Select account —</option>{accounts.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select></div>
          <div><span className="fl">Amount (₱)</span><input className="fi" type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0.00"/></div>
          <div><span className="fl">Status</span><select className="fi" value={status} onChange={e=>setStatus(e.target.value)}><option>Paid</option><option>Pending</option></select></div>
          <div style={{display:'flex',gap:'8px'}}>
            <button className="btn bp" style={{flex:1,justifyContent:'center'}} onClick={save}>
              <Ico n={editId?'check':'income'} s={14} c="#fff"/>{editId?'Save Changes':'Add Income'}
            </button>
            {editId&&<button className="btn bs" style={{justifyContent:'center'}} onClick={reset}>Cancel</button>}
          </div>
        </div>
      </div>
      <div className="col" style={{gap:'8px',maxHeight:'70vh',overflowY:'auto'}}>
        {income.length===0&&<div className="card" style={{padding:'40px',textAlign:'center',color:'#94a3b8',fontSize:'13px'}}>No income recorded this month.</div>}
        {[...income].reverse().map(i=>{
          const cl=clients.find(c=>c.id===i.clientId);const ac=accounts.find(a=>a.id===i.accountId);
          const noAcct=!i.accountId;
          const isEditing=editId===i.id;
          return(
            <div key={i.id} className="card row" style={{padding:'14px 18px',borderLeft:isEditing?'3px solid #6366f1':noAcct?'3px solid #f59e0b':'3px solid transparent',background:isEditing?'#f5f3ff':noAcct?'#fffdf5':'#fff',transition:'all .15s'}}>
              <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                <div style={{width:'34px',height:'34px',background:'#f0fdf4',borderRadius:'8px',display:'flex',alignItems:'center',justifyContent:'center'}}><Ico n="income" s={15} c="#10b981" sw={2}/></div>
                <div>
                  <div style={{display:'flex',gap:'6px',alignItems:'center',flexWrap:'wrap',marginBottom:'3px'}}>
                    <span style={{fontWeight:'700',color:'#1e293b',fontSize:'13px'}}>{i.type}</span>
                    <span className="badge" style={{background:i.status==='Paid'?'#f0fdf4':'#fff7ed',color:i.status==='Paid'?'#10b981':'#f59e0b'}}>{i.status||'Paid'}</span>
                    {noAcct&&<span className="badge" style={{background:'#fef3c7',color:'#92400e'}}>⚠ No account</span>}
                  </div>
                  <p style={{fontSize:'11px',color:'#94a3b8',margin:0}}>{i.date}{cl?` · ${cl.name}`:''}{ac?` → ${ac.name}`:''}</p>
                </div>
              </div>
              <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
                <span style={{fontWeight:'800',fontSize:'15px',color:'#10b981'}}>{P(i.amount)}</span>
                <button className="ib" style={{color:isEditing?'#6366f1':'#94a3b8',background:isEditing?'#eef2ff':'transparent'}} onClick={()=>isEditing?reset():startEdit(i)} title="Edit"><Ico n="edit" s={15}/></button>
                <button className="ib" onClick={()=>{if(isEditing)reset();setIncome(allIncome.filter(x=>x.id!==i.id));}} title="Delete"><Ico n="trash" s={15}/></button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

  );

              {label:'Payroll',val:mPay,pct:base?mPay/base*100:0,color:'#64748b',icon:'users'},

    </div>
  );

/* ════════  DEBT  ════════ */
function DebtTab({debts,setDebts}){
  const[type,setType]=useState('Credit Card');
  const[name,setName]=useState('');
  const[balance,setBalance]=useState('');
  const[interestRate,setInterestRate]=useState('');
  const[minPayment,setMinPayment]=useState('');
  const[dueDate,setDueDate]=useState('');
  const[lender,setLender]=useState('');
  const[notes,setNotes]=useState('');

  const add=()=>{
    if(!name.trim()||!balance)return;
    setDebts(prev=>[...prev,{id:uid(),type,name:name.trim(),balance:parseFloat(balance)||0,interestRate:parseFloat(interestRate)||0,minPayment:parseFloat(minPayment)||0,dueDate,lender:lender.trim(),notes:notes.trim(),dateAdded:TODAY}]);
    setName('');setBalance('');setInterestRate('');setMinPayment('');setDueDate('');setLender('');setNotes('');
  };

  const del=(id)=>setDebts(prev=>prev.filter(d=>d.id!==id));
  const updateBalance=(id,val)=>setDebts(prev=>prev.map(d=>d.id===id?{...d,balance:parseFloat(val)||0}:d));

  const totalDebt=debts.reduce((s,d)=>s+(d.balance||0),0);
  const totalMin=debts.reduce((s,d)=>s+(d.minPayment||0),0);
  const ccDebts=debts.filter(d=>d.type==='Credit Card');
  const personalDebts=debts.filter(d=>d.type==='Personal');
  const loanDebts=debts.filter(d=>d.type==='Loan');

  const DTYPE_COLOR={
    'Credit Card':'#ef4444','Personal':'#f59e0b','Loan':'#4f46e5'
  };
  const DTYPE_BG={
    'Credit Card':'#fff5f5','Personal':'#fffbeb','Loan':'#f5f3ff'
  };

  const DebtCard=({d})=>(
    <div className="card" style={{padding:'16px 18px'}}>
      <div className="row" style={{marginBottom:'10px'}}>
        <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
          <div style={{padding:'6px 10px',background:DTYPE_BG[d.type]||'#f8fafc',borderRadius:'8px',fontSize:'11px',fontWeight:'700',color:DTYPE_COLOR[d.type]||'#64748b'}}>{d.type}</div>
          <div>
            <p style={{fontWeight:'800',color:'#1e293b',margin:0,fontSize:'14px'}}>{d.name}</p>
            {d.lender&&<p style={{fontSize:'11px',color:'#94a3b8',margin:0}}>{d.lender}</p>}
          </div>
        </div>
        <button className="ib" onClick={()=>del(d.id)}><Ico n="trash" s={14}/></button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))',gap:'8px',marginBottom:'10px'}}>
        <div style={{background:'#f8fafc',borderRadius:'8px',padding:'10px'}}>
          <p style={{fontSize:'10px',color:'#94a3b8',fontWeight:'700',textTransform:'uppercase',margin:'0 0 2px'}}>Balance</p>
          <p style={{fontSize:'16px',fontWeight:'800',color:'#ef4444',margin:0}}>{P(d.balance)}</p>
        </div>
        {d.interestRate>0&&<div style={{background:'#f8fafc',borderRadius:'8px',padding:'10px'}}>
          <p style={{fontSize:'10px',color:'#94a3b8',fontWeight:'700',textTransform:'uppercase',margin:'0 0 2px'}}>Interest</p>
          <p style={{fontSize:'16px',fontWeight:'800',color:'#f59e0b',margin:0}}>{d.interestRate}%/yr</p>
        </div>}
        {d.minPayment>0&&<div style={{background:'#f8fafc',borderRadius:'8px',padding:'10px'}}>
          <p style={{fontSize:'10px',color:'#94a3b8',fontWeight:'700',textTransform:'uppercase',margin:'0 0 2px'}}>Min. Payment</p>
          <p style={{fontSize:'16px',fontWeight:'800',color:'#4f46e5',margin:0}}>{P(d.minPayment)}</p>
        </div>}
        {d.dueDate&&<div style={{background:'#f8fafc',borderRadius:'8px',padding:'10px'}}>
          <p style={{fontSize:'10px',color:'#94a3b8',fontWeight:'700',textTransform:'uppercase',margin:'0 0 2px'}}>Due Date</p>
          <p style={{fontSize:'13px',fontWeight:'700',color:'#1e293b',margin:0}}>{d.dueDate}</p>
        </div>}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
        <span style={{fontSize:'12px',color:'#64748b',fontWeight:'600',whiteSpace:'nowrap'}}>Update balance:</span>
        <input className="fi" type="number" defaultValue={d.balance} onBlur={e=>updateBalance(d.id,e.target.value)} style={{maxWidth:'140px',padding:'6px 10px',fontSize:'13px'}} placeholder="New balance"/>
      </div>
      {d.notes&&<p style={{fontSize:'12px',color:'#94a3b8',margin:'8px 0 0',fontStyle:'italic'}}>{d.notes}</p>}
    </div>
  );

  const Section=({title,items,color})=>items.length===0?null:(
    <div>
      <p style={{fontSize:'11px',fontWeight:'700',color,textTransform:'uppercase',letterSpacing:'.06em',margin:'0 0 8px'}}>{title} ({items.length})</p>
      <div className="col" style={{gap:'10px'}}>{items.map(d=><DebtCard key={d.id} d={d}/>)}</div>
    </div>
  );

  return(
    <div className="col fade" style={{gap:'16px'}}>
      {/* SUMMARY */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:'12px'}}>
        <div className="card" style={{padding:'18px 20px',background:'#fff5f5'}}>
          <p style={{fontSize:'11px',color:'#64748b',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.04em',margin:'0 0 4px'}}>Total Debt</p>
          <p style={{fontSize:'24px',fontWeight:'900',color:'#ef4444',margin:0}}>{P(totalDebt)}</p>
        </div>
        <div className="card" style={{padding:'18px 20px',background:'#fef3c7'}}>
          <p style={{fontSize:'11px',color:'#64748b',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.04em',margin:'0 0 4px'}}>Min. Monthly Payments</p>
          <p style={{fontSize:'24px',fontWeight:'900',color:'#d97706',margin:0}}>{P(totalMin)}</p>
        </div>
        <div className="card" style={{padding:'18px 20px',background:'#f5f3ff'}}>
          <p style={{fontSize:'11px',color:'#64748b',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.04em',margin:'0 0 4px'}}>Number of Debts</p>
          <p style={{fontSize:'24px',fontWeight:'900',color:'#4f46e5',margin:0}}>{debts.length}</p>
        </div>
      </div>

      {/* ADD FORM */}
      <div className="card" style={{padding:'22px'}}>
        <p className="sect">Add Debt</p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:'10px'}}>
          <div>
            <span className="fl">Type</span>
            <select className="fi" value={type} onChange={e=>setType(e.target.value)}>
              <option>Credit Card</option>
              <option>Personal</option>
              <option>Loan</option>
            </select>
          </div>
          <div><span className="fl">Name / Label</span><input className="fi" value={name} onChange={e=>setName(e.target.value)} placeholder={type==='Credit Card'?'e.g. BDO Visa':type==='Personal'?'e.g. Loan from John':'e.g. Car Loan'}/></div>
          <div><span className="fl">Current Balance (₱)</span><input className="fi" type="number" value={balance} onChange={e=>setBalance(e.target.value)} placeholder="0.00"/></div>
          <div><span className="fl">Interest Rate (% / yr)</span><input className="fi" type="number" value={interestRate} onChange={e=>setInterestRate(e.target.value)} placeholder="e.g. 24"/></div>
          <div><span className="fl">Min. Monthly Payment (₱)</span><input className="fi" type="number" value={minPayment} onChange={e=>setMinPayment(e.target.value)} placeholder="0.00"/></div>
          <div><span className="fl">Due Date</span><input className="fi" type="date" value={dueDate} onChange={e=>setDueDate(e.target.value)}/></div>
          <div><span className="fl">Lender / Bank</span><input className="fi" value={lender} onChange={e=>setLender(e.target.value)} placeholder="e.g. BDO, GCash, Friend"/></div>
          <div><span className="fl">Notes</span><input className="fi" value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Optional"/></div>
        </div>
        <button className="btn bp" style={{marginTop:'14px'}} onClick={add} disabled={!name.trim()||!balance}>
          <Ico n="warning" s={14} c="#fff"/>Add Debt
        </button>
      </div>

      {/* DEBT LISTS */}
      {debts.length===0?(
        <div className="card" style={{padding:'40px',textAlign:'center',color:'#94a3b8',fontSize:'13px'}}>No debts tracked yet. Great!</div>
      ):(
        <div className="col" style={{gap:'20px'}}>
          <Section title="Credit Card Debt" items={ccDebts} color="#ef4444"/>
          <Section title="Personal Debt" items={personalDebts} color="#f59e0b"/>
          <Section title="Loans" items={loanDebts} color="#4f46e5"/>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
