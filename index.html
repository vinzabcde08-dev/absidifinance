    .ib:hover{background:#fee2e2;color:#ef4444}
    .pct-input{width:64px;padding:6px 8px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:14px;font-weight:700;text-align:center;outline:none;color:#4f46e5}

    piggy:    [<path key="1" {...d} d="M19 12c0-3.87-3.13-7-7-7S5 8.13 5 12v1H3v3h2v.27A3 3 0 006 19h.5l1 2h1l1-2h7l1 2h1l1-2H19a3 3 0 001-2.73V16h2v-3h-2v-1z"/>,<circle key="2" {...d} cx="15" cy="11" r="1" fill={c}/>],
    cross:    [<line key="1" {...d} x1="12" y1="3" x2="12" y2="21"/>,<line key="2" {...d} x1="3" y1="10" x2="21" y2="10"/>],
    lock:     [<rect key="1" {...d} x="3" y="11" width="18" height="11" rx="2"/>,<path key="2" {...d} d="M7 11V7a5 5 0 0110 0v4"/>],
    fire:     [<path key="1" {...d} d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 3z"/>],
    dollar:   [<line key="1" {...d} x1="12" y1="1" x2="12" y2="23"/>,<path key="2" {...d} d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>],
    check:    [<polyline key="1" {...d} points="20,6 9,17 4,12"/>],
  };
  return(
    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" style={{flexShrink:0,display:'inline-block',verticalAlign:'middle',...style}}>
      {paths[n]||null}
    </svg>
  );
}

/* ════════════════
   LOGIN
════════════════ */
function LoginScreen({onLogin}){
  const[user,setUser]=useState('');
  const[pass,setPass]=useState('');
  const[err,setErr]=useState('');
  const isNew=!ls.get('af_user',null);

  const submit=()=>{
    if(!user.trim()||!pass.trim()){setErr('Please fill in all fields.');return;}
    if(isNew){
      if(pass.length<4){setErr('Password must be at least 4 characters.');return;}
      ls.set('af_user',user.trim());ls.set('af_pass',pass);ls.set('af_loggedIn',true);onLogin();
    }else{
      if(user.trim()===ls.get('af_user','')&&pass===ls.get('af_pass','')){ls.set('af_loggedIn',true);onLogin();}
      else setErr('Incorrect username or password.');
    }
  };

  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%)',display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'}}>
      <div className="card fade" style={{width:'100%',maxWidth:'400px',padding:'40px 36px'}}>
        <div style={{textAlign:'center',marginBottom:'32px'}}>
          <div style={{width:'52px',height:'52px',background:'linear-gradient(135deg,#4f46e5,#7c3aed)',borderRadius:'14px',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px'}}>
            <Ico n="gem" s={26} c="#fff" sw={1.5}/>
          </div>
          <h1 style={{fontSize:'22px',fontWeight:'800',color:'#1e293b',margin:'0 0 4px'}}>AbsidiFinance</h1>
          <p style={{color:'#64748b',fontSize:'13px',margin:0}}>{isNew?'Create your account to get started':'Welcome back'}</p>
        </div>
        <div className="col">
          <div><span className="fl">Username</span><input className="fi" value={user} onChange={e=>setUser(e.target.value)} onKeyPress={e=>e.key==='Enter'&&submit()} placeholder="Enter username"/></div>
          <div><span className="fl">Password</span><input className="fi" type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyPress={e=>e.key==='Enter'&&submit()} placeholder={isNew?"Min 4 characters":"Enter password"}/></div>
          {err&&<div style={{background:'#fef2f2',border:'1px solid #fecaca',color:'#dc2626',padding:'10px 14px',borderRadius:'9px',fontSize:'13px'}}>{err}</div>}
          <button className="btn bp" style={{width:'100%',justifyContent:'center',padding:'12px'}} onClick={submit}>
            {isNew?'Create Account':'Login'}
          </button>
          {isNew&&<p style={{fontSize:'11px',color:'#94a3b8',textAlign:'center',margin:'4px 0 0'}}>Credentials are saved locally in this browser.</p>}
        </div>
      </div>
    </div>
  );
}

/* ════════════════
   APP ROOT
════════════════ */
function App(){
  const[loggedIn,setLoggedIn]=useState(()=>checkSession());
  if(!loggedIn)return<LoginScreen onLogin={()=>setLoggedIn(true)}/>;
  return<MainApp onLogout={()=>{ls.set('af_loggedIn',false);setLoggedIn(false);}}/>;
}

/* ════════════════
   MAIN APP
════════════════ */
function MainApp({onLogout}){
  const[subs,setSubs]=useState(()=>ls.get('ph_subs',[]));
  const[income,setIncome]=useState(()=>ls.get('ph_income',[]));
  const[expenses,setExpenses]=useState(()=>ls.get('ph_exp',[]));
  const[clients,setClients]=useState(()=>ls.get('ph_clients',[]));
  const[accounts,setAccounts]=useState(()=>ls.get('ph_accts',[]));
  const[cards,setCards]=useState(()=>ls.get('ph_cards',[]));
  const[employees,setEmployees]=useState(()=>ls.get('ph_emps',[]));
  const[payroll,setPayroll]=useState(()=>ls.get('ph_payroll',[]));
  const[settings,setSettings]=useState(()=>ls.get('ph_settings',DEFAULT_SETTINGS));
  const[year,setYear]=useState(String(CUR_YEAR));
  const[tab,setTab]=useState('home');
  const[showReset,setShowReset]=useState(false);
  const[resetVal,setResetVal]=useState('');
  const[showSettings,setShowSettings]=useState(false);
  const settingsRef=useRef(null);

  useEffect(()=>{
    const h=e=>{if(settingsRef.current&&!settingsRef.current.contains(e.target))setShowSettings(false);};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[]);

  useEffect(()=>{ls.set('ph_subs',subs);},[subs]);
  useEffect(()=>{ls.set('ph_income',income);},[income]);
  useEffect(()=>{ls.set('ph_exp',expenses);},[expenses]);
  useEffect(()=>{ls.set('ph_clients',clients);},[clients]);
  useEffect(()=>{ls.set('ph_accts',accounts);},[accounts]);
  useEffect(()=>{ls.set('ph_cards',cards);},[cards]);
  useEffect(()=>{ls.set('ph_emps',employees);},[employees]);
  useEffect(()=>{ls.set('ph_payroll',payroll);},[payroll]);
  useEffect(()=>{ls.set('ph_settings',settings);},[settings]);

  const yr=parseInt(year)||CUR_YEAR;
  const daysInMonth=new Date(yr,CUR_MONTH+1,0).getDate();
  const daysLeft=daysInMonth-CUR_DAY;
  const curMonthKey=`${yr}-${String(CUR_MONTH+1).padStart(2,'0')}`;

  const byYear=arr=>arr.filter(x=>x.date&&yK(x.date)===yr);
  const byMonth=arr=>arr.filter(x=>x.date&&mK(x.date)===curMonthKey);

  const mInc=byMonth(income).reduce((s,x)=>s+(x.amount||0),0);
  const mExp=byMonth(expenses).reduce((s,x)=>s+(x.amount||0),0);
  const mSub=byMonth(subs).reduce((s,x)=>s+(x.amount||0),0);
  const mPay=byMonth(payroll).reduce((s,x)=>s+(x.amount||0),0);

  const last3=[0,1,2].map(i=>{
    const d=new Date(yr,CUR_MONTH-i,1);
    return income.filter(x=>{const xd=new Date(x.date);return xd.getFullYear()===d.getFullYear()&&xd.getMonth()===d.getMonth();}).reduce((s,x)=>s+(x.amount||0),0);
  });
  const avg3=last3.reduce((a,b)=>a+b,0)/3;
  const base=settings.budgetMode==='avg'?avg3:mInc;
  const tithe=(base*settings.tithePct)/100;
  const invest=(base*settings.investPct)/100;
  const desires=(base*settings.desiresPct)/100;
  const savings=(base*settings.savingsPct)/100;
  const spendBudget=base-tithe-invest-desires-savings-mSub-mPay;
  const dailyCap=daysLeft>0?Math.max(0,(spendBudget-mExp)/daysLeft):0;
  const totalFixed=settings.tithePct+settings.investPct+settings.desiresPct+settings.savingsPct;

  const accBal=id=>{
    const a=accounts.find(x=>x.id===id);if(!a)return 0;
    const i=income.filter(x=>x.accountId===id&&yK(x.date)===yr).reduce((s,x)=>s+x.amount,0);
    const e=expenses.filter(x=>x.accountId===id&&yK(x.date)===yr).reduce((s,x)=>s+x.amount,0);
    const p=payroll.filter(x=>x.accountId===id&&yK(x.date)===yr).reduce((s,x)=>s+x.amount,0);
    return a.openingBalance+i-e-p;
  };

  const exportCSV=()=>{
    let csv=`AbsidiFinance Export — Year ${yr}\n\n`;
    csv+=`INCOME\nDate,Type,Client,Account,Amount,Status\n`;
    byYear(income).forEach(x=>{const cl=clients.find(c=>c.id===x.clientId);const ac=accounts.find(a=>a.id===x.accountId);csv+=`${x.date},${x.type},${cl?.name||''},${ac?.name||''},${x.amount},${x.status||''}\n`;});
    csv+=`\nEXPENSES\nDate,Category,Account,Card,Amount\n`;
    byYear(expenses).forEach(x=>{const ac=accounts.find(a=>a.id===x.accountId);const cd=cards.find(c=>c.id===x.cardId);csv+=`${x.date},${x.category},${ac?.name||''},${cd?.name||''},${x.amount}\n`;});
    csv+=`\nSUBSCRIPTIONS\nName,Amount,Date,Account,Card\n`;
    byYear(subs).forEach(x=>{const ac=accounts.find(a=>a.id===x.accountId);const cd=cards.find(c=>c.id===x.cardId);csv+=`${x.name},${x.amount},${x.date},${ac?.name||''},${cd?.name||''}\n`;});
    csv+=`\nPAYROLL\nDate,Employee,Account,Amount\n`;
    byYear(payroll).forEach(x=>{const em=employees.find(e=>e.id===x.employeeId);const ac=accounts.find(a=>a.id===x.accountId);csv+=`${x.date},${em?.name||''},${ac?.name||''},${x.amount}\n`;});
    const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
    const link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download=`AbsidiFinance_${yr}.csv`;link.style.display='none';
    document.body.appendChild(link);setTimeout(()=>{link.click();setTimeout(()=>{document.body.removeChild(link);URL.revokeObjectURL(link.href);},200);},100);
    setShowSettings(false);
  };

  const TABS=[
    {id:'home',icon:'home',label:'Home'},
    {id:'accounts',icon:'bank',label:'Accounts'},
    {id:'cards',icon:'card',label:'Cards'},
    {id:'clients',icon:'user',label:'Clients'},
    {id:'income',icon:'income',label:'Income'},
    {id:'expenses',icon:'expenses',label:'Expenses'},
    {id:'subs',icon:'calendar',label:'Subs'},
    {id:'payroll',icon:'users',label:'Payroll'},
    {id:'budget',icon:'chart',label:'Budget'},
  ];

  return(
    <div style={{minHeight:'100vh'}}>
      {/* HEADER */}
      <div style={{background:'linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%)',boxShadow:'0 2px 12px rgba(79,70,229,.3)'}}>
        <div style={{maxWidth:'1100px',margin:'0 auto',padding:'0 20px'}}>
          <div className="row" style={{padding:'14px 0'}}>
            {/* LOGO */}
            <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
              <div style={{width:'34px',height:'34px',background:'rgba(255,255,255,.15)',borderRadius:'9px',display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid rgba(255,255,255,.2)'}}>
                <Ico n="gem" s={18} c="#fff" sw={1.5}/>
              </div>
              <div>
                <span style={{fontSize:'17px',fontWeight:'800',color:'#fff',letterSpacing:'-0.3px'}}>AbsidiFinance</span>
                <span style={{fontSize:'10px',fontWeight:'700',color:'rgba(255,255,255,.55)',marginLeft:'6px',letterSpacing:'1px'}}>PH</span>
              </div>
            </div>
            {/* RIGHT CONTROLS */}
            <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
              <div style={{display:'flex',alignItems:'center',gap:'7px'}}>
                <span style={{fontSize:'11px',color:'rgba(255,255,255,.65)',fontWeight:'600',letterSpacing:'.02em'}}>YEAR</span>
                <input type="number" className="yr-input" value={year} onChange={e=>setYear(e.target.value)} min="2020" max="2035" title="Type a year"/>
              </div>
              <div style={{position:'relative'}} ref={settingsRef}>
                <button
                  onClick={()=>setShowSettings(v=>!v)}
                  style={{background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.2)',borderRadius:'8px',padding:'7px',cursor:'pointer',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',transition:'background .15s'}}
                  onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.22)'}
                  onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,.12)'}
                >
                  <Ico n="settings" s={16} c="#fff"/>
                </button>
                {showSettings&&(
                  <div className="settings-dropdown fade">
                    <div style={{padding:'12px 16px',borderBottom:'1px solid #f1f5f9'}}>
                      <p style={{fontSize:'10px',fontWeight:'700',color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.06em',margin:'0 0 4px'}}>Signed in as</p>
                      <p style={{fontWeight:'700',color:'#1e293b',fontSize:'14px',margin:0}}>{ls.get('af_user','')}</p>
                    </div>
                    <button className="dmi-btn" onClick={exportCSV} style={{color:'#4f46e5'}}
                      onMouseEnter={e=>e.currentTarget.style.background='#f5f3ff'}
                      onMouseLeave={e=>e.currentTarget.style.background='none'}
                    ><Ico n="download" s={15} c="#4f46e5"/>Export CSV ({yr})</button>
                    <button className="dmi-btn" onClick={()=>{setShowSettings(false);setShowReset(true);}} style={{color:'#ef4444',borderTop:'1px solid #f1f5f9'}}
                      onMouseEnter={e=>e.currentTarget.style.background='#fff5f5'}
                      onMouseLeave={e=>e.currentTarget.style.background='none'}
                    ><Ico n="warning" s={15} c="#ef4444"/>Reset All Data</button>
                    <button className="dmi-btn" onClick={onLogout} style={{color:'#64748b',borderTop:'1px solid #f1f5f9'}}
                      onMouseEnter={e=>e.currentTarget.style.background='#f8fafc'}
                      onMouseLeave={e=>e.currentTarget.style.background='none'}
                    ><Ico n="logout" s={15} c="#64748b"/>Logout</button>
                  </div>
                )}
              </div>
            </div>
          </div>
          {/* TABS */}
          <div style={{display:'flex',gap:'2px',paddingBottom:'10px',overflowX:'auto'}}>
            {TABS.map(t=>(
              <button key={t.id} className={`tab-btn${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>
                <Ico n={t.icon} s={14} c="currentColor"/>
                {t.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* SUBTITLE */}
      <div style={{background:'#fff',borderBottom:'1px solid #e2e8f0',padding:'8px 0'}}>
        <div style={{maxWidth:'1100px',margin:'0 auto',padding:'0 20px',display:'flex',alignItems:'center',gap:'6px'}}>
          <span style={{fontSize:'12px',color:'#64748b'}}>All in ₱</span>
          <span style={{color:'#cbd5e1'}}>·</span>
          <span style={{fontSize:'12px',color:'#64748b'}}>Editable allocations</span>
          <span style={{color:'#cbd5e1'}}>·</span>
          <span style={{fontSize:'12px',color:'#64748b'}}>Year: {yr}</span>
          {db&&<><span style={{color:'#cbd5e1'}}>·</span><span style={{fontSize:'12px',color:'#10b981',fontWeight:'600',display:'flex',alignItems:'center',gap:'4px'}}><Ico n="fire" s={12} c="#10b981"/>Firebase synced</span></>}
        </div>
      </div>

      {/* CONTENT */}
      <div style={{maxWidth:'1100px',margin:'0 auto',padding:'24px 20px'}}>
        {tab==='home'&&<HomeTab mInc={mInc} mExp={mExp} mSub={mSub} mPay={mPay} base={base} tithe={tithe} invest={invest} desires={desires} savings={savings} spendBudget={spendBudget} dailyCap={dailyCap} daysLeft={daysLeft} accounts={accounts} accBal={accBal} settings={settings} totalFixed={totalFixed}/>}
        {tab==='accounts'&&<AccountsTab accounts={accounts} setAccounts={setAccounts} accBal={accBal}/>}
        {tab==='cards'&&<CardsTab cards={cards} setCards={setCards} expenses={byMonth(expenses)}/>}
        {tab==='clients'&&<ClientsTab clients={clients} setClients={setClients} income={byMonth(income)}/>}
        {tab==='income'&&<IncomeTab income={byMonth(income)} allIncome={income} setIncome={setIncome} clients={clients} accounts={accounts}/>}
        {tab==='expenses'&&<ExpensesTab expenses={byMonth(expenses)} allExpenses={expenses} setExpenses={setExpenses} accounts={accounts} cards={cards}/>}
        {tab==='subs'&&<SubsTab subs={byMonth(subs)} allSubs={subs} setSubs={setSubs} accounts={accounts} cards={cards}/>}
        {tab==='payroll'&&<PayrollTab payroll={byMonth(payroll)} allPayroll={payroll} setPayroll={setPayroll} employees={employees} setEmployees={setEmployees} accounts={accounts}/>}
        {tab==='budget'&&<BudgetTab base={base} avg3={avg3} mInc={mInc} settings={settings} setSettings={setSettings} mExp={mExp} mSub={mSub} mPay={mPay} spendBudget={spendBudget} dailyCap={dailyCap} daysLeft={daysLeft} tithe={tithe} invest={invest} desires={desires} savings={savings} totalFixed={totalFixed} exportCSV={exportCSV}/>}
      </div>

      {/* RESET MODAL */}
      {showReset&&(
        <div className="modal-overlay">
          <div className="card fade" style={{width:'100%',maxWidth:'380px',padding:'28px'}}>
            <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'12px'}}>
              <div style={{background:'#fef2f2',borderRadius:'10px',padding:'8px',display:'flex'}}><Ico n="warning" s={20} c="#ef4444"/></div>
              <h2 style={{color:'#ef4444',fontWeight:'800',margin:0,fontSize:'18px'}}>Reset All Data</h2>
            </div>
            <p style={{color:'#64748b',fontSize:'13px',margin:'0 0 20px'}}>This will permanently delete all financial records. Your login remains. This cannot be undone.</p>
            <div style={{marginBottom:'16px'}}>
              <span className="fl">Type RESET to confirm</span>
              <input className="fi" value={resetVal} onChange={e=>setResetVal(e.target.value)} placeholder="RESET"/>
            </div>
            <div style={{display:'flex',gap:'10px'}}>
              <button className="btn bs" style={{flex:1,justifyContent:'center'}} onClick={()=>{setShowReset(false);setResetVal('');}}>Cancel</button>
              <button className="btn br" style={{flex:1,justifyContent:'center'}} onClick={()=>{if(resetVal==='RESET'){ls.clear();window.location.reload();}}}>Confirm Reset</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ════════  HOME  ════════ */
function HomeTab({mInc,mExp,mSub,mPay,base,tithe,invest,desires,savings,spendBudget,dailyCap,daysLeft,accounts,accBal,settings,totalFixed}){
  const net=mInc-mExp-mSub-mPay;
  const STATS=[
    {label:'Monthly Income',value:P(mInc),color:'#10b981',bg:'#f0fdf4',icon:'income'},
    {label:'Monthly Expenses',value:P(mExp),color:'#ef4444',bg:'#fff5f5',icon:'expenses'},

/* ════════  CARDS  ════════ */
function CardsTab({cards,setCards,expenses}){
  const[name,setName]=useState('');const[limit,setLimit]=useState('');const[billingDay,setBillingDay]=useState('');const[dueDay,setDueDay]=useState('');
  const add=()=>{if(!name.trim())return;setCards([...cards,{id:uid(),name:name.trim(),limit:parseFloat(limit)||0,billingDay:parseInt(billingDay)||1,dueDay:parseInt(dueDay)||20}]);setName('');setLimit('');setBillingDay('');setDueDay('');};
  return(
    <div style={{display:'grid',gridTemplateColumns:'360px 1fr',gap:'16px',alignItems:'start'}} className="fade">
      <div className="card" style={{padding:'22px'}}>
        <p className="sect">Add Credit Card</p>
        <div className="col">
          <div><span className="fl">Card Name</span><input className="fi" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. BPI Visa Platinum"/></div>
          <div><span className="fl">Credit Limit (₱)</span><input className="fi" type="number" value={limit} onChange={e=>setLimit(e.target.value)} placeholder="0.00"/></div>
          <div><span className="fl">Billing Statement Day</span><input className="fi" type="number" value={billingDay} onChange={e=>setBillingDay(e.target.value)} placeholder="e.g. 5"/></div>
          <div><span className="fl">Payment Due Day</span><input className="fi" type="number" value={dueDay} onChange={e=>setDueDay(e.target.value)} placeholder="e.g. 25"/></div>
          <button className="btn bp" onClick={add}><Ico n="card" s={14} c="#fff"/>Add Card</button>
        </div>
      </div>
      <div className="col" style={{gap:'10px'}}>
        {cards.length===0&&<div className="card" style={{padding:'40px',textAlign:'center',color:'#94a3b8',fontSize:'13px'}}>No cards yet.</div>}
        {cards.map(c=>{
          const spent=expenses.filter(e=>e.cardId===c.id).reduce((s,e)=>s+e.amount,0);
          const util=c.limit?Math.min(100,(spent/c.limit)*100):0;
          const today=new Date().getDate();
          const dtd=c.dueDay>=today?c.dueDay-today:30-(today-c.dueDay);
          return(
            <div key={c.id} className="card" style={{padding:'18px 20px'}}>
              <div className="row" style={{marginBottom:'12px'}}>
                <div style={{display:'flex',alignItems:'center',gap:'12px'}}>

                  <div>
                    <p style={{fontWeight:'800',color:'#1e293b',margin:'0 0 4px'}}>{c.name}</p>
                    <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
                      <span className="badge" style={{background:'#f1f5f9',color:'#64748b'}}>Limit: {P(c.limit)}</span>
                      {dtd<=5&&<span className="badge" style={{background:'#fef2f2',color:'#ef4444'}}><Ico n="warning" s={10} c="#ef4444"/>Due in {dtd}d</span>}
                    </div>
                  </div>
                </div>
                <button className="ib" onClick={()=>setCards(cards.filter(x=>x.id!==c.id))}><Ico n="trash" s={15}/></button>
              </div>
              <div style={{marginBottom:'6px'}}>
                <div className="row" style={{marginBottom:'4px'}}>
                  <span style={{fontSize:'12px',color:'#64748b'}}>Used this month</span>
                  <span style={{fontSize:'13px',fontWeight:'700',color:util>80?'#ef4444':'#1e293b'}}>{P(spent)} ({util.toFixed(0)}%)</span>
                </div>
                <div className="pbar"><div className="pfill" style={{width:`${util}%`,background:util>80?'#ef4444':util>50?'#f59e0b':'#4f46e5'}}/></div>
              </div>
              <p style={{fontSize:'12px',color:'#94a3b8',margin:0}}>Billing day: {c.billingDay} · Due day: {c.dueDay}</p>
            </div>
          );
        })}
      </div>
    </div>
  );
}

  return(
    <div style={{display:'grid',gridTemplateColumns:'360px 1fr',gap:'16px',alignItems:'start'}} className="fade">
      <div className="card" style={{padding:'22px'}}>
        <p className="sect">Add Subscription</p>
        <div className="col">
          <div><span className="fl">Service Name</span><input className="fi" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Netflix, Spotify"/></div>
          <div><span className="fl">Amount (₱)</span><input className="fi" type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0.00"/></div>
          <div><span className="fl">Next Billing Date</span><input className="fi" type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
          <div><span className="fl">Frequency</span><select className="fi" value={freq} onChange={e=>setFreq(e.target.value)}><option value="monthly">Monthly</option><option value="yearly">Yearly</option><option value="weekly">Weekly</option><option value="quarterly">Quarterly</option></select></div>
          <div><span className="fl">Charged to Account</span><select className="fi" value={accountId} onChange={e=>{setAccountId(e.target.value);if(e.target.value)setCardId('');}}><option value="">— Select account —</option>{accounts.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select></div>
          <div><span className="fl">or Card</span><select className="fi" value={cardId} onChange={e=>{setCardId(e.target.value);if(e.target.value)setAccountId('');}}><option value="">— Select card —</option>{cards.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
          <button className="btn bp" onClick={add}><Ico n="calendar" s={14} c="#fff"/>Add Subscription</button>
        </div>
      </div>
      <div className="col" style={{gap:'10px'}}>
        {subs.length===0&&<div className="card" style={{padding:'40px',textAlign:'center',color:'#94a3b8',fontSize:'13px'}}>No subscriptions yet.</div>}
        {subs.map(s=>{
          const ac=accounts.find(a=>a.id===s.accountId);const cd=cards.find(c=>c.id===s.cardId);
          const dl=Math.round((new Date(s.date)-new Date(TODAY))/(864e5));
          return(
            <div key={s.id} className="card row" style={{padding:'14px 18px'}}>
              <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                <div style={{width:'34px',height:'34px',background:'#faf5ff',borderRadius:'8px',display:'flex',alignItems:'center',justifyContent:'center'}}><Ico n="calendar" s={15} c="#7c3aed" sw={1.75}/></div>
                <div>
                  <div style={{display:'flex',gap:'6px',alignItems:'center',marginBottom:'3px'}}>
                    <span style={{fontWeight:'700',color:'#1e293b'}}>{s.name}</span>
                    {dl>=0&&dl<=5&&<span className="badge" style={{background:'#fef2f2',color:'#ef4444'}}><Ico n="warning" s={10} c="#ef4444"/>Due in {dl}d</span>}
                  </div>
                  <p style={{fontSize:'11px',color:'#94a3b8',margin:0}}>{s.freq} · {s.date}{ac?` · ${ac.name}`:''}{cd?` · ${cd.name}`:''}</p>
                </div>
              </div>
              <div style={{display:'flex',gap:'10px',alignItems:'center'}}>
                <span style={{fontWeight:'800',color:'#4f46e5'}}>{P(s.amount)}</span>
                <button className="ib" onClick={()=>setSubs(allSubs.filter(x=>x.id!==s.id))}><Ico n="trash" s={15}/></button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ════════  PAYROLL  ════════ */
function PayrollTab({payroll,allPayroll,setPayroll,employees,setEmployees,accounts}){
  const[empName,setEmpName]=useState('');const[empRole,setEmpRole]=useState('');const[date,setDate]=useState(TODAY);const[employeeId,setEmployeeId]=useState('');const[amount,setAmount]=useState('');const[accountId,setAccountId]=useState('');
  const addEmp=()=>{if(!empName.trim())return;setEmployees([...employees,{id:uid(),name:empName.trim(),role:empRole.trim()}]);setEmpName('');setEmpRole('');};
  const addPay=()=>{if(!amount)return;setPayroll([...allPayroll,{id:uid(),date,employeeId,amount:parseFloat(amount),accountId}]);setAmount('');};
  return(
    <div style={{display:'grid',gridTemplateColumns:'360px 1fr',gap:'16px',alignItems:'start'}} className="fade">
      <div className="col" style={{gap:'16px'}}>
        <div className="card" style={{padding:'22px'}}>
          <p className="sect">Add Employee</p>
          <div className="col">
            <div><span className="fl">Name</span><input className="fi" value={empName} onChange={e=>setEmpName(e.target.value)} placeholder="Employee name"/></div>
            <div><span className="fl">Role</span><input className="fi" value={empRole} onChange={e=>setEmpRole(e.target.value)} placeholder="e.g. Virtual Assistant"/></div>
            <button className="btn bp" onClick={addEmp}><Ico n="users" s={14} c="#fff"/>Add Employee</button>
          </div>
          {employees.length>0&&<div style={{marginTop:'16px',borderTop:'1px solid #f1f5f9',paddingTop:'14px'}}>
            {employees.map(e=>(
              <div key={e.id} className="row" style={{padding:'7px 0'}}>
                <div style={{display:'flex',alignItems:'center',gap:'9px'}}>
                  <div style={{width:'30px',height:'30px',background:'#f5f3ff',borderRadius:'7px',display:'flex',alignItems:'center',justifyContent:'center'}}><Ico n="user" s={14} c="#7c3aed" sw={1.75}/></div>
                  <div><p style={{fontWeight:'700',fontSize:'13px',margin:0}}>{e.name}</p><p style={{fontSize:'11px',color:'#94a3b8',margin:0}}>{e.role}</p></div>
                </div>
                <button className="ib" onClick={()=>setEmployees(employees.filter(x=>x.id!==e.id))}><Ico n="trash" s={14}/></button>
              </div>
            ))}
          </div>}
        </div>
        <div className="card" style={{padding:'22px'}}>
          <p className="sect">Record Payment</p>
          <div className="col">
            <div><span className="fl">Date</span><input className="fi" type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
            <div><span className="fl">Employee</span><select className="fi" value={employeeId} onChange={e=>setEmployeeId(e.target.value)}><option value="">— Select employee —</option>{employees.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}</select></div>
            <div><span className="fl">Amount (₱)</span><input className="fi" type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0.00"/></div>
            <div><span className="fl">Paid from Account</span><select className="fi" value={accountId} onChange={e=>setAccountId(e.target.value)}><option value="">— Select account —</option>{accounts.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select></div>
            <button className="btn bp" onClick={addPay}><Ico n="dollar" s={14} c="#fff"/>Record Payment</button>
          </div>
        </div>
      </div>
      <div className="col" style={{gap:'8px',maxHeight:'75vh',overflowY:'auto'}}>
        {payroll.length===0&&<div className="card" style={{padding:'40px',textAlign:'center',color:'#94a3b8',fontSize:'13px'}}>No payroll records this month.</div>}
        {[...payroll].reverse().map(p=>{
          const em=employees.find(e=>e.id===p.employeeId);const ac=accounts.find(a=>a.id===p.accountId);
          return(
            <div key={p.id} className="card row" style={{padding:'14px 18px'}}>
              <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                <div style={{width:'34px',height:'34px',background:'#faf5ff',borderRadius:'8px',display:'flex',alignItems:'center',justifyContent:'center'}}><Ico n="users" s={15} c="#7c3aed" sw={1.75}/></div>
                <div>
                  <p style={{fontWeight:'700',color:'#1e293b',fontSize:'13px',margin:'0 0 3px'}}>{em?.name||'Unknown'}</p>
                  <p style={{fontSize:'11px',color:'#94a3b8',margin:0}}>{p.date}{ac?` · ${ac.name}`:''}</p>
                </div>
              </div>
              <div style={{display:'flex',gap:'10px',alignItems:'center'}}>
                <span style={{fontWeight:'800',fontSize:'15px',color:'#ef4444'}}>{P(p.amount)}</span>
                <button className="ib" onClick={()=>setPayroll(allPayroll.filter(x=>x.id!==p.id))}><Ico n="trash" s={15}/></button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ════════  BUDGET  ════════ */
function BudgetTab({base,avg3,mInc,settings,setSettings,mExp,mSub,mPay,spendBudget,dailyCap,daysLeft,tithe,invest,desires,savings,totalFixed,exportCSV}){
  const upd=(k,v)=>setSettings(s=>({...s,[k]:v}));
  const ALLOC=[
    {label:'Tithes',key:'tithePct',color:'#f59e0b',icon:'cross'},
    {label:'Investments',key:'investPct',color:'#4f46e5',icon:'trend-up'},
    {label:'Desires',key:'desiresPct',color:'#ec4899',icon:'star'},
    {label:'Savings',key:'savingsPct',color:'#10b981',icon:'piggy'},
  ];
  return(
    <div className="col fade" style={{gap:'16px'}}>
      {/* ALLOCATION RULES */}
      <div className="card" style={{padding:'22px'}}>
        <p className="sect">Allocation Rules (Editable)</p>
        <div style={{display:'flex',flexWrap:'wrap',gap:'20px',alignItems:'center'}}>
          {ALLOC.map(r=>(
            <div key={r.key} style={{display:'flex',alignItems:'center',gap:'8px'}}>
              <Ico n={r.icon} s={15} c={r.color} sw={2}/>
              <span style={{fontSize:'13px',fontWeight:'700',color:'#1e293b'}}>{r.label}</span>
              <input type="number" className="pct-input" value={settings[r.key]} onChange={e=>upd(r.key,Math.max(0,parseInt(e.target.value)||0))} style={{borderColor:r.color,color:r.color}}/>
              <span style={{fontSize:'13px',color:'#64748b',fontWeight:'600'}}>%</span>
            </div>
          ))}
          <span style={{fontSize:'12px',color:'#94a3b8',marginLeft:'4px'}}>Total fixed: <strong style={{color:totalFixed>100?'#ef4444':'#1e293b'}}>{totalFixed}%</strong></span>
        </div>
      </div>

      {/* BUDGET BASELINE */}
      <div className="card" style={{padding:'22px'}}>
        <div className="row">
          <p className="sect" style={{margin:0}}>Budget Baseline</p>
          <span style={{fontSize:'12px',color:'#94a3b8'}}>Stable for irregular income</span>
        </div>
        <div style={{display:'flex',gap:'8px',marginTop:'12px'}}>
          <button className={`btn${settings.budgetMode==='avg'?' bp':' bs'}`} onClick={()=>upd('budgetMode','avg')} style={{display:'flex',alignItems:'center',gap:'7px'}}>
            <Ico n="chart" s={14} c={settings.budgetMode==='avg'?'#fff':'#475569'}/>3-Month Avg
          </button>
          <button className={`btn${settings.budgetMode==='actual'?' bp':' bs'}`} onClick={()=>upd('budgetMode','actual')} style={{display:'flex',alignItems:'center',gap:'7px'}}>
            <Ico n="calendar" s={14} c={settings.budgetMode==='actual'?'#fff':'#475569'}/>This Month
          </button>
        </div>
      </div>

      {/* BASE CARD */}
      <div style={{background:'linear-gradient(135deg,#4f46e5,#7c3aed)',borderRadius:'14px',padding:'24px 28px',color:'#fff'}}>
        <p style={{fontSize:'10px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.08em',opacity:.7,margin:'0 0 8px'}}>
          {settings.budgetMode==='avg'?'3-Month Rolling Avg':'This Month Actual'}
        </p>
        <p style={{fontSize:'36px',fontWeight:'900',margin:'0 0 4px',letterSpacing:'-1px'}}>₱{base.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</p>
        {settings.budgetMode==='avg'&&<p style={{fontSize:'12px',opacity:.7,margin:0}}>This month actual: ₱{mInc.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</p>}
      </div>

      {/* DAILY SPEND CAP */}
      <div className="card" style={{padding:'22px'}}>
        <div className="row">
          <div style={{display:'flex',gap:'14px',alignItems:'center'}}>
            <div style={{background:'#f5f3ff',borderRadius:'10px',padding:'10px',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <Ico n="calendar" s={20} c="#7c3aed" sw={1.75}/>
            </div>
            <div>
              <p style={{fontWeight:'800',color:'#1e293b',margin:'0 0 3px'}}>Daily Spend Cap</p>
              <p style={{fontSize:'12px',color:'#94a3b8',margin:'0 0 2px'}}>{daysLeft} days left · Budget for essentials: {P(spendBudget)}</p>
              <p style={{fontSize:'12px',color:'#94a3b8',margin:0}}>Already spent: {P(mExp)} · Remaining: {P(Math.max(0,spendBudget-mExp))}</p>
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            <p style={{fontSize:'32px',fontWeight:'900',color:'#ef4444',margin:0}}>₱{dailyCap.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</p>
            <p style={{fontSize:'12px',color:'#94a3b8',margin:0}}>per day</p>
          </div>
        </div>
      </div>

      {/* BREAKDOWN */}
      {base>0?(
        <div className="card" style={{padding:'22px'}}>
          <p className="sect">Full Breakdown</p>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:'12px'}}>
            {[
              {label:'Tithes',val:tithe,pct:settings.tithePct,color:'#f59e0b',icon:'cross'},
              {label:'Investments',val:invest,pct:settings.investPct,color:'#4f46e5',icon:'trend-up'},
              {label:'Desires',val:desires,pct:settings.desiresPct,color:'#ec4899',icon:'star'},
              {label:'Savings',val:savings,pct:settings.savingsPct,color:'#10b981',icon:'piggy'},
              {label:'Subscriptions',val:mSub,pct:base?mSub/base*100:0,color:'#64748b',icon:'calendar'},
              {label:'Payroll',val:mPay,pct:base?mPay/base*100:0,color:'#64748b',icon:'users'},
              {label:'Spendable',val:spendBudget,pct:base?spendBudget/base*100:0,color:'#06b6d4',icon:'dollar'},
            ].map(r=>(
              <div key={r.label} style={{background:'#f8fafc',borderRadius:'10px',padding:'14px'}}>
                <div className="row" style={{marginBottom:'6px'}}>
                  <span style={{fontSize:'12px',color:'#64748b',fontWeight:'700',display:'flex',alignItems:'center',gap:'5px'}}><Ico n={r.icon} s={12} c={r.color} sw={2}/>{r.label}</span>
                  <span style={{fontSize:'12px',color:'#94a3b8'}}>{r.pct.toFixed(0)}%</span>
                </div>
                <p style={{fontSize:'18px',fontWeight:'800',color:r.color,margin:'0 0 6px'}}>{P(r.val)}</p>
                <div className="pbar"><div className="pfill" style={{width:`${Math.min(100,Math.max(0,r.pct))}%`,background:r.color}}/></div>
              </div>
            ))}
          </div>
        </div>
      ):(
        <div className="card" style={{padding:'40px',textAlign:'center',color:'#94a3b8',fontSize:'13px'}}>Log income to see budget.</div>
      )}

      <button className="btn bp" style={{alignSelf:'flex-start'}} onClick={exportCSV}>
        <Ico n="download" s={14} c="#fff"/>Export to CSV
      </button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>


</body></html>
