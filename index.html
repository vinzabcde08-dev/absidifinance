  (function(){
    var sz=180,c=document.createElement('canvas');
    c.width=c.height=sz;
    var ctx=c.getContext('2d');
    /* Purple gradient rounded-rect background */
    var g=ctx.createLinearGradient(0,0,sz,sz);
    g.addColorStop(0,'#4f46e5');g.addColorStop(1,'#7c3aed');
    ctx.fillStyle=g;
    var r=sz*0.22;
    ctx.beginPath();
    ctx.moveTo(r,0);ctx.lineTo(sz-r,0);ctx.quadraticCurveTo(sz,0,sz,r);
    ctx.lineTo(sz,sz-r);ctx.quadraticCurveTo(sz,sz,sz-r,sz);
    ctx.lineTo(r,sz);ctx.quadraticCurveTo(0,sz,0,sz-r);
    ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);
    ctx.closePath();ctx.fill();
    /* Gem icon — same paths as the SVG in the header, scaled from 24×24 to sz */
    var sc=sz/24;
    ctx.strokeStyle='rgba(255,255,255,0.95)';
    ctx.lineWidth=1.75*sc;ctx.lineCap='round';ctx.lineJoin='round';
    /* Outer gem: M6 3h12l4 6-10 13L2 9z */
    ctx.beginPath();
    ctx.moveTo(6*sc,3*sc);ctx.lineTo(18*sc,3*sc);ctx.lineTo(22*sc,9*sc);
    ctx.lineTo(12*sc,22*sc);ctx.lineTo(2*sc,9*sc);ctx.closePath();ctx.stroke();
    /* Horizontal belt line */
    ctx.beginPath();ctx.moveTo(2*sc,9*sc);ctx.lineTo(22*sc,9*sc);ctx.stroke();
    /* Left facet */
    ctx.beginPath();ctx.moveTo(6*sc,3*sc);ctx.lineTo(12*sc,16*sc);ctx.stroke();
    /* Right facet */
    ctx.beginPath();ctx.moveTo(18*sc,3*sc);ctx.lineTo(12*sc,16*sc);ctx.stroke();
    var url=c.toDataURL('image/png');
    /* Apple touch icon */
    var atl=document.createElement('link');atl.rel='apple-touch-icon';atl.sizes='180x180';atl.href=url;document.head.appendChild(atl);

const CACHE='absidifinance-v1';

self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim();});
self.addEventListener('fetch',e=>{
  if(e.request.method!=='GET')return;
  e.respondWith(
    caches.match(e.request).then(cached=>{
      const fresh=fetch(e.request).then(res=>{
        if(res&&res.status===200){
          const clone=res.clone();
          caches.open(CACHE).then(c=>c.put(e.request,clone));
        }
        return res;
      }).catch(()=>cached);
      return cached||fresh;
    })
  );
});`;

function InfoIcon({text,title}){
  const[open,setOpen]=React.useState(false);
  const ref=React.useRef(null);
  React.useEffect(()=>{
    if(!open)return;
    const h=(e)=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',h);
    document.addEventListener('touchstart',h);
    return()=>{document.removeEventListener('mousedown',h);document.removeEventListener('touchstart',h);};
  },[open]);
  return(
    <span ref={ref} style={{position:'relative',display:'inline-flex',alignItems:'center',verticalAlign:'middle',marginLeft:'4px'}}>
      <button
        onClick={e=>{e.stopPropagation();setOpen(v=>!v);}}

  get:(k,def)=>{try{return JSON.parse(localStorage.getItem(k))??def}catch{return def}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));if(db)db.collection('absidifinance').doc(k).set({v:JSON.stringify(v)}).catch(()=>{})}catch{}},
  del:(k)=>{try{localStorage.removeItem(k);}catch{}},

    ['ph_subs','ph_income','ph_exp','ph_clients','ph_accts','ph_cards','ph_emps','ph_payroll','ph_settings','ph_debts'].forEach(k=>{
      localStorage.removeItem(k+'_'+id);
      if(db)db.collection('absidifinance').doc(k+'_'+id).delete().catch(()=>{});
    });
  }
};
const getUid=()=>(auth&&auth.currentUser)?auth.currentUser.uid:ls.get('af_current_id',null);
const uk=(k)=>k+'_'+(getUid()||'default');

/* local list of usernames seen on this device — used for the picker UI */
const getLocalUsers=()=>ls.get('af_usernames',[]);
const saveLocalUser=(username,id)=>{
  const list=getLocalUsers().filter(u=>u.id!==id);
  ls.set('af_usernames',[...list,{username,id}]);
};
const removeLocalUser=(id)=>ls.set('af_usernames',getLocalUsers().filter(u=>u.id!==id));

const getCurrentUsername=()=>{
  if(auth&&auth.currentUser)return auth.currentUser.displayName||'';
  const id=ls.get('af_current_id',null);
  if(!id)return'';
  const found=getLocalUsers().find(u=>u.id===id);
  if(found)return found.username;
  const accs=ls.get('af_accounts',[]);
  const acc=accs.find(a=>a.id===id);
  return acc?acc.username:'';
};

function AvatarCircle({name,size=44}){
  const colors=['#4f46e5','#7c3aed','#0891b2','#059669','#d97706','#dc2626','#db2777'];
  const idx=name.charCodeAt(0)%colors.length;
  return(
    <div style={{width:size,height:size,borderRadius:'50%',background:colors[idx],display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontWeight:'800',color:'#fff',fontSize:Math.round(size*0.38)}}>
      {name.charAt(0).toUpperCase()}
    </div>
  );
}

function LoginScreen({onLogin}){
  const[localUsers,setLocalUsers]=useState(()=>auth?getLocalUsers():ls.get('af_accounts',[]));
  const[mode,setMode]=useState(()=>(auth?getLocalUsers():ls.get('af_accounts',[])).length===0?'auth':'pick');
  const[authTab,setAuthTab]=useState('signin'); /* 'signin' | 'create' */
  const[selectedAcc,setSelectedAcc]=useState(null);
  const[newUser,setNewUser]=useState('');
  const[pass,setPass]=useState('');
  const[err,setErr]=useState('');
  const[busy,setBusy]=useState(false);
  const[showReset,setShowReset]=useState(false);

  const signInWithGoogle=async()=>{
    if(!auth){setErr('Firebase not ready. Check your config.');return;}
    if(window.location.protocol==='file:'){
      setErr('Google sign-in requires a hosted URL. Open via localhost or your deployed link, not a local file.');
      return;
    }
    setBusy(true);setErr('');
    try{
      const provider=new firebase.auth.GoogleAuthProvider();
      /* Try popup first; if blocked fall back to redirect */
      try{
        await auth.signInWithPopup(provider);
      }catch(popupErr){
        if(popupErr.code==='auth/popup-blocked'||popupErr.code==='auth/popup-cancelled'||popupErr.code==='auth/cancelled-popup-request'){
          /* Redirect flow — page will reload and App will pick up the result */
          await auth.signInWithRedirect(provider);
          return;
        }
        throw popupErr;
      }
    }catch(e){
      setBusy(false);
      if(e.code==='auth/popup-closed-by-user'||e.code==='auth/cancelled-popup-request')return;
      if(e.code==='auth/unauthorized-domain'){
        setErr('This domain is not authorised in Firebase. Add it under Authentication → Settings → Authorised domains in your Firebase Console.');
      }else{
        setErr(`Sign-in failed: ${e.message||e.code||'unknown error'}`);
      }
    }
  };

  const GoogleBtn=()=>(
    <button onClick={signInWithGoogle} disabled={busy} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:'10px',padding:'11px',border:'1.5px solid #e2e8f0',borderRadius:'10px',background:'#fff',cursor:'pointer',fontSize:'14px',fontWeight:'600',color:'#1e293b',transition:'all .15s',opacity:busy?.6:1}}
      onMouseEnter={e=>{e.currentTarget.style.background='#f8fafc';e.currentTarget.style.borderColor='#94a3b8';}}
      onMouseLeave={e=>{e.currentTarget.style.background='#fff';e.currentTarget.style.borderColor='#e2e8f0';}}
    >
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      Continue with Google
    </button>
  );

  const Divider=()=>(
    <div style={{display:'flex',alignItems:'center',gap:'10px',margin:'4px 0'}}>
      <div style={{flex:1,height:'1px',background:'#e2e8f0'}}/>
      <span style={{fontSize:'12px',color:'#94a3b8',fontWeight:'600'}}>or</span>
      <div style={{flex:1,height:'1px',background:'#e2e8f0'}}/>
    </div>
  );

  const fbErr=(code)=>{
    if(code==='auth/email-already-in-use')return'That username is already taken.';
    if(code==='auth/wrong-password'||code==='auth/invalid-credential')return'Incorrect password.';
    if(code==='auth/too-many-requests')return'Too many attempts. Try again later.';
    if(code==='auth/weak-password')return'Password must be at least 6 characters.';
    return'Something went wrong. Try again.';
  };

  const pickAccount=(acc)=>{setSelectedAcc(acc);setPass('');setErr('');setMode('enter');};

  /* ── LOGIN (from picker) ── */
  const login=async()=>{
    if(!pass.trim()){setErr('Enter your password.');return;}
    setBusy(true);setErr('');
    if(auth){
      try{
        await auth.signInWithEmailAndPassword(toEmail(selectedAcc.username),pass);
      }catch(e){setBusy(false);setErr(fbErr(e.code));}
    }else{
      const accs=ls.get('af_accounts',[]);
      const found=accs.find(a=>a.id===selectedAcc.id);
      if(found&&pass===found.password){ls.set('af_current_id',found.id);ls.set('af_loggedIn',true);onLogin();}
      else{setBusy(false);setErr('Incorrect password.');}
    }
  };

  /* ── SIGN IN (from auth screen, new device) ── */
  const signIn=async()=>{
    if(!newUser.trim()||!pass.trim()){setErr('Enter your username and password.');return;}
    setBusy(true);setErr('');
    if(auth){
      try{
        const cred=await auth.signInWithEmailAndPassword(toEmail(newUser.trim()),pass);
        saveLocalUser(cred.user.displayName||newUser.trim(),cred.user.uid);
      }catch(e){setBusy(false);setErr(fbErr(e.code));}
    }else{
      const accs=ls.get('af_accounts',[]);
      const found=accs.find(a=>a.username.toLowerCase()===newUser.trim().toLowerCase());
      if(found&&pass===found.password){ls.set('af_current_id',found.id);ls.set('af_loggedIn',true);onLogin();}
      else{setBusy(false);setErr('Incorrect username or password.');}
    }
  };

  /* ── CREATE ACCOUNT ── */
  const createAccount=async()=>{
    if(!newUser.trim()){setErr('Enter a username.');return;}
    if(pass.length<6){setErr('Password must be at least 6 characters.');return;}
    setBusy(true);setErr('');
    if(auth){
      try{
        const cred=await auth.createUserWithEmailAndPassword(toEmail(newUser.trim()),pass);
        await cred.user.updateProfile({displayName:newUser.trim()});
        saveLocalUser(newUser.trim(),cred.user.uid);
        /* onAuthStateChanged fires → onLogin */
      }catch(e){setBusy(false);setErr(fbErr(e.code));}
    }else{
      const existing=ls.get('af_accounts',[]);
      if(existing.find(a=>a.username.toLowerCase()===newUser.trim().toLowerCase())){setBusy(false);setErr('That username is already taken.');return;}
      const newId=uid();
      ls.set('af_accounts',[...existing,{id:newId,username:newUser.trim(),password:pass}]);
      ls.set('af_current_id',newId);ls.set('af_loggedIn',true);
      onLogin();
    }
  };

  /* ── REMOVE ACCOUNT ── */
  const resetAccount=async()=>{
    setBusy(true);
    ls.clearUser(selectedAcc.id);
    if(auth){
      /* We can only delete the currently signed-in user */
      try{
        await auth.signInWithEmailAndPassword(toEmail(selectedAcc.username),pass);
        await auth.currentUser.delete();
      }catch(e){}
      removeLocalUser(selectedAcc.id);
    }else{
      const updated=ls.get('af_accounts',[]).filter(a=>a.id!==selectedAcc.id);
      ls.set('af_accounts',updated);
    }
    const fresh=auth?getLocalUsers():ls.get('af_accounts',[]);
    setLocalUsers(fresh);
    setShowReset(false);setSelectedAcc(null);setPass('');setErr('');setBusy(false);
    setMode(fresh.length===0?'auth':'pick');
  };

  const firebaseReady=!!auth;
  const BG={minHeight:'100vh',background:'linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%)',display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'};
  const CARD={width:'100%',maxWidth:'420px',padding:'36px'};
  const Logo=()=>(
    <div style={{textAlign:'center',marginBottom:'28px'}}>
      <div style={{width:'52px',height:'52px',background:'linear-gradient(135deg,#4f46e5,#7c3aed)',borderRadius:'14px',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px'}}>
        <Ico n="gem" s={26} c="#fff" sw={1.5}/>
      </div>
      <h1 style={{fontSize:'22px',fontWeight:'800',color:'#1e293b',margin:'0 0 3px'}}>AbsidiFinance</h1>
      {firebaseReady&&<span style={{fontSize:'11px',color:'#10b981',fontWeight:'700',display:'inline-flex',alignItems:'center',gap:'4px',marginTop:'4px'}}><Ico n="fire" s={12} c="#10b981"/>Firebase connected</span>}
    </div>
  );

  /* RESET CONFIRM */
  if(showReset)return(
    <div style={BG}>
      <div className="card fade" style={CARD}>
        <div style={{textAlign:'center',marginBottom:'20px'}}>
          <AvatarCircle name={selectedAcc.username} size={52}/>
          <h2 style={{fontSize:'17px',fontWeight:'800',color:'#1e293b',margin:'14px 0 6px'}}>Remove "{selectedAcc.username}"?</h2>
          <p style={{color:'#64748b',fontSize:'13px',margin:0,lineHeight:'1.5'}}>This removes this account and its financial data permanently.</p>
          {firebaseReady&&<div style={{marginTop:'14px'}}><span className="fl">Enter password to confirm</span><input autoFocus className="fi" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Your password"/></div>}
        </div>
        {err&&<div style={{background:'#fef2f2',border:'1px solid #fecaca',color:'#dc2626',padding:'10px 14px',borderRadius:'9px',fontSize:'13px',marginBottom:'12px'}}>{err}</div>}
        <div style={{display:'flex',gap:'10px'}}>
          <button className="btn bs" style={{flex:1,justifyContent:'center'}} onClick={()=>{setShowReset(false);setErr('');}}>Cancel</button>
          <button className="btn" style={{flex:1,justifyContent:'center',background:'#ef4444',color:'#fff',opacity:busy?.6:1}} onClick={resetAccount} disabled={busy}>Remove Account</button>
        </div>
      </div>
    </div>
  );

  /* ENTER PASSWORD */
  if(mode==='enter')return(
    <div style={BG}>
      <div className="card fade" style={CARD}>
        <Logo/>
        <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'20px',padding:'14px',background:'#f8fafc',borderRadius:'12px'}}>
          <AvatarCircle name={selectedAcc.username}/>
          <div>
            <p style={{fontWeight:'800',color:'#1e293b',margin:'0 0 1px',fontSize:'15px'}}>{selectedAcc.username}</p>
            <p style={{fontSize:'11px',color:'#94a3b8',margin:0}}>Enter your password to continue</p>
          </div>
        </div>
        <div className="col">
          <GoogleBtn/><Divider/>
          <div><span className="fl">Password</span><input autoFocus className="fi" type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyPress={e=>e.key==='Enter'&&login()} placeholder="Enter password"/></div>
          {err&&<div style={{background:'#fef2f2',border:'1px solid #fecaca',color:'#dc2626',padding:'10px 14px',borderRadius:'9px',fontSize:'13px'}}>{err}</div>}
          <button className="btn bp" style={{width:'100%',justifyContent:'center',padding:'12px',opacity:busy?.6:1}} onClick={login} disabled={busy}>{busy?'Signing in…':'Login'}</button>
          <div style={{display:'flex',justifyContent:'space-between'}}>
            <button onClick={()=>{setMode('pick');setErr('');}} style={{background:'none',border:'none',color:'#94a3b8',fontSize:'12px',cursor:'pointer',textDecoration:'underline',padding:0}}>← Back</button>
            <button onClick={()=>setShowReset(true)} style={{background:'none',border:'none',color:'#ef4444',fontSize:'12px',cursor:'pointer',textDecoration:'underline',padding:0}}>Forgot password?</button>
          </div>
        </div>
      </div>
    </div>
  );

  /* AUTH SCREEN — Sign In or Create Account */
  if(mode==='auth')return(
    <div style={BG}>
      <div className="card fade" style={CARD}>
        <Logo/>
        {/* TAB TOGGLE */}
        <div style={{display:'flex',background:'#f1f5f9',borderRadius:'10px',padding:'4px',marginBottom:'22px',gap:'4px'}}>
          {['signin','create'].map(t=>(
            <button key={t} onClick={()=>{setAuthTab(t);setErr('');setNewUser('');setPass('');}}
              style={{flex:1,padding:'8px',borderRadius:'7px',border:'none',cursor:'pointer',fontWeight:'700',fontSize:'13px',transition:'all .15s',
                background:authTab===t?'#fff':'transparent',
                color:authTab===t?'#4f46e5':'#64748b',
                boxShadow:authTab===t?'0 1px 4px rgba(0,0,0,.08)':'none'
              }}
            >{t==='signin'?'Sign In':'Create Account'}</button>
          ))}
        </div>
        <div className="col">
          <GoogleBtn/><Divider/>
          <div><span className="fl">Username</span><input autoFocus className="fi" value={newUser} onChange={e=>setNewUser(e.target.value)} onKeyPress={e=>e.key==='Enter'&&(authTab==='signin'?signIn():createAccount())} placeholder={authTab==='signin'?'Your username':'Choose a username'}/></div>
          <div><span className="fl">Password</span><input className="fi" type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyPress={e=>e.key==='Enter'&&(authTab==='signin'?signIn():createAccount())} placeholder={authTab==='signin'?'Your password':'Min 6 characters'}/></div>
          {err&&<div style={{background:'#fef2f2',border:'1px solid #fecaca',color:'#dc2626',padding:'10px 14px',borderRadius:'9px',fontSize:'13px'}}>{err}</div>}
          <button className="btn bp" style={{width:'100%',justifyContent:'center',padding:'12px',opacity:busy?.6:1}}
            onClick={authTab==='signin'?signIn:createAccount} disabled={busy}>
            {busy?(authTab==='signin'?'Signing in…':'Creating…'):(authTab==='signin'?'Sign In':'Create Account')}
          </button>
          {localUsers.length>0&&<button onClick={()=>{setMode('pick');setErr('');setNewUser('');setPass('');}} style={{background:'none',border:'none',color:'#94a3b8',fontSize:'12px',cursor:'pointer',textDecoration:'underline',textAlign:'center',padding:'2px 0'}}>← Back to saved accounts</button>}
          <p style={{fontSize:'11px',color:firebaseReady?'#10b981':'#94a3b8',textAlign:'center',margin:'2px 0 0',fontWeight:firebaseReady?'700':'400'}}>{firebaseReady?'✓ Credentials stored securely in Firebase':'Credentials saved locally in this browser.'}</p>
        </div>
      </div>
    </div>
  );

  /* PICK ACCOUNT */
  return(
    <div style={BG}>
      <div className="card fade" style={CARD}>
        <Logo/>
        <div className="col" style={{marginBottom:'16px'}}><GoogleBtn/></div>
        <p style={{color:'#64748b',fontSize:'13px',textAlign:'center',margin:'0 0 12px'}}>— or choose a saved account —</p>
        <div className="col" style={{gap:'8px',marginBottom:'16px'}}>
          {localUsers.map(acc=>(
            <button key={acc.id||acc.username} onClick={()=>pickAccount(acc)} style={{display:'flex',alignItems:'center',gap:'14px',padding:'13px 16px',border:'1.5px solid #e2e8f0',borderRadius:'12px',background:'#fff',cursor:'pointer',width:'100%',textAlign:'left',transition:'border-color .15s,box-shadow .15s'}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor='#6366f1';e.currentTarget.style.boxShadow='0 0 0 3px rgba(99,102,241,.1)';}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor='#e2e8f0';e.currentTarget.style.boxShadow='none';}}
            >
              <AvatarCircle name={acc.username}/>
              <div>
                <p style={{fontWeight:'700',color:'#1e293b',margin:'0 0 1px',fontSize:'14px'}}>{acc.username}</p>
                <p style={{fontSize:'11px',color:'#94a3b8',margin:0}}>Click to sign in</p>
              </div>
              <svg style={{marginLeft:'auto',flexShrink:0}} viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#cbd5e1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9,18 15,12 9,6"/></svg>
            </button>
          ))}
        </div>
        <Divider/>
        <button
          onClick={()=>{setMode('auth');setAuthTab('create');setErr('');setNewUser('');setPass('');}}
          style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',padding:'13px',border:'2px dashed #c7d2fe',borderRadius:'12px',background:'#f5f3ff',color:'#4f46e5',fontWeight:'700',fontSize:'14px',cursor:'pointer',transition:'all .15s'}}
          onMouseEnter={e=>{e.currentTarget.style.background='#ede9fe';e.currentTarget.style.borderColor='#818cf8';}}
          onMouseLeave={e=>{e.currentTarget.style.background='#f5f3ff';e.currentTarget.style.borderColor='#c7d2fe';}}
        >
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="#4f46e5" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Create New Account
        </button>
      </div>
    </div>
  );
}

/* pulls all user data FROM Firestore into localStorage so new devices get existing data */
const syncFromFirebase=async(userId)=>{
  if(!db)return;
  const keys=['ph_subs','ph_income','ph_exp','ph_clients','ph_accts','ph_cards','ph_emps','ph_payroll','ph_settings','ph_debts'];
  await Promise.all(keys.map(async k=>{
    const docKey=k+'_'+userId;
    try{
      const doc=await db.collection('absidifinance').doc(docKey).get();
      if(doc.exists){const d=doc.data();if(d&&d.v!==undefined)localStorage.setItem(docKey,d.v);}
    }catch(e){}
  }));
};

function App(){
  const[loggedIn,setLoggedIn]=useState(false);
  const[loading,setLoading]=useState(true);
  const[syncMsg,setSyncMsg]=useState('');

  useEffect(()=>{
    if(!auth){
      setLoggedIn(checkSession());
      setLoading(false);
      return;
    }
    /* Handle redirect result first (for mobile Google sign-in) */
    auth.getRedirectResult().catch(()=>{});
    const unsub=auth.onAuthStateChanged(async user=>{
      if(user){
        ls.set('af_current_id',user.uid);
        ls.set('af_loggedIn',true);
        saveLocalUser(user.displayName||user.email.split('@')[0],user.uid);
        setSyncMsg('Syncing your data…');
        await syncFromFirebase(user.uid);
        setSyncMsg('');
        setLoggedIn(true);
      }else{
        ls.del('af_current_id');
        ls.set('af_loggedIn',false);
        setLoggedIn(false);
      }
      setLoading(false);
    });
    return unsub;
  },[]);

  const handleLogout=async()=>{
    if(auth){await auth.signOut();}
    else{ls.set('af_loggedIn',false);ls.del('af_current_id');setLoggedIn(false);}
  };

  if(loading)return(
    <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%)',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center',color:'#fff'}}>
        <div style={{width:'40px',height:'40px',border:'3px solid rgba(255,255,255,.3)',borderTop:'3px solid #fff',borderRadius:'50%',margin:'0 auto 16px',animation:'spin 0.8s linear infinite'}}/>
        <p style={{fontWeight:'700',fontSize:'14px',opacity:.8}}>{syncMsg||'Loading…'}</p>
      </div>
    </div>
  );

  if(!loggedIn)return<LoginScreen onLogin={()=>setLoggedIn(true)}/>;
  return<MainApp onLogout={handleLogout}/>;
}

/* ════════════════
   MAIN APP
════════════════ */
function MainApp({onLogout}){
  const[subs,setSubs]=useState(()=>ls.get(uk('ph_subs'),[]));
  const[income,setIncome]=useState(()=>ls.get(uk('ph_income'),[]));
  const[expenses,setExpenses]=useState(()=>ls.get(uk('ph_exp'),[]));
  const[clients,setClients]=useState(()=>ls.get(uk('ph_clients'),[]));
  const[accounts,setAccounts]=useState(()=>ls.get(uk('ph_accts'),[]));
  const[cards,setCards]=useState(()=>ls.get(uk('ph_cards'),[]));

  const[fxRates,setFxRates]=useState({USD:57,AUD:37,GBP:72,EUR:62,CAD:42,SGD:43,PHP:1});

  },[darkMode]);
  const settingsRef=useRef(null);

  useEffect(()=>{
    const h=e=>{if(settingsRef.current&&!settingsRef.current.contains(e.target))setShowSettings(false);};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[]);

  useEffect(()=>{ls.set(uk('ph_subs'),subs);},[subs]);
  useEffect(()=>{ls.set(uk('ph_income'),income);},[income]);
  useEffect(()=>{ls.set(uk('ph_exp'),expenses);},[expenses]);
  useEffect(()=>{ls.set(uk('ph_clients'),clients);},[clients]);
  useEffect(()=>{ls.set(uk('ph_accts'),accounts);},[accounts]);
  useEffect(()=>{ls.set(uk('ph_cards'),cards);},[cards]);
  useEffect(()=>{ls.set(uk('ph_emps'),employees);},[employees]);
  useEffect(()=>{ls.set(uk('ph_payroll'),payroll);},[payroll]);
  useEffect(()=>{ls.set(uk('ph_settings'),settings);},[settings]);
  useEffect(()=>{ls.set(uk('ph_debts'),debts);},[debts]);
  useEffect(()=>{ls.set(uk('ph_tithe_log'),titheLog);},[titheLog]);
  useEffect(()=>{ls.set(uk('ph_savings_log'),savingsLog);},[savingsLog]);
  useEffect(()=>{ls.set(uk('ph_invest_log'),investLog);},[investLog]);
  useEffect(()=>{ls.set(uk('ph_transfers'),transfers);},[transfers]);
  useEffect(()=>{ls.set(uk('ph_savings_acct'),savingsAcctId);},[savingsAcctId]);
  useEffect(()=>{ls.set(uk('ph_emerg_acct'),emergencyAcctId);},[emergencyAcctId]);
  useEffect(()=>{ls.set(uk('ph_emerg_months'),emergencyMonths);},[emergencyMonths]);

  /* ── Real-time cross-device sync via Firestore onSnapshot ── */
  useEffect(()=>{
    if(!db)return;
    const userId=getUid();
    if(!userId)return;
    const watches=[
      {k:'ph_subs',set:setSubs,def:[]},
      {k:'ph_income',set:setIncome,def:[]},
      {k:'ph_exp',set:setExpenses,def:[]},
      {k:'ph_clients',set:setClients,def:[]},
      {k:'ph_accts',set:setAccounts,def:[]},
      {k:'ph_cards',set:setCards,def:[]},
      {k:'ph_emps',set:setEmployees,def:[]},
      {k:'ph_payroll',set:setPayroll,def:[]},
      {k:'ph_settings',set:setSettings,def:DEFAULT_SETTINGS},
      {k:'ph_debts',set:setDebts,def:[]},
      {k:'ph_tithe_log',set:setTitheLog,def:[]},
      {k:'ph_savings_log',set:setSavingsLog,def:[]},
      {k:'ph_invest_log',set:setInvestLog,def:[]},
      {k:'ph_transfers',set:setTransfers,def:[]},
    ];
    const unsubs=watches.map(({k,set})=>{
      const docKey=k+'_'+userId;
      return db.collection('absidifinance').doc(docKey).onSnapshot(doc=>{
        /* skip writes that originated from THIS device to avoid loops */
        if(doc.metadata.hasPendingWrites)return;
        if(doc.exists){const d=doc.data();if(d&&d.v!==undefined){try{const v=JSON.parse(d.v);localStorage.setItem(docKey,d.v);set(v);}catch(e){}}}
      });
    });
    return()=>unsubs.forEach(u=>u());
  },[]);

  /* ── Live FX rates for client expected income ── */

        if(d.rates&&d.rates.PHP){
          const php=d.rates.PHP;
          const r={PHP:1};
          Object.keys(d.rates).forEach(k=>{r[k]=php/(d.rates[k]||1);});
          setFxRates(r);setFxLoaded(true);setFxUpdatedAt(new Date());
        }
      }).catch(()=>{});
  };
  useEffect(()=>{
    fetchFx();
    const timer=setInterval(fetchFx,30*60*1000); /* refresh every 30 min */
    return()=>clearInterval(timer);
  },[]);

  const yr=parseInt(year)||CUR_YEAR;
  const selMonth=parseInt(month);
  const daysInMonth=new Date(yr,selMonth+1,0).getDate();
  const isCurrentMonth=yr===CUR_YEAR&&selMonth===CUR_MONTH;
  const daysLeft=isCurrentMonth?daysInMonth-CUR_DAY:daysInMonth;
  const curMonthKey=`${yr}-${String(selMonth+1).padStart(2,'0')}`;

  const byYear=arr=>arr.filter(x=>x.date&&yK(x.date)===yr);
  const byMonth=arr=>arr.filter(x=>x.date&&mK(x.date)===curMonthKey);

  const mInc=byMonth(income).reduce((s,x)=>s+(x.amount||0),0);
  const expectedFromClients=clients.reduce((s,c)=>s+(c.rate||0)*(fxRates[c.currency]||57),0);
  const mExp=byMonth(expenses).reduce((s,x)=>s+(x.amount||0),0);
  const mSub=byMonth(subs).reduce((s,x)=>s+(x.amount||0),0);
  const mPay=byMonth(payroll).reduce((s,x)=>s+(x.amount||0),0);
  const netClientExpected=expectedFromClients-mPay;

  /* Computed allocation values (used before tithe recalc logic) */
  const mExpReg=byMonth(expenses).filter(x=>!x.alloc).reduce((s,x)=>s+(x.amount||0),0);
  const mTitheActual=byMonth(expenses).filter(x=>x.alloc==='tithe').reduce((s,x)=>s+(x.amount||0),0);
  const mInvestActual=byMonth(expenses).filter(x=>x.alloc==='investment_out').reduce((s,x)=>s+(x.amount||0),0);
  const mSavingsActual=byMonth(expenses).filter(x=>x.alloc==='savings_out').reduce((s,x)=>s+(x.amount||0),0);
  const mDesiresActual=byMonth(expenses).filter(x=>!x.alloc&&x.category==='Desires').reduce((s,x)=>s+(x.amount||0),0);

  const last3=[0,1,2].map(i=>{
    const d=new Date(yr,selMonth-i,1);
    return income.filter(x=>{const xd=new Date(x.date);return xd.getFullYear()===d.getFullYear()&&xd.getMonth()===d.getMonth();}).reduce((s,x)=>s+(x.amount||0),0);
  });
  const avg3=last3.reduce((a,b)=>a+b,0)/3;
  const base=settings.budgetMode==='avg'?avg3:mInc;
  const invest=(base*settings.investPct)/100;
  /* Tithe base: exclude investment ONLY if investment was actually moved this month */
  const investMovedThisMonth=mInvestActual>=(invest*0.9);
  const titheBase=investMovedThisMonth?(base-invest):base;
  const tithe=(titheBase*settings.tithePct)/100;
  const desires=(base*settings.desiresPct)/100;
  const savings=(base*settings.savingsPct)/100;
  const spendBudget=base-tithe-invest-desires-savings-mSub-mPay;
  const dailyCap=daysLeft>0?Math.max(0,(spendBudget-mExp)/daysLeft):0;
  const totalFixed=settings.tithePct+settings.investPct+settings.desiresPct+settings.savingsPct;

  /* Per-account tithe breakdown */
  const mIncByAcct=byMonth(income).filter(x=>x.accountId);
  const totalMInc=mIncByAcct.reduce((s,x)=>s+(x.amount||0),0);
  const byAcctTithe=accounts.map(a=>{
    const aInc=mIncByAcct.filter(x=>x.accountId===a.id).reduce((s,x)=>s+(x.amount||0),0);
    if(!aInc)return null;
    return{acct:a,inc:aInc,titheAmt:totalMInc>0?(aInc/totalMInc)*tithe:0};
  }).filter(Boolean);

  const accBal=id=>{
    const a=accounts.find(x=>x.id===id);if(!a)return 0;
    const i=income.filter(x=>x.accountId===id&&yK(x.date)===yr).reduce((s,x)=>s+x.amount,0);
    const e=expenses.filter(x=>x.accountId===id&&yK(x.date)===yr).reduce((s,x)=>s+x.amount,0);
    const p=payroll.filter(x=>x.accountId===id&&yK(x.date)===yr).reduce((s,x)=>s+x.amount,0);
    return a.openingBalance+i-e-p;
  };

  const exportCSV=()=>{
    let csv=`AbsidiFinance Export — Year ${yr}\n\n`;
    csv+=`INCOME\nDate,Type,Client,Account,Amount,Status\n`;
    byYear(income).forEach(x=>{const cl=clients.find(c=>c.id===x.clientId);const ac=accounts.find(a=>a.id===x.accountId);csv+=`${x.date},${x.type},${cl?.name||''},${ac?.name||''},${x.amount},${x.status||''}\n`;});
    csv+=`\nEXPENSES\nDate,Category,Account,Card,Amount\n`;
    byYear(expenses).forEach(x=>{const ac=accounts.find(a=>a.id===x.accountId);const cd=cards.find(c=>c.id===x.cardId);csv+=`${x.date},${x.category},${ac?.name||''},${cd?.name||''},${x.amount}\n`;});
    csv+=`\nSUBSCRIPTIONS\nName,Amount,Date,Account,Card\n`;
    byYear(subs).forEach(x=>{const ac=accounts.find(a=>a.id===x.accountId);const cd=cards.find(c=>c.id===x.cardId);csv+=`${x.name},${x.amount},${x.date},${ac?.name||''},${cd?.name||''}\n`;});
    csv+=`\nPAYROLL\nDate,Employee,Account,Amount\n`;
    byYear(payroll).forEach(x=>{const em=employees.find(e=>e.id===x.employeeId);const ac=accounts.find(a=>a.id===x.accountId);csv+=`${x.date},${em?.name||''},${ac?.name||''},${x.amount}\n`;});
    const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
    const link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download=`AbsidiFinance_${yr}.csv`;link.style.display='none';
    document.body.appendChild(link);setTimeout(()=>{link.click();setTimeout(()=>{document.body.removeChild(link);URL.revokeObjectURL(link.href);},200);},100);
    setShowSettings(false);
  };

  const TABS=[
    {id:'home',icon:'home',label:'Home'},

  ];

  return(
    <div style={{minHeight:'100vh'}}>
      {/* HEADER */}
      <div style={{background:'linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%)',boxShadow:'0 2px 12px rgba(79,70,229,.3)'}}>

                <span style={{fontSize:'17px',fontWeight:'800',color:'#fff',letterSpacing:'-0.3px'}}>AbsidiFinance</span>

            <div className="__hdr-right" style={{display:'flex',alignItems:'center',gap:'10px'}}>

              </div>

            {isOnline?'Online':'Offline — changes saved locally'}

      {/* OFFLINE BANNER */}

function InvestDonePanel({invest,accounts,curMonthKey,byAcctTithe,totalMInc,expenses,setExpenses,income,setIncome,investLog,setInvestLog}){
  const[dest,setDest]=useState('external');
  const[destAcct,setDestAcct]=useState('');
  const markDone=(destLabel)=>{
    const note=`Invest ${curMonthKey}`;
    const srcEntries=byAcctTithe.length>0
      ?byAcctTithe.map(({acct,inc})=>({id:uid(),date:TODAY,amount:parseFloat(((inc/Math.max(totalMInc,1))*invest).toFixed(2)),category:'Investment',accountId:acct.id,alloc:'investment_out',note}))
      :[{id:uid(),date:TODAY,amount:invest,category:'Investment',accountId:'',alloc:'investment_out',note}];
    setExpenses(prev=>[...(prev||[]),...srcEntries]);
    if(dest==='account'&&destAcct){
      setIncome(prev=>[...(prev||[]),{id:uid(),date:TODAY,amount:invest,type:'Investment Transfer',accountId:destAcct,alloc:'investment_in',note}]);
    }
    setInvestLog(prev=>[...prev.filter(l=>l.month!==curMonthKey),{month:curMonthKey,done:true,amount:invest,destination:destLabel,date:TODAY}]);
  };
  return(
    <div style={{background:'rgba(99,102,241,.07)',borderRadius:'10px',padding:'14px',marginBottom:'4px'}}>
      <p style={{fontSize:'12px',fontWeight:'700',color:'#4f46e5',margin:'0 0 10px',textTransform:'uppercase',letterSpacing:'.04em'}}>Where are you sending it?</p>
      <div style={{display:'flex',gap:'8px',marginBottom:'10px',flexWrap:'wrap'}}>
        {[{v:'external',l:'External Broker'},{v:'account',l:'Bank Account'}].map(o=>(
          <button key={o.v} onClick={()=>setDest(o.v)} style={{padding:'6px 14px',borderRadius:'7px',border:`2px solid ${dest===o.v?'#6366f1':'#e2e8f0'}`,background:dest===o.v?'#6366f1':'transparent',color:dest===o.v?'#fff':'#64748b',fontWeight:'700',fontSize:'13px',cursor:'pointer'}}>{o.l}</button>
        ))}
      </div>
      {dest==='account'&&(
        <select className="fi" style={{marginBottom:'10px'}} value={destAcct} onChange={e=>setDestAcct(e.target.value)}>
          <option value="">— Pick destination account —</option>
          {accounts.map(a=><option key={a.id} value={a.id}>{acctLabel(a)}</option>)}
        </select>
      )}
      <button className="btn bp" style={{width:'100%',justifyContent:'center'}} onClick={()=>markDone(dest==='account'&&destAcct?acctLabel(accounts.find(a=>a.id===destAcct)||{})||'Bank Account':'External Broker')}>
        ✓ Done — Investment Moved
      </button>
    </div>
  );
}

  const net=mInc-mExp-mSub-mPay;
  const totalDebt=(debts||[]).reduce((s,d)=>s+(d.balance||0),0);
  const totalOnHand=accounts.reduce((s,a)=>s+accBal(a.id),0);

  /* ── Quarterly trend ── */
  const curQ=Math.floor((selMonth!==undefined?selMonth:CUR_MONTH)/3); /* 0=Q1,1=Q2,2=Q3,3=Q4 */
  const qStartMonth=curQ*3; /* 0,3,6,9 */
  const qMonths=[qStartMonth,qStartMonth+1,qStartMonth+2];
  const qYear=yr||CUR_YEAR;
  const qData=qMonths.map(m=>{
    const key=`${qYear}-${String(m+1).padStart(2,'0')}`;
    const inc=(allIncome||[]).filter(x=>x.date&&mK(x.date)===key).reduce((s,x)=>s+(x.amount||0),0);
    const exp=(allExpenses||[]).filter(x=>x.date&&mK(x.date)===key).reduce((s,x)=>s+(x.amount||0),0);
    const sub=(allSubs||[]).filter(x=>x.date&&mK(x.date)===key).reduce((s,x)=>s+(x.amount||0),0);
    const pay=(allPayroll||[]).filter(x=>x.date&&mK(x.date)===key).reduce((s,x)=>s+(x.amount||0),0);
    const isFuture=qYear>CUR_YEAR||(qYear===CUR_YEAR&&m>CUR_MONTH);
    return{month:MONTH_NAMES[m].substring(0,3),inc,totalExp:exp+sub+pay,net:inc-(exp+sub+pay),isFuture,isCurrent:qYear===CUR_YEAR&&m===CUR_MONTH};
  });
  const qMaxVal=Math.max(...qData.map(d=>Math.max(d.inc,d.totalExp)),1);
  const qTotalInc=qData.reduce((s,d)=>s+d.inc,0);
  const qTotalExp=qData.reduce((s,d)=>s+d.totalExp,0);
  const qNet=qTotalInc-qTotalExp;
  const Q_NAMES=['Q1 (Jan–Mar)','Q2 (Apr–Jun)','Q3 (Jul–Sep)','Q4 (Oct–Dec)'];
  /* graph */

  const gPending=inc.filter(i=>i.status==='Pending').reduce((s,i)=>s+(i.amount||0),0);
  const gExpected=gPaid+gPending;
  const gExp=mExp+mSub+mPay;
  const gMax=Math.max(gExpected,gExp,expectedFromClients||0,1);
  const gPct=(v)=>Math.min(100,Math.round((v/gMax)*100));
  const gNet=gPaid-gExp;
  const totalUnlinked=(unlinkedIncome||0)+(unlinkedExpenses||0);

    }else{

    }

  const CATS=['Food','Groceries','Fuel','Transportation','Baby Supplies','Healthcare','Utilities','Subscriptions','Credit Card Payment','Payroll','Shopping','Entertainment','Other'];

    {label:'Monthly Income',value:P(mInc),color:'#10b981',bg:'#f0fdf4',icon:'income',

    {label:'Total On Hand',value:P(totalOnHand),color:'#0891b2',bg:'#f0f9ff',icon:'bank',

    {label:'Monthly Expenses',value:P(mExp),color:'#ef4444',bg:'#fff5f5',icon:'expenses',

        if(isDone)return(

            <div>

            <button onClick={()=>setInvestLog(prev=>prev.filter(l=>l.month!==curMonthKey))} style={{fontSize:'11px',color:'#6366f1',background:'none',border:'1px solid #e2e8f0',borderRadius:'6px',padding:'4px 10px',cursor:'pointer'}}>Reset</button>
          </div>
        );
        if(isDone)return(
          <div className="card" style={{padding:'16px 20px',borderLeft:'4px solid #6366f1',background:'#f5f3ff',display:'flex',justifyContent:'space-between',alignItems:'center'}}>

              setExpenses(prev=>(prev||[]).filter(x=>!(x.alloc==='investment_out'&&x.note===`Invest ${curMonthKey}`)));

              setInvestLog(prev=>prev.filter(l=>l.month!==curMonthKey));
            }} style={{fontSize:'11px',color:'#94a3b8',background:'none',border:'1px solid var(--border)',borderRadius:'6px',padding:'4px 10px',cursor:'pointer'}}>Undo</button>
          </div>
        );
        if(invest<=0)return null;
        return(
          <div className="card" style={{padding:'18px 20px',border:'2px solid #6366f1',background:'#f5f3ff'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'14px'}}>
              <div>
                <p style={{fontWeight:'900',color:'#3730a3',margin:'0 0 2px',fontSize:'15px'}}>📈 Monthly Investment — {P(invest)}<InfoIcon text={`${settings.investPct}% of your monthly income base. Formula: ${P(base)} × ${settings.investPct}% = ${P(invest)}. ${investMovedThisMonth?'✓ Already moved — tithe recalculated.':'⚠ Not yet moved — tithe is on full income until this is done.'}`} title="Monthly Investment"/></p>
                <p style={{fontSize:'12px',color:'#6366f1',margin:0}}>{settings.investPct}% of income · {investMovedThisMonth?'✓ Tithe already adjusted':'⚠ Tithe computed on full income until this is done'}</p>
              </div>
              <span style={{fontSize:'22px',fontWeight:'900',color:'#4f46e5',lineHeight:1}}>{P(invest)}</span>
            </div>
            <InvestDonePanel invest={invest} accounts={accounts} curMonthKey={curMonthKey} byAcctTithe={byAcctTithe} totalMInc={totalMInc} expenses={allExpenses} setExpenses={setExpenses} income={allIncome} setIncome={setIncome} investLog={investLog} setInvestLog={setInvestLog}/>
            <button className="btn bs" style={{marginTop:'10px',width:'100%',justifyContent:'center'}} onClick={()=>setInvestLog(prev=>[...prev.filter(l=>l.month!==curMonthKey),{month:curMonthKey,skipped:true,date:TODAY}])}>
              Skip this month
            </button>
          </div>
        );
      })()}

      {/* QUICK ADD BUTTONS */}
      <div style={{display:'flex',gap:'10px',flexWrap:'wrap'}}>
        <button className="btn bg-btn" style={{fontSize:'14px',padding:'10px 20px'}} onClick={()=>setQaMode('income')}><Ico n="income" s={15} c="#fff"/>+ Quick Income</button>
        <button className="btn br" style={{fontSize:'14px',padding:'10px 20px'}} onClick={()=>setQaMode('expense')}><Ico n="expenses" s={15} c="#fff"/>+ Quick Expense</button>
        <button onClick={()=>setTab('income')} style={{background:'none',border:'1px solid #e2e8f0',borderRadius:'9px',padding:'10px 16px',fontSize:'13px',color:'#64748b',cursor:'pointer',fontWeight:'600'}}>Go to Income tab →</button>
        <button onClick={()=>setTab('expenses')} style={{background:'none',border:'1px solid #e2e8f0',borderRadius:'9px',padding:'10px 16px',fontSize:'13px',color:'#64748b',cursor:'pointer',fontWeight:'600'}}>Go to Expenses tab →</button>
      </div>

      {/* UNLINKED WARNING */}
      {totalUnlinked>0&&(

          <Ico n="warning" s={20} c="#f59e0b" sw={2}/>
          <div style={{flex:1}}>
            <p style={{fontWeight:'700',color:'#92400e',fontSize:'13px',margin:'0 0 2px'}}>Some entries are not linked to an account</p>
            <p style={{fontSize:'12px',color:'#b45309',margin:0}}>
              {unlinkedIncome>0&&`${unlinkedIncome} income entr${unlinkedIncome===1?'y':'ies'}`}

              {unlinkedExpenses>0&&`${unlinkedExpenses} expense entr${unlinkedExpenses===1?'y':'ies'}`}

            </p>
          </div>
        </div>
      )}

      {/* STAT CARDS */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:'12px'}}>
        {STATS.map(s=>(
          <div key={s.label} className="card" style={{padding:'18px 20px',background:s.bg}}>
            <div style={{width:'34px',height:'34px',background:'rgba(255,255,255,.7)',borderRadius:'9px',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:'10px'}}>
              <Ico n={s.icon} s={16} c={s.color} sw={2}/>
            </div>
            <p style={{fontSize:'11px',color:'#64748b',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.04em',margin:'0 0 4px'}}>{s.label}{s.info&&<InfoIcon text={s.info} title={s.title}/>}</p>
            <p style={{fontSize:'22px',fontWeight:'800',color:s.color,margin:0}}>{s.value}</p>
          </div>
        ))}
      </div>

      {/* BUDGET + ACCOUNTS GRID */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:'16px'}}>
        <div className="card" style={{padding:'20px'}}>
          <div className="row" style={{marginBottom:'14px'}}>
            <p className="sect" style={{margin:0}}>Monthly Allocations — {monthName||new Date().toLocaleString('en-US',{month:'long'})}</p>
            <button onClick={()=>setTab('budget')} style={{fontSize:'11px',color:'#4f46e5',fontWeight:'700',background:'none',border:'none',cursor:'pointer',padding:'2px 6px',borderRadius:'6px',textDecoration:'underline'}}>Full view →</button>
          </div>
          {[
            {label:`Tithes (${settings.tithePct}%)`,target:tithe,actual:mTitheActual,color:'#f59e0b',icon:'cross',info:'10% of your income (excluding investment if already moved this month). Actual = tithe expenses logged this month.'},
            {label:`Investments (${settings.investPct}%)`,target:invest,actual:mInvestActual,color:'#4f46e5',icon:'trend-up',info:`${settings.investPct}% of gross income. Actual = investment transfers logged this month.`},
            {label:`Savings (${settings.savingsPct}%)`,target:savings,actual:mSavingsActual,color:'#10b981',icon:'piggy',info:`${settings.savingsPct}% of gross income. Actual = savings transfers logged this month.`},
            {label:`Desires (${settings.desiresPct}%)`,target:desires,actual:mDesiresActual,color:'#ec4899',icon:'star',info:`${settings.desiresPct}% of gross income for discretionary spending. Actual = Desires-category expenses this month.`},
          ].map(r=>{
            const pct=r.target>0?Math.min(100,(r.actual/r.target)*100):0;
            const over=r.actual>r.target;
            return(
              <div key={r.label} style={{marginBottom:'12px'}}>
                <div className="row" style={{marginBottom:'4px'}}>
                  <span style={{fontSize:'12px',color:'var(--text2)',fontWeight:'600',display:'flex',alignItems:'center',gap:'5px'}}>
                    <Ico n={r.icon} s={13} c={r.color} sw={2}/>{r.label}<InfoIcon text={r.info}/>
                  </span>
                  <span style={{fontSize:'12px',fontWeight:'700',color:over?'#ef4444':r.color}}>
                    {P(r.actual)}<span style={{color:'var(--text4)',fontWeight:'500'}}> / {P(r.target)}</span>
                  </span>
                </div>
                <div className="pbar">
                  <div className="pfill" style={{width:`${pct}%`,background:over?'#ef4444':r.color,transition:'width .3s'}}/>
                </div>
              </div>
            );
          })}
          <div style={{borderTop:'1px solid var(--border)',marginTop:'8px',paddingTop:'10px'}}>
            {[
              {label:'Essentials Budget',val:spendBudget,color:'#4f46e5',info:'Total income minus tithes, investments, savings, and desires allocations. What remains for essential spending.'},
              {label:'Essentials Spent',val:mExpReg,color:mExpReg>spendBudget?'#ef4444':'#64748b',info:'Regular expenses this month — does NOT include tithe, investment, savings, or transfer allocations. Only day-to-day spending.'},
              {label:`Remaining (${daysLeft}d left)`,val:Math.max(0,spendBudget-mExpReg),color:mExpReg>spendBudget?'#ef4444':'#10b981',info:`Essentials budget minus essentials spent. ${daysLeft} days left in the month.`},

              </div>

          </div>
        </div>
        <div className="card" style={{padding:'20px'}}>

                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontWeight:'700',color:'var(--text)',fontSize:'13px',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.name}</p>
                  <p style={{fontSize:'11px',color:'var(--text4)',margin:0}}>{a.subtype||a.type}</p>

                <span style={{fontWeight:'800',fontSize:'14px',color:bal>=0?'var(--text)':'#ef4444',whiteSpace:'nowrap',flexShrink:0}}>{P(bal)}</span>
              </div>

          })}
        </div>
      </div>

      {/* INCOME vs EXPENSES vs CLIENT EXPECTED GRAPH */}

            <p className="sect" style={{margin:0}}>Income vs Expenses — {monthName||'This Month'}</p>
            <p style={{fontSize:'12px',color:'#94a3b8',margin:'4px 0 0'}}>
              {fxLoaded?`Live FX rates · updated ${fxUpdatedAt?fxUpdatedAt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'just now'}`:'Using estimated FX rates for client expected income.'}
            </p>
          </div>
          <div style={{display:'flex',gap:'10px',flexWrap:'wrap'}}>
            {[{c:'#8b5cf6',l:'Client Expected'},{c:'#6366f1',l:'Billed'},{c:'#10b981',l:'Received'},{c:'#ef4444',l:'Expenses'}].map(x=>(
              <span key={x.l} style={{display:'flex',alignItems:'center',gap:'5px',fontSize:'11px',fontWeight:'700',color:'#64748b'}}>

              </span>
            ))}

        </div>

            {[
              {label:'Client Expected Income',sub:`From ${clients.length} client(s) · after payroll: ${P(netClientExpected||0)}`,value:expectedFromClients||0,color:'#8b5cf6',mixed:false},
              {label:'Billed Income',sub:'Paid + Pending entries',value:gExpected,color:'#6366f1',mixed:true,paid:gPaid,pending:gPending},
              {label:'Actual Received',sub:'Paid entries only',value:gPaid,color:'#10b981',mixed:false},
              {label:'Total Expenses',sub:'Expenses + Subs + Payroll',value:gExp,color:'#ef4444',mixed:false},
            ].map(b=>(
              <div key={b.label}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:'6px'}}>
                  <div>
                    <span style={{fontSize:'13px',fontWeight:'700',color:'#1e293b'}}>{b.label}</span>
                    <span style={{fontSize:'11px',color:'#94a3b8',marginLeft:'6px'}}>{b.sub}</span>
                  </div>
                  <span style={{fontSize:'15px',fontWeight:'800',color:b.color}}>{P(b.value)}</span>
                </div>
                <div style={{height:'26px',background:'#f1f5f9',borderRadius:'8px',overflow:'hidden',position:'relative'}}>
                  {b.mixed?(
                    <>
                      <div style={{position:'absolute',left:0,top:0,height:'100%',width:`${gPct(b.value)}%`,background:'#c7d2fe',borderRadius:'8px',transition:'width .5s'}}/>
                      <div style={{position:'absolute',left:0,top:0,height:'100%',width:`${gPct(b.paid)}%`,background:'#6366f1',borderRadius:'8px',transition:'width .5s'}}/>
                    </>
                  ):(
                    <div style={{position:'absolute',left:0,top:0,height:'100%',width:`${gPct(b.value)}%`,background:b.color,borderRadius:'8px',transition:'width .5s'}}/>
                  )}
                </div>
                {b.mixed&&b.pending>0&&(
                  <div style={{display:'flex',gap:'12px',marginTop:'4px'}}>
                    <span style={{fontSize:'11px',color:'#6366f1',fontWeight:'600'}}>● Paid: {P(b.paid)}</span>
                    <span style={{fontSize:'11px',color:'#a5b4fc',fontWeight:'600'}}>● Pending: {P(b.pending)}</span>
                  </div>

                {b.label==='Client Expected Income'&&(employees||[]).length>0&&(

                    {(employees||[]).map(em=>(
                      <div key={em.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>

                          <div style={{width:'6px',height:'6px',borderRadius:'50%',background:'#a78bfa',flexShrink:0}}/>

                        </div>
                        <div style={{display:'flex',alignItems:'center',gap:'8px',flexShrink:0}}>
                          {em.salary&&<span style={{fontSize:'12px',fontWeight:'700',color:'#ef4444'}}>{P(em.salary)}</span>}
                          {em.frequency&&<span style={{fontSize:'11px',color:'#94a3b8',background:'#f1f5f9',padding:'2px 6px',borderRadius:'4px'}}>{em.frequency}</span>}
                          {!em.salary&&<span style={{fontSize:'11px',color:'#cbd5e1',fontStyle:'italic'}}>no salary set</span>}

                    {mPay>0&&<div style={{borderTop:'1px solid #e2e8f0',paddingTop:'5px',marginTop:'3px',display:'flex',justifyContent:'space-between'}}>
                      <span style={{fontSize:'11px',color:'#94a3b8',fontWeight:'600'}}>This month paid out</span>
                      <span style={{fontSize:'12px',fontWeight:'800',color:'#ef4444'}}>{P(mPay)}</span>
                    </div>}
                  </div>
                )}
              </div>
            ))}
            <div style={{padding:'14px 18px',borderRadius:'10px',background:gNet>=0?'#f0fdf4':'#fff5f5',display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:'4px'}}>

              <span style={{fontSize:'20px',fontWeight:'900',color:gNet>=0?'#10b981':'#ef4444'}}>{gNet>=0?'+':''}{P(gNet)}</span>
            </div>
          </div>

            {[{c:'#6366f1',l:'Income'},{c:'#ef4444',l:'Expenses'}].map(x=>(

              </span>
            ))}
          </div>
        </div>
        {/* Grouped bar chart */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'10px',marginBottom:'20px'}}>
          {qData.map((d,i)=>{
            const incH=d.isFuture?0:Math.round((d.inc/qMaxVal)*100);
            const expH=d.isFuture?0:Math.round((d.totalExp/qMaxVal)*100);
            const BAR_H=100;
            return(
              <div key={i} style={{textAlign:'center'}}>

                  <div style={{width:'32%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',height:'100%'}}>
                    {!d.isFuture&&d.inc>0&&(
                      <span style={{fontSize:'9px',color:'#6366f1',fontWeight:'700',marginBottom:'2px',whiteSpace:'nowrap'}}>
                        {d.inc>=1000?`${(d.inc/1000).toFixed(1)}k`:Math.round(d.inc)}
                      </span>
                    )}
                    <div style={{
                      width:'100%',height:`${Math.max(incH,d.isFuture?0:2)}%`,
                      background:d.isFuture?'#f1f5f9':'#6366f1',
                      borderRadius:'5px 5px 0 0',
                      transition:'height .5s',
                      minHeight:d.isFuture?'4px':'0',
                      opacity:d.isFuture?.3:1
                    }}/>
                  </div>
                  <div style={{width:'32%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',height:'100%'}}>
                    {!d.isFuture&&d.totalExp>0&&(
                      <span style={{fontSize:'9px',color:'#ef4444',fontWeight:'700',marginBottom:'2px',whiteSpace:'nowrap'}}>
                        {d.totalExp>=1000?`${(d.totalExp/1000).toFixed(1)}k`:Math.round(d.totalExp)}
                      </span>
                    )}
                    <div style={{
                      width:'100%',height:`${Math.max(expH,d.isFuture?0:2)}%`,
                      background:d.isFuture?'#f1f5f9':'#ef4444',
                      borderRadius:'5px 5px 0 0',
                      transition:'height .5s',
                      minHeight:d.isFuture?'4px':'0',
                      opacity:d.isFuture?.3:1
                    }}/>
                  </div>
                </div>
                {/* net pill */}
                {!d.isFuture&&(
                  <div style={{padding:'3px 6px',borderRadius:'6px',fontSize:'10px',fontWeight:'700',display:'inline-block',
                    background:d.net>=0?'#dcfce7':'#fee2e2',color:d.net>=0?'#16a34a':'#dc2626'}}>
                    {d.net>=0?'+':''}{d.net>=1000||d.net<=-1000?`${(d.net/1000).toFixed(1)}k`:Math.round(d.net)}
                  </div>
                )}
                {d.isFuture&&<div style={{padding:'3px 6px',fontSize:'10px',color:'#cbd5e1',fontWeight:'600'}}>upcoming</div>}
              </div>
            );
          })}
        </div>
        {/* Quarter summary row */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'10px',borderTop:'1px solid #f1f5f9',paddingTop:'14px'}}>
          {[
            {label:'Q Income',val:qTotalInc,color:'#6366f1',bg:'#eef2ff'},
            {label:'Q Expenses',val:qTotalExp,color:'#ef4444',bg:'#fff5f5'},
            {label:'Q Net',val:qNet,color:qNet>=0?'#10b981':'#ef4444',bg:qNet>=0?'#f0fdf4':'#fff5f5'},

            <div key={s.label} style={{background:s.bg,borderRadius:'10px',padding:'10px 12px',textAlign:'center'}}>

              <p style={{fontSize:'16px',fontWeight:'900',color:s.color,margin:0}}>{s.val>=0&&s.label==='Q Net'?'+':''}{P(s.val)}</p>

        </div>

      {/* QUICK-ADD MODAL */}
      {qaMode&&(
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)qaClose();}}>
          <div className="card fade" style={{width:'100%',maxWidth:'420px',padding:'24px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'18px'}}>
              <h3 style={{margin:0,fontWeight:'800',fontSize:'17px',color:qaMode==='income'?'#10b981':'#ef4444'}}>
                {qaMode==='income'?'Quick Add Income':'Quick Add Expense'}
              </h3>
              <button onClick={qaClose} style={{background:'none',border:'none',cursor:'pointer',fontSize:'20px',color:'#94a3b8',lineHeight:1}}>×</button>
            </div>
            <div className="col" style={{gap:'10px'}}>
              <div><span className="fl">Date</span><input className="fi" type="date" value={qaDate} onChange={e=>setQaDate(e.target.value)}/></div>
              {qaMode==='income'?(
                <div><span className="fl">Type</span><select className="fi" value={qaType} onChange={e=>setQaType(e.target.value)}><option>VA Salary</option><option>Commission</option><option>Business Income</option><option>Bonus</option><option>Refund</option><option>Other</option></select></div>
              ):(
                <div><span className="fl">Category</span><select className="fi" value={qaCategory} onChange={e=>setQaCategory(e.target.value)}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
              )}
              <div><span className="fl">Amount (₱)</span><input className="fi" type="number" value={qaAmount} onChange={e=>setQaAmount(e.target.value)} placeholder="0.00" autoFocus/></div>
              <div>
                <span className="fl">Account</span>
                <select className="fi" value={qaAccount} onChange={e=>{setQaAccount(e.target.value);setQaCard('');}}>
                  <option value="">— Select account —</option>
                  {accounts.map(a=><option key={a.id} value={a.id}>{acctLabel(a)}</option>)}
                </select>
              </div>
              {qaMode==='expense'&&(
                <div>
                  <span className="fl">or Card</span>
                  <select className="fi" value={qaCard} onChange={e=>{setQaCard(e.target.value);setQaAccount('');}}>
                    <option value="">— Select card —</option>
                    {(cards||[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                </div>
              )}
              {qaMode==='income'&&(
                <div><span className="fl">Status</span><select className="fi" value={qaStatus} onChange={e=>setQaStatus(e.target.value)}><option>Paid</option><option>Pending</option></select></div>
              )}
              <div style={{display:'flex',gap:'8px',marginTop:'4px'}}>
                <button className={`btn ${qaMode==='income'?'bg-btn':'br'}`} style={{flex:1,justifyContent:'center'}} onClick={qaSubmit}>Save</button>
                <button className="btn bs" onClick={qaClose}>Cancel</button>
              </div>
              <button onClick={()=>{qaClose();setTab(qaMode==='income'?'income':'expenses');}} style={{background:'none',border:'none',cursor:'pointer',fontSize:'12px',color:'#94a3b8',textDecoration:'underline',textAlign:'center'}}>
                Need more fields? Go to full {qaMode} form →
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function TransferFundsPanel({accounts,transfers,setTransfers,income,setIncome,expenses,setExpenses}){
  const[fromId,setFromId]=useState('');
  const[toId,setToId]=useState('');
  const[amount,setAmount]=useState('');
  const[fee,setFee]=useState('');
  const[date,setDate]=useState(TODAY);
  const[note,setNote]=useState('');
  const[showHistory,setShowHistory]=useState(false);

  const doTransfer=()=>{
    if(!fromId||!amount)return;
    const amt=parseFloat(amount)||0;
    const feeAmt=parseFloat(fee)||0;
    const tid=uid();
    const noteStr=note.trim()||`Transfer ${date}`;
    setExpenses(prev=>[...(prev||[]),
      {id:uid(),date,amount:amt,category:'Account Transfer',accountId:fromId,alloc:'transfer_out',note:noteStr,transferId:tid},
      ...(feeAmt>0?[{id:uid(),date,amount:feeAmt,category:'Transfer Fee',accountId:fromId,alloc:'transfer_fee',note:noteStr,transferId:tid}]:[])
    ]);
    if(toId){
      setIncome(prev=>[...(prev||[]),{id:uid(),date,amount:amt,type:'Account Transfer',accountId:toId,alloc:'transfer_in',note:noteStr,transferId:tid}]);
    }
    setTransfers(prev=>[...(prev||[]),{id:tid,date,fromId,toId:toId||'external',amount:amt,fee:feeAmt,note:noteStr}]);
    setFromId('');setToId('');setAmount('');setFee('');setNote('');setDate(TODAY);
  };

  const recent=(transfers||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
  const acctName=id=>{const a=accounts.find(x=>x.id===id);return a?acctLabel(a):'External';};
  const deleteTransfer=(tid)=>{
    setTransfers(prev=>(prev||[]).filter(t=>t.id!==tid));
    setExpenses(prev=>(prev||[]).filter(e=>e.transferId!==tid));
    setIncome(prev=>(prev||[]).filter(i=>i.transferId!==tid));
  };

  return(
    <div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:'10px',marginBottom:'12px'}}>
        <div>
          <span className="fl">From Account</span>
          <select className="fi" value={fromId} onChange={e=>setFromId(e.target.value)}>
            <option value="">— Select source —</option>
            {accounts.map(a=><option key={a.id} value={a.id}>{acctLabel(a)}</option>)}
          </select>
        </div>
        <div>
          <span className="fl">To Account (leave blank if external)</span>
          <select className="fi" value={toId} onChange={e=>setToId(e.target.value)}>
            <option value="">— External / Broker —</option>
            {accounts.filter(a=>a.id!==fromId).map(a=><option key={a.id} value={a.id}>{acctLabel(a)}</option>)}
          </select>
        </div>
        <div><span className="fl">Amount (₱)</span><input className="fi" type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0.00"/></div>
        <div><span className="fl">Transfer Fee (₱)</span><input className="fi" type="number" value={fee} onChange={e=>setFee(e.target.value)} placeholder="0.00 (optional)"/></div>
        <div><span className="fl">Date</span><input className="fi" type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
        <div><span className="fl">Note (optional)</span><input className="fi" value={note} onChange={e=>setNote(e.target.value)} placeholder="e.g. GInvest top-up"/></div>
      </div>
      {fromId&&amount&&(
        <div style={{padding:'10px 14px',borderRadius:'8px',background:'#f5f3ff',marginBottom:'12px',fontSize:'13px',color:'#4f46e5',fontWeight:'600'}}>
          {acctName(fromId)} → {toId?acctName(toId):'External'} · {P(parseFloat(amount)||0)}{parseFloat(fee)>0?` + ${P(parseFloat(fee))} fee`:''}
        </div>
      )}
      <button className="btn bp" onClick={doTransfer} disabled={!fromId||!amount}>
        <Ico n="bank" s={14} c="#fff"/>Transfer Funds
      </button>
      {recent.length>0&&(
        <div style={{marginTop:'16px'}}>
          <button onClick={()=>setShowHistory(v=>!v)} style={{background:'none',border:'none',cursor:'pointer',fontSize:'12px',color:'#64748b',fontWeight:'700',padding:0}}>
            {showHistory?'▾':'▸'} Recent transfers ({recent.length})
          </button>
          {showHistory&&(
            <div className="col" style={{gap:'8px',marginTop:'8px'}}>
              {recent.map(t=>(
                <div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',borderRadius:'8px',background:'var(--card2)',fontSize:'13px',gap:'8px'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <span style={{color:'var(--text3)'}}>{t.date} · {acctName(t.fromId)} → {acctName(t.toId)}</span>
                    {t.note&&<span style={{color:'var(--text4)',marginLeft:'6px'}}>({t.note})</span>}
                  </div>
                  <span style={{fontWeight:'800',color:'#4f46e5',whiteSpace:'nowrap'}}>{P(t.amount)}{t.fee>0?` + ${P(t.fee)} fee`:''}</span>
                  <button onClick={()=>{if(window.confirm(`Delete this transfer? This will also remove the linked expense and income entries.`))deleteTransfer(t.id);}} style={{background:'none',border:'1px solid #fca5a5',borderRadius:'6px',cursor:'pointer',padding:'2px 8px',fontSize:'11px',color:'#ef4444',fontWeight:'700',whiteSpace:'nowrap'}}>✕ Delete</button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ════════  CARDS  ════════ */
function CardsTab({cards,setCards,expenses}){

  const[editId,setEditId]=useState(null);
  const reset=()=>{setEditId(null);setName('');setLimit('');setBillingDay('');setDueDay('');};
  const startEdit=(c)=>{setEditId(c.id);setName(c.name);setLimit(String(c.limit||''));setBillingDay(String(c.billingDay||''));setDueDay(String(c.dueDay||''));};
  const save=()=>{
    if(!name.trim())return;
    if(editId){
      setCards(cards.map(c=>c.id===editId?{...c,name:name.trim(),limit:parseFloat(limit)||0,billingDay:parseInt(billingDay)||1,dueDay:parseInt(dueDay)||20}:c));
    }else{
      setCards([...cards,{id:uid(),name:name.trim(),limit:parseFloat(limit)||0,billingDay:parseInt(billingDay)||1,dueDay:parseInt(dueDay)||20}]);
    }
    reset();
  };
  return(
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:'16px',alignItems:'start'}} className="fade __form-grid">
      <div className="card" style={{padding:'22px',border:editId?'2px solid #6366f1':'2px solid transparent',transition:'border-color .2s'}}>
        <p className="sect">{editId?'Edit Card':'Add Credit Card'}</p>
        <div className="col">
          <div><span className="fl">Card Name</span><input className="fi" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. BPI Visa Platinum"/></div>
          <div><span className="fl">Credit Limit (₱)</span><input className="fi" type="number" value={limit} onChange={e=>setLimit(e.target.value)} placeholder="0.00"/></div>
          <div><span className="fl">Billing Statement Day</span><input className="fi" type="number" value={billingDay} onChange={e=>setBillingDay(e.target.value)} placeholder="e.g. 5"/></div>
          <div><span className="fl">Payment Due Day</span><input className="fi" type="number" value={dueDay} onChange={e=>setDueDay(e.target.value)} placeholder="e.g. 25"/></div>
          <div style={{display:'flex',gap:'8px'}}>
            <button className="btn bp" style={{flex:1,justifyContent:'center'}} onClick={save}><Ico n={editId?'check':'card'} s={14} c="#fff"/>{editId?'Save Changes':'Add Card'}</button>
            {editId&&<button className="btn bs" onClick={reset}>Cancel</button>}
          </div>
        </div>
      </div>

        {cards.length===0&&<div className="card" style={{padding:'40px',textAlign:'center',color:'#94a3b8',fontSize:'13px'}}>No cards yet.</div>}
        {cards.map(c=>{
          const spent=expenses.filter(e=>e.cardId===c.id).reduce((s,e)=>s+e.amount,0);
          const util=c.limit?Math.min(100,(spent/c.limit)*100):0;
          const today=new Date().getDate();
          const dtd=c.dueDay>=today?c.dueDay-today:30-(today-c.dueDay);
          const isEditing=editId===c.id;
          return(
            <div key={c.id} className="card" style={{padding:'18px 20px',borderLeft:isEditing?'3px solid #6366f1':'3px solid transparent',background:isEditing?'#f5f3ff':'#fff',transition:'all .15s'}}>
              <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'12px',flexWrap:'wrap'}}>
                <div className="card-row-left" style={{display:'flex',alignItems:'center',gap:'12px'}}>
                  <div style={{width:'40px',height:'40px',flexShrink:0,background:'#faf5ff',borderRadius:'10px',display:'flex',alignItems:'center',justifyContent:'center'}}><Ico n="card" s={18} c="#7c3aed" sw={1.75}/></div>
                  <div style={{minWidth:0}}>
                    <p className="ellipsis" style={{fontWeight:'800',color:'var(--text)',margin:'0 0 4px'}}>{c.name}</p>
                    <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
                      <span className="badge" style={{background:'var(--card2)',color:'var(--text3)'}}>Limit: {P(c.limit)}</span>
                      {dtd<=5&&<span className="badge" style={{background:'#fef2f2',color:'#ef4444'}}><Ico n="warning" s={10} c="#ef4444"/>Due in {dtd}d</span>}
                    </div>
                  </div>
                </div>
                <div className="card-row-right">
                  <button className="ib" style={{color:isEditing?'#6366f1':'#94a3b8',background:isEditing?'#eef2ff':'transparent'}} onClick={()=>isEditing?reset():startEdit(c)}><Ico n="edit" s={15}/></button>
                  <button className="ib" onClick={()=>{if(isEditing)reset();setCards(cards.filter(x=>x.id!==c.id));}}><Ico n="trash" s={15}/></button>
                </div>
              </div>
              <div style={{marginBottom:'6px'}}>
                <div className="row" style={{marginBottom:'4px'}}>
                  <span style={{fontSize:'12px',color:'#64748b'}}>Used this month</span>
                  <span style={{fontSize:'13px',fontWeight:'700',color:util>80?'#ef4444':'#1e293b'}}>{P(spent)} ({util.toFixed(0)}%)</span>
                </div>
                <div className="pbar"><div className="pfill" style={{width:`${util}%`,background:util>80?'#ef4444':util>50?'#f59e0b':'#4f46e5'}}/></div>
              </div>
              <p style={{fontSize:'12px',color:'#94a3b8',margin:0}}>Billing day: {c.billingDay} · Due day: {c.dueDay}</p>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ════════  CLIENTS  ════════ */
function ClientsTab({clients,setClients,income,expenses,mExp,monthName,expectedFromClients,fxRates,fxLoaded,fxUpdatedAt,mPay}){
  const[name,setName]=useState('');const[rate,setRate]=useState('');const[currency,setCurrency]=useState('USD');
  const[editId,setEditId]=useState(null);
  const reset=()=>{setEditId(null);setName('');setRate('');setCurrency('USD');};
  const startEdit=(c)=>{setEditId(c.id);setName(c.name);setRate(String(c.rate||''));setCurrency(c.currency||'USD');};
  const save=()=>{
    if(!name.trim())return;
    if(editId){
      setClients(clients.map(x=>x.id===editId?{...x,name:name.trim(),rate:parseFloat(rate)||0,currency}:x));
    }else{
      setClients([...clients,{id:uid(),name:name.trim(),rate:parseFloat(rate)||0,currency}]);
    }
    reset();
  };

  const totalPaid=income.filter(i=>i.status==='Paid'||!i.status).reduce((s,i)=>s+i.amount,0);
  const totalPending=income.filter(i=>i.status==='Pending').reduce((s,i)=>s+i.amount,0);
  const totalExpected=totalPaid+totalPending;
  const totalExpenses=mExp||0;
  const netClientExpected=(expectedFromClients||0)-(mPay||0);
  const graphMax=Math.max(totalExpected,totalExpenses,expectedFromClients||0,1);
  const pct=(v)=>Math.min(100,Math.round((v/graphMax)*100));
  const net=totalPaid-totalExpenses;

  const bars=[
    {label:'Client Expected Income',sublabel:`(${fxLoaded?'Live':'Est.'} FX · after payroll: ${P(netClientExpected)})`,value:expectedFromClients||0,color:'#8b5cf6',bg:'#f5f3ff',mixed:false},
    {label:'Billed Income',sublabel:'(Paid + Pending)',value:totalExpected,paidPart:totalPaid,pendingPart:totalPending,color:'#6366f1',bg:'#eef2ff',mixed:true},
    {label:'Actual Received',sublabel:'(Paid only)',value:totalPaid,color:'#10b981',bg:'#f0fdf4',mixed:false},
    {label:'Total Expenses',sublabel:'(Expenses + Subs + Payroll)',value:totalExpenses,color:'#ef4444',bg:'#fff5f5',mixed:false},
  ];

  return(
    <div className="fade col" style={{gap:'16px'}}>
      <div className="card" style={{padding:'24px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:'12px',marginBottom:'20px'}}>
          <div>
            <p className="sect" style={{margin:0}}>Income vs Expenses — {monthName||'This Month'}</p>
            <p style={{fontSize:'12px',color:'#94a3b8',margin:'4px 0 0'}}>{fxLoaded?`Live FX · updated ${fxUpdatedAt?fxUpdatedAt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'just now'} · refreshes every 30 min`:'Using estimated exchange rates.'} — Client expected = sum of client rates × FX rate.</p>
          </div>
          <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
            {[{c:'#8b5cf6',l:'Client Exp.'},{c:'#6366f1',l:'Billed'},{c:'#10b981',l:'Received'},{c:'#ef4444',l:'Expenses'}].map(x=>(
              <span key={x.l} style={{display:'flex',alignItems:'center',gap:'5px',fontSize:'11px',fontWeight:'700',color:'#64748b'}}>
                <span style={{width:'10px',height:'10px',borderRadius:'3px',background:x.c,display:'inline-block'}}/>
                {x.l}
              </span>
            ))}
          </div>
        </div>
        {clients.length===0?(
          <p style={{textAlign:'center',color:'#94a3b8',fontSize:'13px',padding:'24px 0'}}>Add clients to see expected income.</p>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:'18px'}}>
            {bars.map(b=>(
              <div key={b.label}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:'6px'}}>
                  <div>
                    <span style={{fontSize:'13px',fontWeight:'700',color:'#1e293b'}}>{b.label}</span>
                    <span style={{fontSize:'11px',color:'#94a3b8',marginLeft:'6px'}}>{b.sublabel}</span>
                  </div>
                  <span style={{fontSize:'15px',fontWeight:'800',color:b.color}}>{P(b.value)}</span>
                </div>
                <div style={{height:'28px',background:'#f1f5f9',borderRadius:'8px',overflow:'hidden',position:'relative'}}>
                  {b.mixed?(
                    <>
                      <div style={{position:'absolute',left:0,top:0,height:'100%',width:`${pct(b.value)}%`,background:'#c7d2fe',borderRadius:'8px',transition:'width .5s'}}/>
                      <div style={{position:'absolute',left:0,top:0,height:'100%',width:`${pct(b.paidPart)}%`,background:'#6366f1',borderRadius:'8px',transition:'width .5s'}}/>
                    </>
                  ):(
