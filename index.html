                  <p style={{fontSize:'11px',color:'#94a3b8',margin:0}}>{s.freq} · Next: {s.date}{ac?` · ${acctLabel(ac)}`:''}{cd?` · ${cd.name}`:''}</p>
                  {s.currency&&s.currency!=='PHP'&&(
                    <span style={{fontSize:'11px',color:'#94a3b8',display:'block'}}>≈ {P((s.amount||0)*(fxRates?.[s.currency]||57))} at {fxLoaded?'live':'est.'} rate</span>
                  )}
                </div>
              </div>
              <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
                <span style={{fontWeight:'800',color:'#4f46e5'}}>{P(s.amount)} {s.currency||'PHP'}</span>
                <button className="ib" style={{color:'#10b981'}} title="Log as expense" onClick={()=>{
                  const phpAmount=s.currency&&s.currency!=='PHP'?parseFloat(((s.amount||0)*(fxRates?.[s.currency]||57)).toFixed(2)):(s.amount||0);
                  setExpenses(prev=>[...(prev||[]),{id:uid(),date:TODAY,amount:phpAmount,category:'Subscriptions',accountId:'',note:`${s.name} subscription`}]);
                  alert(`Logged ₱${phpAmount.toLocaleString()} expense for ${s.name}. Go to Expenses tab to link it to an account.`);
                }}><Ico n="income" s={14} c="#10b981"/></button>
                <button className="ib" style={{color:isEditing?'#6366f1':'#94a3b8',background:isEditing?'#eef2ff':'transparent'}} onClick={()=>isEditing?reset():startEdit(s)}><Ico n="edit" s={15}/></button>
                <button className="ib" onClick={()=>{if(isEditing)reset();setSubs(allSubs.filter(x=>x.id!==s.id));}}><Ico n="trash" s={15}/></button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ════════  PAYROLL  ════════ */
function PayrollTab({payroll,allPayroll,setPayroll,employees,setEmployees,accounts}){
  const[empName,setEmpName]=useState('');const[empRole,setEmpRole]=useState('');const[empSalary,setEmpSalary]=useState('');const[empFreq,setEmpFreq]=useState('Biweekly');const[editEmpId,setEditEmpId]=useState(null);
  const[date,setDate]=useState(TODAY);const[employeeId,setEmployeeId]=useState('');const[amount,setAmount]=useState('');const[accountId,setAccountId]=useState('');const[editPayId,setEditPayId]=useState(null);

  const FREQ_LABELS={'Weekly':'Weekly','Biweekly':'Biweekly (every 2 wks)','Monthly':'Monthly'};
  const resetEmp=()=>{setEditEmpId(null);setEmpName('');setEmpRole('');setEmpSalary('');setEmpFreq('Biweekly');};
  const startEditEmp=(e)=>{setEditEmpId(e.id);setEmpName(e.name);setEmpRole(e.role||'');setEmpSalary(e.salary!=null?String(e.salary):'');setEmpFreq(e.frequency||'Biweekly');};
  const saveEmp=()=>{
    if(!empName.trim())return;
    const sal=empSalary?parseFloat(empSalary):undefined;
    if(editEmpId){setEmployees(employees.map(x=>x.id===editEmpId?{...x,name:empName.trim(),role:empRole.trim(),salary:sal,frequency:empFreq}:x));}
    else{setEmployees([...employees,{id:uid(),name:empName.trim(),role:empRole.trim(),salary:sal,frequency:empFreq}]);}
    resetEmp();
  };

  const resetPay=()=>{setEditPayId(null);setDate(TODAY);setEmployeeId('');setAmount('');setAccountId('');};
  const startEditPay=(p)=>{setEditPayId(p.id);setDate(p.date);setEmployeeId(p.employeeId||'');setAmount(String(p.amount||''));setAccountId(p.accountId||'');};
  const savePay=()=>{
    if(!amount)return;
    if(editPayId){setPayroll(allPayroll.map(x=>x.id===editPayId?{...x,date,employeeId,amount:parseFloat(amount),accountId}:x));}
    else{setPayroll([...allPayroll,{id:uid(),date,employeeId,amount:parseFloat(amount),accountId}]);}
    resetPay();
  };

  return(
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:'16px',alignItems:'start'}} className="fade __form-grid">
      <div className="col" style={{gap:'16px'}}>
        <div className="card" style={{padding:'22px',border:editEmpId?'2px solid #6366f1':'2px solid transparent',transition:'border-color .2s'}}>
          <p className="sect">{editEmpId?'Edit Employee':'Add Employee'}</p>
          <div className="col">
            <div><span className="fl">Name</span><input className="fi" value={empName} onChange={e=>setEmpName(e.target.value)} placeholder="Employee name"/></div>
            <div><span className="fl">Role</span><input className="fi" value={empRole} onChange={e=>setEmpRole(e.target.value)} placeholder="e.g. Virtual Assistant"/></div>
            <div><span className="fl">Salary (₱)</span><input className="fi" type="number" value={empSalary} onChange={e=>setEmpSalary(e.target.value)} placeholder="e.g. 16000"/></div>
            <div><span className="fl">Pay Frequency</span>
              <select className="fi" value={empFreq} onChange={e=>setEmpFreq(e.target.value)}>
                {Object.entries(FREQ_LABELS).map(([v,l])=><option key={v} value={v}>{l}</option>)}
              </select>
            </div>
            <div style={{display:'flex',gap:'8px'}}>
              <button className="btn bp" style={{flex:1,justifyContent:'center'}} onClick={saveEmp}><Ico n={editEmpId?'check':'users'} s={14} c="#fff"/>{editEmpId?'Save Employee':'Add Employee'}</button>
              {editEmpId&&<button className="btn bs" onClick={resetEmp}>Cancel</button>}
            </div>
          </div>
          {employees.length>0&&<div style={{marginTop:'16px',borderTop:'1px solid #f1f5f9',paddingTop:'14px'}}>
            {employees.map(e=>(
              <div key={e.id} className="row" style={{padding:'7px 0'}}>
                <div style={{display:'flex',alignItems:'center',gap:'9px'}}>
                  <div style={{width:'30px',height:'30px',background:'#f5f3ff',borderRadius:'7px',display:'flex',alignItems:'center',justifyContent:'center'}}><Ico n="user" s={14} c="#7c3aed" sw={1.75}/></div>
                  <div>
                    <p style={{fontWeight:'700',fontSize:'13px',margin:0}}>{e.name}</p>
                    <p style={{fontSize:'11px',color:'#94a3b8',margin:0}}>{e.role||''}{e.salary?` · ${P(e.salary)}`:''}{e.frequency?` · ${e.frequency}`:''}</p>
                  </div>
                </div>
                <div style={{display:'flex',gap:'4px'}}>
                  <button className="ib" style={{color:editEmpId===e.id?'#6366f1':'#94a3b8'}} onClick={()=>editEmpId===e.id?resetEmp():startEditEmp(e)}><Ico n="edit" s={14}/></button>
                  <button className="ib" onClick={()=>{if(editEmpId===e.id)resetEmp();setEmployees(employees.filter(x=>x.id!==e.id));}}><Ico n="trash" s={14}/></button>
                </div>
              </div>
            ))}
          </div>}
        </div>
        <div className="card" style={{padding:'22px',border:editPayId?'2px solid #6366f1':'2px solid transparent',transition:'border-color .2s'}}>
          <p className="sect">{editPayId?'Edit Payment':'Record Payment'}</p>
          <div className="col">
            <div><span className="fl">Date</span><input className="fi" type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
            <div><span className="fl">Employee</span><select className="fi" value={employeeId} onChange={e=>setEmployeeId(e.target.value)}><option value="">— Select employee —</option>{employees.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}</select></div>
            <div><span className="fl">Amount (₱)</span><input className="fi" type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0.00"/></div>
            <div><span className="fl">Paid from Account</span><select className="fi" value={accountId} onChange={e=>setAccountId(e.target.value)}><option value="">— Select account —</option>{accounts.map(a=><option key={a.id} value={a.id}>{acctLabel(a)}</option>)}</select></div>
            <div style={{display:'flex',gap:'8px'}}>
              <button className="btn bp" style={{flex:1,justifyContent:'center'}} onClick={savePay}><Ico n={editPayId?'check':'dollar'} s={14} c="#fff"/>{editPayId?'Save Payment':'Record Payment'}</button>
              {editPayId&&<button className="btn bs" onClick={resetPay}>Cancel</button>}
            </div>
          </div>
        </div>
      </div>
      <div className="col" style={{gap:'8px',maxHeight:'75vh',overflowY:'auto'}}>
        {payroll.length===0&&<div className="card" style={{padding:'40px',textAlign:'center',color:'#94a3b8',fontSize:'13px'}}>No payroll records this month.</div>}
        {[...payroll].reverse().map(p=>{
          const em=employees.find(e=>e.id===p.employeeId);const ac=accounts.find(a=>a.id===p.accountId);
          const isEditing=editPayId===p.id;
          return(
            <div key={p.id} className="card row" style={{padding:'14px 18px',borderLeft:isEditing?'3px solid #6366f1':'3px solid transparent',background:isEditing?'#f5f3ff':'#fff',transition:'all .15s'}}>
              <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                <div style={{width:'34px',height:'34px',background:'#faf5ff',borderRadius:'8px',display:'flex',alignItems:'center',justifyContent:'center'}}><Ico n="users" s={15} c="#7c3aed" sw={1.75}/></div>
                <div>
                  <p style={{fontWeight:'700',color:'#1e293b',fontSize:'13px',margin:'0 0 3px'}}>{em?.name||'Unknown'}</p>
                  <p style={{fontSize:'11px',color:'#94a3b8',margin:0}}>{p.date}{ac?` · ${acctLabel(ac)}`:''}</p>
                </div>
              </div>
              <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
                <span style={{fontWeight:'800',fontSize:'15px',color:'#ef4444'}}>{P(p.amount)}</span>
                <button className="ib" style={{color:isEditing?'#6366f1':'#94a3b8',background:isEditing?'#eef2ff':'transparent'}} onClick={()=>isEditing?resetPay():startEditPay(p)}><Ico n="edit" s={15}/></button>
                <button className="ib" onClick={()=>{if(isEditing)resetPay();setPayroll(allPayroll.filter(x=>x.id!==p.id));}}><Ico n="trash" s={15}/></button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ════════  BUDGET  ════════ */
function BudgetTab({base,avg3,mInc,settings,setSettings,mExp,mSub,mPay,spendBudget,dailyCap,daysLeft,tithe,invest,desires,savings,totalFixed,exportCSV,mTitheActual,mInvestActual,mSavingsActual,mDesiresActual,investMovedThisMonth,accounts,accBal,emergencyAcctId,setEmergencyAcctId,emergencyMonths,setEmergencyMonths}){

  /* Emergency fund calc */
  const emergAcct=accounts.find(a=>a.id===emergencyAcctId);
  const emergBalance=emergAcct?accBal(emergencyAcctId):0;
  const avgMonthlyExp=avg3; /* avg3 is already the 3-month income avg used as base — reuse mExp context */
  const emergTarget=base*emergencyMonths; /* target = base income × months as proxy */
  const emergPct=emergTarget>0?Math.min(100,Math.round((emergBalance/emergTarget)*100)):0;

  /* Savings+Investment combined */
  const savInvAlloc=savings+invest;
  const savInvActual=mSavingsActual+mInvestActual;

  /* Essentials = spendBudget (what remains after all allocations) */
  const essentialsAllowed=spendBudget;
  const essentialsSpent=mExp; /* regular expenses */
  const essentialsPct=essentialsAllowed>0?Math.min(100,Math.round((essentialsSpent/essentialsAllowed)*100)):0;

  const BAR=({pct,color,bg})=>(
    <div style={{height:'8px',borderRadius:'99px',background:'var(--pbar-bg)',overflow:'hidden',marginTop:'8px'}}>
      <div style={{height:'100%',width:`${pct}%`,background:color,borderRadius:'99px',transition:'width .5s'}}/>
    </div>
  );

  const AllocationRow=({label,allocated,actual,goal,color,bg,infoText,infoTitle,extra})=>{
    const remaining=allocated-actual;
    const pct=allocated>0?Math.min(100,Math.round((actual/allocated)*100)):0;
    const done=remaining<=0;
    return(
      <div style={{background:bg||'var(--card2)',borderRadius:'12px',padding:'16px 18px',border:`1px solid ${done?color:'var(--border)'}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'4px'}}>
          <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
            <span style={{fontSize:'14px',fontWeight:'800',color:'var(--text)'}}>{label}</span>
            {infoText&&<InfoIcon text={infoText} title={infoTitle||label}/>}
            {done&&<span style={{fontSize:'11px',fontWeight:'700',color:color,background:`${color}22`,padding:'2px 8px',borderRadius:'99px'}}>✓ Done</span>}
          </div>
          <div style={{textAlign:'right'}}>
            <span style={{fontSize:'18px',fontWeight:'900',color:done?color:'var(--text)'}}>{P(allocated)}</span>
          </div>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:'12px',color:'var(--text3)',marginBottom:'2px'}}>
          <span>Actioned: <b style={{color}}>{P(actual)}</b></span>
          <span>Remaining: <b style={{color:done?color:'#f59e0b'}}>{P(Math.max(0,remaining))}</b></span>
        </div>
        <BAR pct={pct} color={color} bg={bg}/>
        {goal&&<p style={{fontSize:'11px',color:'var(--text4)',margin:'6px 0 0',fontStyle:'italic'}}>{goal}</p>}
        {extra}
      </div>
    );
  };

  return(
    <div className="col fade" style={{gap:'20px'}}>

      {/* ALLOCATION % SETTINGS */}
      <div className="card" style={{padding:'22px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}}>
          <p className="sect" style={{margin:0}}>Allocation Settings</p>
          <select className="fi" style={{width:'auto',fontSize:'13px',padding:'5px 10px'}} value={settings.budgetMode} onChange={e=>setSettings(s=>({...s,budgetMode:e.target.value}))}>
            <option value="avg">Base: 3-month avg income</option>
            <option value="current">Base: This month's income</option>
          </select>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:'12px',marginBottom:'14px'}}>
          {[
            {label:'Tithes %',key:'tithePct',color:'#f59e0b'},
            {label:'Investment %',key:'investPct',color:'#6366f1'},
            {label:'Savings %',key:'savingsPct',color:'#10b981'},
            {label:'Desires %',key:'desiresPct',color:'#ec4899'},
          ].map(({label,key,color})=>(
            <div key={key} style={{background:'var(--card2)',borderRadius:'10px',padding:'12px 14px',border:`1px solid var(--border)`}}>
              <span className="fl" style={{color}}>{label}</span>
              <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                <input type="number" className="pct-input" style={{borderColor:color,color}} value={settings[key]||0} min="0" max="100"
                  onChange={e=>setSettings(s=>({...s,[key]:Math.min(100,Math.max(0,parseInt(e.target.value)||0))}))}/>
                <span style={{fontSize:'13px',color:'var(--text3)'}}>= {P((base*(settings[key]||0))/100)}</span>
              </div>
            </div>
          ))}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',borderRadius:'10px',background:totalFixed>100?'#fff5f5':'#f0fdf4',border:`1px solid ${totalFixed>100?'#fca5a5':'#86efac'}`}}>
          <span style={{fontSize:'13px',fontWeight:'700',color:totalFixed>100?'#ef4444':'#16a34a'}}>Total allocated: {totalFixed}%</span>
          <span style={{fontSize:'12px',color:'var(--text3)'}}>Essentials get: {Math.max(0,100-totalFixed)}% = {P(Math.max(0,spendBudget))}</span>
        </div>
      </div>

      {/* BASE INCOME INFO */}
      <div style={{padding:'12px 16px',borderRadius:'10px',background:'var(--card2)',border:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <p style={{fontSize:'12px',color:'var(--text3)',fontWeight:'700',textTransform:'uppercase',margin:'0 0 2px'}}>Income Base <InfoIcon text={`${settings.budgetMode==='avg'?'3-month average income':'This month income'}. All allocation percentages are computed from this number.`} title="Income Base"/></p>
          <p style={{fontSize:'22px',fontWeight:'900',color:'var(--text)',margin:0}}>{P(base)}</p>
        </div>
        <div style={{textAlign:'right'}}>
          <p style={{fontSize:'11px',color:'var(--text4)',margin:'0 0 2px'}}>This month actual</p>
          <p style={{fontSize:'16px',fontWeight:'700',color:'#10b981',margin:0}}>{P(mInc)}</p>
        </div>
      </div>

      {/* ── 1. TITHES ── */}
      <AllocationRow
        label="🙏 Tithes"
        allocated={tithe}
        actual={mTitheActual}
        color="#f59e0b"
        bg="#fffbeb"
        infoText={`${settings.tithePct}% of income${investMovedThisMonth?' minus investment (already moved)':' (investment not moved yet, so full income base is used)'}. Non-negotiable. Goal: withdraw all ₱${tithe.toLocaleString('en-PH',{minimumFractionDigits:2})} before Sunday service.`}
        infoTitle="Tithes"
        goal="Goal: ₱0 remaining — all withdrawn for Sunday service"
      />

      {/* ── 2. SAVINGS + INVESTMENTS ── */}
      <div style={{background:'#f5f3ff',borderRadius:'12px',padding:'16px 18px',border:`1px solid ${savInvActual>=savInvAlloc*0.9?'#6366f1':'var(--border)'}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'8px'}}>
          <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
            <span style={{fontSize:'14px',fontWeight:'800',color:'var(--text)'}}>📈 Savings + Investments</span>
            <InfoIcon text={`Savings: ${settings.savingsPct}% = ${P(savings)}. Investment: ${settings.investPct}% = ${P(invest)}. Combined target: ${P(savInvAlloc)}. Stock market investments count as savings — they all grow your future wealth.`} title="Savings + Investments"/>
            {savInvActual>=savInvAlloc*0.9&&<span style={{fontSize:'11px',fontWeight:'700',color:'#6366f1',background:'#ede9fe',padding:'2px 8px',borderRadius:'99px'}}>✓ Done</span>}
          </div>
          <span style={{fontSize:'18px',fontWeight:'900',color:'#4f46e5'}}>{P(savInvAlloc)}</span>
        </div>
        <div style={{display:'flex',gap:'12px',marginBottom:'6px',flexWrap:'wrap'}}>
          <span style={{fontSize:'12px',color:'var(--text3)'}}>Savings: <b style={{color:'#10b981'}}>{P(mSavingsActual)}</b> / {P(savings)}</span>
          <span style={{fontSize:'12px',color:'var(--text3)'}}>Investment: <b style={{color:'#6366f1'}}>{P(mInvestActual)}</b> / {P(invest)}</span>
        </div>
        <div style={{display:'flex',gap:'4px',height:'8px',borderRadius:'99px',overflow:'hidden',background:'var(--pbar-bg)'}}>
          <div style={{height:'100%',width:`${savings>0?Math.min(100,Math.round((mSavingsActual/Math.max(savInvAlloc,1))*100)):0}%`,background:'#10b981',transition:'width .5s'}}/>
          <div style={{height:'100%',width:`${invest>0?Math.min(100,Math.round((mInvestActual/Math.max(savInvAlloc,1))*100)):0}%`,background:'#6366f1',transition:'width .5s'}}/>
        </div>
        <p style={{fontSize:'11px',color:'var(--text4)',margin:'6px 0 0',fontStyle:'italic'}}>Goal: ₱0 remaining — all transferred to savings account + investment</p>
      </div>

      {/* ── 3. DESIRES ── */}
      <AllocationRow
        label="✨ Desires"
        allocated={desires}
        actual={mDesiresActual}
        color="#ec4899"
        bg="#fdf2f8"
        infoText={`${settings.desiresPct}% of income = ${P(desires)}. This is your lifestyle/wants budget. Log expenses as category "Desires" and they deduct here. Unspent desires can be redirected to savings at month end.`}
        infoTitle="Desires Budget"
        goal="Goal: spend as little as possible — less spent = more you can move to savings"
        extra={mDesiresActual<desires*0.5&&desires>0?(
          <div style={{marginTop:'8px',padding:'8px 12px',borderRadius:'8px',background:'rgba(236,72,153,.08)',fontSize:'12px',color:'#be185d',fontWeight:'600'}}>
            💡 You have {P(desires-mDesiresActual)} unspent desires budget — consider moving it to savings at month end!
          </div>
        ):null}
      />

      {/* ── 4. ESSENTIALS ── */}
      <div style={{background:'var(--card2)',borderRadius:'12px',padding:'16px 18px',border:'1px solid var(--border)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'4px'}}>
          <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
            <span style={{fontSize:'14px',fontWeight:'800',color:'var(--text)'}}>🏠 Essentials</span>
            <InfoIcon text={`What's left after all allocations: Income (${P(base)}) − Tithes (${P(tithe)}) − Investment (${P(invest)}) − Savings (${P(savings)}) − Desires (${P(desires)}) − Subscriptions (${P(mSub)}) − Payroll (${P(mPay)}) = ${P(essentialsAllowed)}. This is your budget for food, bills, transport, etc.`} title="Essentials Budget"/>
          </div>
          <div style={{textAlign:'right'}}>
            <span style={{fontSize:'18px',fontWeight:'900',color:essentialsSpent>essentialsAllowed?'#ef4444':'var(--text)'}}>{P(essentialsAllowed)}</span>
          </div>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:'12px',color:'var(--text3)',marginBottom:'2px'}}>
          <span>Spent: <b style={{color:essentialsSpent>essentialsAllowed?'#ef4444':'var(--text)'}}>{P(essentialsSpent)}</b></span>
          <span>Remaining: <b style={{color:essentialsSpent>essentialsAllowed?'#ef4444':'#10b981'}}>{P(Math.max(0,essentialsAllowed-essentialsSpent))}</b></span>
        </div>
        <BAR pct={essentialsPct} color={essentialsPct>100?'#ef4444':'#64748b'}/>
        {essentialsSpent>essentialsAllowed&&(
          <p style={{fontSize:'12px',color:'#ef4444',margin:'6px 0 0',fontWeight:'600'}}>⚠ Over budget by {P(essentialsSpent-essentialsAllowed)}</p>
        )}
        <p style={{fontSize:'11px',color:'var(--text4)',margin:'6px 0 0',fontStyle:'italic'}}>Computed from actual logged expenses. Updates as you confirm allocations.</p>
      </div>

      {/* ── 5. EMERGENCY FUND ── */}
      <div style={{background:'#fff7ed',borderRadius:'12px',padding:'16px 18px',border:`1px solid ${emergPct>=100?'#f97316':'var(--border)'}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'8px'}}>
          <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
            <span style={{fontSize:'14px',fontWeight:'800',color:'var(--text)'}}>🛡 Emergency Fund</span>
            <InfoIcon text={`Target: ${emergencyMonths} months × ${P(base)} income base = ${P(emergTarget)}. Current balance of your linked emergency account: ${P(emergBalance)}. Goal: ${emergencyMonths===3?'3 months (minimum safe)':emergencyMonths===6?'6 months (recommended)':'custom'} of monthly expenses covered.`} title="Emergency Fund"/>
            {emergPct>=100&&<span style={{fontSize:'11px',fontWeight:'700',color:'#f97316',background:'#ffedd5',padding:'2px 8px',borderRadius:'99px'}}>✓ Goal Reached!</span>}
          </div>
          <span style={{fontSize:'18px',fontWeight:'900',color:'#ea580c'}}>{emergPct}%</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:'12px',color:'var(--text3)',marginBottom:'6px'}}>
          <span>Current: <b style={{color:'#ea580c'}}>{P(emergBalance)}</b></span>
          <span>Target: <b>{P(emergTarget)}</b></span>
        </div>
        <BAR pct={emergPct} color="#f97316"/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginTop:'12px'}}>
          <div>
            <span className="fl">Linked Account</span>
            <select className="fi" value={emergencyAcctId} onChange={e=>setEmergencyAcctId(e.target.value)}>
              <option value="">— Pick emergency account —</option>
              {accounts.map(a=><option key={a.id} value={a.id}>{acctLabel(a)}</option>)}
            </select>
          </div>
          <div>
            <span className="fl">Target (months of income)</span>
            <select className="fi" value={emergencyMonths} onChange={e=>setEmergencyMonths(parseInt(e.target.value))}>
              <option value={3}>3 months (minimum)</option>
              <option value={4}>4 months</option>
              <option value={5}>5 months</option>
              <option value={6}>6 months (recommended)</option>
            </select>
          </div>
        </div>
        {!emergencyAcctId&&<p style={{fontSize:'12px',color:'#f59e0b',margin:'8px 0 0',fontWeight:'600'}}>⚠ Pick a dedicated emergency fund account to track your balance here.</p>}
      </div>

      {/* DAILY CAP */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
        <div className="card" style={{padding:'16px 18px',background:'#fffbeb'}}>
          <p style={{fontSize:'11px',color:'var(--text4)',fontWeight:'700',textTransform:'uppercase',margin:'0 0 4px'}}>
            Daily Spend Cap <InfoIcon text={`Remaining essentials budget ÷ ${daysLeft} days left this month. = ${P(essentialsAllowed-essentialsSpent)} ÷ ${daysLeft} = ${P(dailyCap)}`} title="Daily Spend Cap"/>
          </p>
          <p style={{fontSize:'24px',fontWeight:'900',color:'#d97706',margin:0}}>{P(dailyCap)}</p>
          <p style={{fontSize:'11px',color:'var(--text4)',margin:'4px 0 0'}}>{daysLeft} days left</p>
        </div>
        <div className="card" style={{padding:'16px 18px',background:'#f0fdf4'}}>
          <p style={{fontSize:'11px',color:'var(--text4)',fontWeight:'700',textTransform:'uppercase',margin:'0 0 4px'}}>
            Spendable Budget <InfoIcon text={`Income Base − all allocations (tithes, investment, savings, desires) − fixed costs (subscriptions, payroll). This is your essentials budget.`} title="Spendable Budget"/>
          </p>
          <p style={{fontSize:'24px',fontWeight:'900',color:'#16a34a',margin:0}}>{P(Math.max(0,spendBudget))}</p>
          <p style={{fontSize:'11px',color:'var(--text4)',margin:'4px 0 0'}}>for essentials</p>
        </div>
      </div>

      {/* EXPORT */}
      <button className="btn bp" onClick={exportCSV} style={{justifyContent:'center'}}>
        <Ico n="download" s={14} c="#fff"/>Export CSV
      </button>

    </div>
  );
}

/* ════════  DEBT  ════════ */
function DebtTab({debts,setDebts}){
  const[editId,setEditId]=useState(null);
  const[type,setType]=useState('Credit Card');
  const[name,setName]=useState('');
  const[balance,setBalance]=useState('');
  const[interestRate,setInterestRate]=useState('');
  const[minPayment,setMinPayment]=useState('');
  const[dueDate,setDueDate]=useState('');
  const[lender,setLender]=useState('');
  const[notes,setNotes]=useState('');

  const reset=()=>{setEditId(null);setType('Credit Card');setName('');setBalance('');setInterestRate('');setMinPayment('');setDueDate('');setLender('');setNotes('');};
  const startEdit=(d)=>{setEditId(d.id);setType(d.type);setName(d.name);setBalance(String(d.balance||''));setInterestRate(String(d.interestRate||''));setMinPayment(String(d.minPayment||''));setDueDate(d.dueDate||'');setLender(d.lender||'');setNotes(d.notes||'');};

  const save=()=>{
    if(!name.trim()||!balance)return;
    if(editId){
      setDebts(prev=>prev.map(d=>d.id===editId?{...d,type,name:name.trim(),balance:parseFloat(balance)||0,interestRate:parseFloat(interestRate)||0,minPayment:parseFloat(minPayment)||0,dueDate,lender:lender.trim(),notes:notes.trim()}:d));
    }else{
      setDebts(prev=>[...prev,{id:uid(),type,name:name.trim(),balance:parseFloat(balance)||0,interestRate:parseFloat(interestRate)||0,minPayment:parseFloat(minPayment)||0,dueDate,lender:lender.trim(),notes:notes.trim(),dateAdded:TODAY}]);
    }
    reset();
  };

  const del=(id)=>setDebts(prev=>prev.filter(d=>d.id!==id));

  const totalDebt=debts.reduce((s,d)=>s+(d.balance||0),0);
  const totalMin=debts.reduce((s,d)=>s+(d.minPayment||0),0);
  const ccDebts=debts.filter(d=>d.type==='Credit Card');
  const personalDebts=debts.filter(d=>d.type==='Personal');
  const loanDebts=debts.filter(d=>d.type==='Loan');

  const DTYPE_COLOR={
    'Credit Card':'#ef4444','Personal':'#f59e0b','Loan':'#4f46e5'
  };
  const DTYPE_BG={
    'Credit Card':'#fff5f5','Personal':'#fffbeb','Loan':'#f5f3ff'
  };

  const DebtCard=({d})=>{const isEditing=editId===d.id;return(
    <div className="card" style={{padding:'16px 18px',border:isEditing?'2px solid #6366f1':'2px solid transparent',transition:'border-color .2s'}}>
      <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px',flexWrap:'wrap'}}>
        <div className="card-row-left" style={{display:'flex',alignItems:'center',gap:'10px'}}>
          <div style={{flexShrink:0,padding:'6px 10px',background:DTYPE_BG[d.type]||'#f8fafc',borderRadius:'8px',fontSize:'11px',fontWeight:'700',color:DTYPE_COLOR[d.type]||'#64748b'}}>{d.type}</div>
          <div style={{minWidth:0}}>
            <p className="ellipsis" style={{fontWeight:'800',color:'var(--text)',margin:0,fontSize:'14px'}}>{d.name}</p>
            {d.lender&&<p style={{fontSize:'11px',color:'var(--text4)',margin:0}}>{d.lender}</p>}
          </div>
        </div>
        <div className="card-row-right">
          <button className="ib" style={{color:isEditing?'#6366f1':'#94a3b8',background:isEditing?'#eef2ff':'transparent'}} onClick={()=>isEditing?reset():startEdit(d)}><Ico n="edit" s={14}/></button>
          <button className="ib" onClick={()=>del(d.id)}><Ico n="trash" s={14}/></button>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))',gap:'8px',marginBottom:'10px'}}>
        <div style={{background:'var(--card2)',borderRadius:'8px',padding:'10px'}}>
          <p style={{fontSize:'10px',color:'var(--text4)',fontWeight:'700',textTransform:'uppercase',margin:'0 0 2px'}}>Balance</p>
          <p style={{fontSize:'16px',fontWeight:'800',color:'#ef4444',margin:0}}>{P(d.balance)}</p>
        </div>
        {d.interestRate>0&&<div style={{background:'#f8fafc',borderRadius:'8px',padding:'10px'}}>
          <p style={{fontSize:'10px',color:'#94a3b8',fontWeight:'700',textTransform:'uppercase',margin:'0 0 2px'}}>Interest</p>
          <p style={{fontSize:'16px',fontWeight:'800',color:'#f59e0b',margin:0}}>{d.interestRate}%/yr</p>
        </div>}
        {d.minPayment>0&&<div style={{background:'#f8fafc',borderRadius:'8px',padding:'10px'}}>
          <p style={{fontSize:'10px',color:'#94a3b8',fontWeight:'700',textTransform:'uppercase',margin:'0 0 2px'}}>Min. Payment</p>
          <p style={{fontSize:'16px',fontWeight:'800',color:'#4f46e5',margin:0}}>{P(d.minPayment)}</p>
        </div>}
        {d.dueDate&&<div style={{background:'#f8fafc',borderRadius:'8px',padding:'10px'}}>
          <p style={{fontSize:'10px',color:'#94a3b8',fontWeight:'700',textTransform:'uppercase',margin:'0 0 2px'}}>Due Date</p>
          <p style={{fontSize:'13px',fontWeight:'700',color:'#1e293b',margin:0}}>{d.dueDate}</p>
        </div>}
      </div>
      {d.notes&&<p style={{fontSize:'12px',color:'#94a3b8',margin:'4px 0 0',fontStyle:'italic'}}>{d.notes}</p>}
    </div>
  );};

  const Section=({title,items,color})=>items.length===0?null:(
    <div>
      <p style={{fontSize:'11px',fontWeight:'700',color,textTransform:'uppercase',letterSpacing:'.06em',margin:'0 0 8px'}}>{title} ({items.length})</p>
      <div className="col" style={{gap:'10px'}}>{items.map(d=><DebtCard key={d.id} d={d}/>)}</div>
    </div>
  );

  return(
    <div className="col fade" style={{gap:'16px'}}>
      {/* SUMMARY */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:'12px'}}>
        <div className="card" style={{padding:'18px 20px',background:'#fff5f5'}}>
          <p style={{fontSize:'11px',color:'#64748b',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.04em',margin:'0 0 4px'}}>Total Debt</p>
          <p style={{fontSize:'24px',fontWeight:'900',color:'#ef4444',margin:0}}>{P(totalDebt)}</p>
        </div>
        <div className="card" style={{padding:'18px 20px',background:'#fef3c7'}}>
          <p style={{fontSize:'11px',color:'#64748b',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.04em',margin:'0 0 4px'}}>Min. Monthly Payments</p>
          <p style={{fontSize:'24px',fontWeight:'900',color:'#d97706',margin:0}}>{P(totalMin)}</p>
        </div>
        <div className="card" style={{padding:'18px 20px',background:'#f5f3ff'}}>
          <p style={{fontSize:'11px',color:'#64748b',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.04em',margin:'0 0 4px'}}>Number of Debts</p>
          <p style={{fontSize:'24px',fontWeight:'900',color:'#4f46e5',margin:0}}>{debts.length}</p>
        </div>
      </div>

      {/* ADD / EDIT FORM */}
      <div className="card" style={{padding:'22px',border:editId?'2px solid #6366f1':'2px solid transparent',transition:'border-color .2s'}}>
        <p className="sect">{editId?'Edit Debt':'Add Debt'}</p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:'10px'}}>
          <div>
            <span className="fl">Type</span>
            <select className="fi" value={type} onChange={e=>setType(e.target.value)}>
              <option>Credit Card</option>
              <option>Personal</option>
              <option>Loan</option>
            </select>
          </div>
          <div><span className="fl">Name / Label</span><input className="fi" value={name} onChange={e=>setName(e.target.value)} placeholder={type==='Credit Card'?'e.g. BDO Visa':type==='Personal'?'e.g. Loan from John':'e.g. Car Loan'}/></div>
          <div><span className="fl">Current Balance (₱)</span><input className="fi" type="number" value={balance} onChange={e=>setBalance(e.target.value)} placeholder="0.00"/></div>
          <div><span className="fl">Interest Rate (% / yr)</span><input className="fi" type="number" value={interestRate} onChange={e=>setInterestRate(e.target.value)} placeholder="e.g. 24"/></div>
          <div><span className="fl">Min. Monthly Payment (₱)</span><input className="fi" type="number" value={minPayment} onChange={e=>setMinPayment(e.target.value)} placeholder="0.00"/></div>
          <div><span className="fl">Due Date</span><input className="fi" type="date" value={dueDate} onChange={e=>setDueDate(e.target.value)}/></div>
          <div><span className="fl">Lender / Bank</span><input className="fi" value={lender} onChange={e=>setLender(e.target.value)} placeholder="e.g. BDO, GCash, Friend"/></div>
          <div><span className="fl">Notes</span><input className="fi" value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Optional"/></div>
        </div>
        <div style={{display:'flex',gap:'8px',marginTop:'14px'}}>
          <button className="btn bp" style={{flex:1,justifyContent:'center'}} onClick={save} disabled={!name.trim()||!balance}>
            <Ico n={editId?'check':'warning'} s={14} c="#fff"/>{editId?'Save Changes':'Add Debt'}
          </button>
          {editId&&<button className="btn bs" onClick={reset}>Cancel</button>}
        </div>
      </div>

      {/* DEBT LISTS */}
      {debts.length===0?(
        <div className="card" style={{padding:'40px',textAlign:'center',color:'#94a3b8',fontSize:'13px'}}>No debts tracked yet. Great!</div>
      ):(
        <div className="col" style={{gap:'20px'}}>
          <Section title="Credit Card Debt" items={ccDebts} color="#ef4444"/>
          <Section title="Personal Debt" items={personalDebts} color="#f59e0b"/>
          <Section title="Loans" items={loanDebts} color="#4f46e5"/>
        </div>
      )}
    </div>
  );
}

/* ════════  SAVINGS  ════════ */
function SavingsTab({savingsLog,setSavingsLog,savingsAcctId,setSavingsAcctId,accounts,savings,savingsPct,curMonthKey,income,byMonth}){
  const savAcct=accounts.find(a=>a.id===savingsAcctId);
  const totalSaved=savingsLog.filter(s=>s.done).reduce((t,s)=>t+(s.amount||0),0);
  const doneEntries=savingsLog.filter(s=>s.done).sort((a,b)=>b.month.localeCompare(a.month));
  const skippedCount=savingsLog.filter(s=>s.skipped).length;

  return(
    <div className="col fade" style={{gap:'16px'}}>
      {/* SUMMARY CARDS */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:'12px'}}>
        <div className="card" style={{padding:'18px 20px',background:'#f5f3ff'}}>
          <p style={{fontSize:'11px',color:'#94a3b8',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.04em',margin:'0 0 4px'}}>Total Saved (all time)</p>
          <p style={{fontSize:'24px',fontWeight:'900',color:'#6366f1',margin:0}}>{P(totalSaved)}</p>
        </div>
        <div className="card" style={{padding:'18px 20px',background:'#f0fdf4'}}>
          <p style={{fontSize:'11px',color:'#94a3b8',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.04em',margin:'0 0 4px'}}>This Month Target</p>
          <p style={{fontSize:'24px',fontWeight:'900',color:'#10b981',margin:0}}>{P(savings)}</p>
        </div>
        <div className="card" style={{padding:'18px 20px',background:'#fffbeb'}}>
          <p style={{fontSize:'11px',color:'#94a3b8',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.04em',margin:'0 0 4px'}}>Times Skipped</p>
          <p style={{fontSize:'24px',fontWeight:'900',color:'#f59e0b',margin:0}}>{skippedCount}</p>
        </div>
      </div>

      {/* SAVINGS ACCOUNT SETTING */}
      <div className="card" style={{padding:'22px'}}>
        <p className="sect">Your Savings Account</p>
        <p style={{fontSize:'13px',color:'#64748b',margin:'0 0 12px'}}>Select the bank account you transfer your savings to each month. This helps track your savings goal separately from spending.</p>
        <div style={{display:'flex',gap:'10px',alignItems:'center',flexWrap:'wrap'}}>
          <select className="fi" style={{maxWidth:'320px'}} value={savingsAcctId} onChange={e=>setSavingsAcctId(e.target.value)}>
            <option value="">— Pick your savings account —</option>
            {accounts.map(a=><option key={a.id} value={a.id}>{acctLabel(a)}</option>)}
          </select>
          {savAcct&&<span style={{fontSize:'13px',fontWeight:'700',color:'#10b981'}}>✓ {acctLabel(savAcct)} set as savings account</span>}
        </div>
        {!savingsAcctId&&(
          <p style={{fontSize:'12px',color:'#f59e0b',margin:'10px 0 0',fontWeight:'600'}}>⚠ No savings account selected — the dashboard reminder won't know where to send the money.</p>
        )}
      </div>

      {/* TRANSFER HISTORY */}
      <div className="card" style={{padding:'22px'}}>
        <p className="sect">Transfer History</p>
        {doneEntries.length===0?(
          <div style={{padding:'30px',textAlign:'center',color:'#94a3b8',fontSize:'13px'}}>No savings transfers recorded yet. Mark your first one done from the dashboard!</div>
        ):(
          <div className="col" style={{gap:'10px'}}>
            {doneEntries.map(e=>{
              const [yr,mo]=e.month.split('-');
              const mName=MONTH_NAMES[parseInt(mo)-1];
              return(
                <div key={e.month} className="card row" style={{padding:'14px 16px',background:'#f8fafc'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
                    <div style={{width:'40px',height:'40px',borderRadius:'10px',background:'#f5f3ff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'20px'}}>💰</div>
                    <div>
                      <p style={{fontWeight:'800',color:'#1e293b',margin:'0 0 2px',fontSize:'14px'}}>{mName} {yr}</p>
                      <p style={{fontSize:'12px',color:'#94a3b8',margin:0}}>Transferred on {e.date}</p>
                    </div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                    <span style={{fontSize:'16px',fontWeight:'900',color:'#6366f1'}}>{P(e.amount)}</span>
                    <button className="ib" onClick={()=>setSavingsLog(prev=>prev.filter(s=>s.month!==e.month))}><Ico n="trash" s={14}/></button>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* SKIPPED MONTHS */}
      {savingsLog.filter(s=>s.skipped).length>0&&(
        <div className="card" style={{padding:'22px'}}>
          <p className="sect">Skipped Months</p>
          <div className="col" style={{gap:'8px'}}>
            {savingsLog.filter(s=>s.skipped).sort((a,b)=>b.month.localeCompare(a.month)).map(e=>{
              const [yr,mo]=e.month.split('-');
              return(
                <div key={e.month} className="row" style={{padding:'10px 12px',borderRadius:'10px',background:'#fffbeb'}}>
                  <span style={{fontSize:'13px',fontWeight:'700',color:'#92400e'}}>{MONTH_NAMES[parseInt(mo)-1]} {yr} — skipped</span>
                  <button style={{fontSize:'11px',color:'#94a3b8',background:'none',border:'1px solid #e2e8f0',borderRadius:'6px',padding:'3px 8px',cursor:'pointer'}} onClick={()=>setSavingsLog(prev=>prev.filter(s=>s.month!==e.month))}>Clear</button>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
